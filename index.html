<title>KUMA FORTRESS — 쿠마의 요새 전쟁</title>
<style>
:root{
  --bg:#141a22; --panel:#1d2733; --panel2:#243140; --line:#33465c;
  --ink:#e8eef5; --ink2:#9fb2c5; --gold:#f0b43c; --accent:#4fa3e0;
  --ok:#5ec97b; --bad:#e0604f; --navy:#101820;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif;color:var(--ink);}
canvas#world{display:block;position:fixed;inset:0;touch-action:none;}
#dev{position:fixed;top:4px;left:4px;color:#0f0;font:12px monospace;display:none;z-index:99;pointer-events:none;}
.hidden{display:none !important;}
button{font-family:inherit;}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:10px 16px;font-size:15px;cursor:pointer;transition:filter .12s, transform .05s;}
.btn:hover{filter:brightness(1.2);} .btn:active{transform:scale(.97);}
.btn.primary{background:linear-gradient(180deg,#3f88c5,#2f6ea5);border-color:#5aa0d8;font-weight:700;}
.btn.gold{background:linear-gradient(180deg,#c9962f,#a4781f);border-color:#e8b64a;font-weight:700;}
.btn.danger{background:linear-gradient(180deg,#b8503f,#96402f);border-color:#d97b62;}
.btn.small{padding:6px 10px;font-size:13px;border-radius:8px;}
.btn.sel{outline:2px solid var(--gold);}
.btn:disabled{opacity:.4;cursor:default;}
/* ---------- overlay screens ---------- */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(10,14,19,.72);backdrop-filter:blur(3px);z-index:20;overflow:auto;padding:16px;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:22px;max-width:680px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 18px 60px rgba(0,0,0,.5);}
.panel h1{margin:0 0 4px;font-size:30px;letter-spacing:1px;}
.panel h2{margin:0 0 14px;font-size:21px;}
.panel h3{margin:16px 0 8px;font-size:14px;color:var(--ink2);text-transform:uppercase;letter-spacing:.08em;}
.sub{color:var(--ink2);font-size:13px;margin:2px 0 16px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cardlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;cursor:pointer;}
.card:hover{filter:brightness(1.15);}
.card.sel{outline:2px solid var(--gold);}
.card b{display:block;font-size:14px;}
.card span{font-size:12px;color:var(--ink2);}
textarea.code{width:100%;height:84px;background:var(--navy);color:#bfe0a8;border:1px solid var(--line);
  border-radius:8px;font:12px monospace;padding:8px;resize:vertical;}
input[type=text]{background:var(--navy);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:9px 12px;font-size:15px;width:100%;}
input[type=color]{width:46px;height:34px;border:none;background:none;padding:0;cursor:pointer;}
.titleArt{font-size:44px;line-height:1;margin-bottom:6px;}
/* ---------- HUD ---------- */
#hud{position:fixed;left:0;right:0;top:0;z-index:10;display:flex;gap:6px;align-items:center;
  padding:8px 10px;background:linear-gradient(180deg,rgba(13,18,24,.92),rgba(13,18,24,.55) 80%,transparent);
  pointer-events:none;flex-wrap:wrap;}
#hud>*{pointer-events:auto;}
.stat{background:rgba(20,28,38,.85);border:1px solid var(--line);border-radius:9px;
  padding:5px 11px;font-size:14px;font-weight:700;display:flex;gap:6px;align-items:center;}
.stat i{font-style:normal;font-size:13px;color:var(--ink2);font-weight:400;}
#palette{position:fixed;left:0;right:0;bottom:0;z-index:10;
  background:linear-gradient(0deg,rgba(13,18,24,.95),rgba(13,18,24,.7) 75%,transparent);
  padding:8px 10px 10px;display:flex;gap:6px;overflow-x:auto;align-items:flex-end;}
.pbtn{flex:0 0 auto;width:76px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:5px 4px 6px;cursor:pointer;text-align:center;color:var(--ink);}
.pbtn:hover{filter:brightness(1.2);}
.pbtn.sel{outline:2px solid var(--gold);background:#2c3c50;}
.pbtn canvas{display:block;margin:0 auto;}
.pbtn .n{font-size:11px;line-height:1.15;display:block;margin-top:2px;}
.pbtn .c{font-size:11px;color:var(--gold);font-weight:700;display:block;}
.pbtn .cnt{font-size:12px;color:#8fe0a0;font-weight:700;display:block;}
.pbtn:disabled{opacity:.35;}
#tip{position:fixed;z-index:30;background:rgba(12,17,23,.95);border:1px solid var(--line);border-radius:10px;
  padding:9px 12px;font-size:12.5px;max-width:250px;pointer-events:none;line-height:1.5;}
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:40;background:rgba(18,24,32,.95);
  border:1px solid var(--gold);color:var(--ink);border-radius:10px;padding:9px 18px;font-size:14px;
  font-weight:700;pointer-events:none;transition:opacity .4s;opacity:0;}
.stars{font-size:34px;letter-spacing:6px;color:var(--gold);}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:14px;margin:10px 0;}
.kv i{font-style:normal;color:var(--ink2);}
hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0;}
.help p{font-size:13.5px;line-height:1.65;color:var(--ink2);margin:6px 0;}
.help b{color:var(--ink);}
@media (max-width:640px){ .panel h1{font-size:24px;} .grid2{grid-template-columns:1fr;} }
</style>
</head>

/* ===================== MAP GENERATORS ===================== */
function genMap(preset, seed){
  const r = mulberry32(seed);
  const g = new Uint8Array(MAPW*MAPW).fill(T.GRASS);
  const at=(x,y)=>g[y*MAPW+x], set=(x,y,v)=>{ if(x>=0&&y>=0&&x<MAPW&&y<MAPW) g[y*MAPW+x]=v; };
  for(let i=0;i<40;i++){ const x=(r()*MAPW)|0, y=(r()*MAPW)|0; set(x,y,T.DIRT); if(r()<.5)set(x+1,y,T.DIRT); }
  const blob=(cx,cy,rad,type,den)=>{ for(let y=cy-rad;y<=cy+rad;y++)for(let x=cx-rad;x<=cx+rad;x++){
      const d=Math.hypot(x-cx,y-cy); if(d<=rad&&r()<(den??.8)*(1-d/rad*.5)) set(x,y,type); } };
  if(preset===0){
    for(let i=0;i<6;i++) blob((r()*MAPW)|0,(r()*MAPW)|0, 2+(r()*2|0), T.FOREST,.7);
    for(let i=0;i<3;i++) blob((r()*MAPW)|0,(r()*MAPW)|0, 2, T.HILL,.9);
  } else if(preset===1){
    const rx = 13+(r()*8|0);
    for(let y=0;y<MAPW;y++){ const w=2+((Math.sin(y*.4+seed)+1)*1.2|0);
      for(let dx=0;dx<w;dx++) set(rx+dx+((Math.sin(y*.25)*2)|0), y, T.WATER); }
    const b1=5+(r()*6|0), b2=22+(r()*7|0);
    for(const by of [b1,b2]) for(let x=rx-2;x<rx+7;x++){ if(at(Math.max(0,Math.min(MAPW-1,x)),by)===T.WATER){ set(x,by,T.BRIDGE); set(x,by+1,T.BRIDGE);} }
    for(let i=0;i<5;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.FOREST,.7);
  } else if(preset===2){
    blob(MAPW>>1,MAPW>>1,6,T.HILL,.95);
    for(let i=0;i<5;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2+(r()*2|0),T.HILL,.85);
    for(let i=0;i<4;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.ROCK,.75);
    for(let i=0;i<4;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.FOREST,.7);
  } else if(preset===3){
    for(let i=0;i<26;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2+(r()*2|0),T.FOREST,.8);
    for(let y=10;y<24;y++)for(let x=10;x<24;x++) if(Math.hypot(x-17,y-17)<7&&at(x,y)===T.FOREST) set(x,y,T.GRASS);
    for(let i=0;i<3;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.HILL,.8);
  } else if(preset===4){
    for(let y=0;y<MAPW;y++)for(let x=0;x<MAPW;x++){
      const d=Math.min(x,y,MAPW-1-x,MAPW-1-y);
      if(d<3) set(x,y,T.WATER); else if(d===3||d===4) { if(r()<.8) set(x,y,T.SAND); }
    }
    const mid=MAPW>>1;
    for(let d=0;d<5;d++){ set(mid,d,T.SAND); set(mid+1,d,T.SAND); set(mid,MAPW-1-d,T.SAND); set(mid+1,MAPW-1-d,T.SAND);
      set(d,mid,T.SAND); set(d,mid+1,T.SAND); set(MAPW-1-d,mid,T.SAND); set(MAPW-1-d,mid+1,T.SAND); }
    for(let i=0;i<4;i++) blob(8+(r()*18|0),8+(r()*18|0),2,T.FOREST,.7);
    blob(mid,mid,3,T.HILL,.8);
  } else if(preset===5){
    for(let i=0;i<MAPW;i++){
      const y1=8+((Math.sin(i*.3+seed%7)*3)|0), y2=24+((Math.cos(i*.27+seed%5)*3)|0);
      if(i%9>1){ set(i,y1,T.ROCK); set(i,y1+1,T.ROCK); set(i,y2,T.ROCK); set(i,y2+1,T.ROCK);}
      if(i%11>2){ set(y1+2,i,T.ROCK); }
    }
    for(let i=0;i<6;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.HILL,.7);
    for(let i=0;i<3;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.DIRT,.9);
  }
  for(let y=12;y<22;y++)for(let x=12;x<22;x++){ const t=at(x,y);
    if(t===T.WATER||t===T.ROCK||t===T.FOREST) set(x,y,T.DIRT); }
  return g;
}

  for(let x=x0;x<=x1;x++){a.push([x,y0]);a.push([x,y1]);}

  for(let i=0;i<360;i+=2){ const th=i*Math.PI/180;
    const rad=r*(0.72+0.28*Math.abs(Math.cos(th*2)));
    const x=Math.round(cx+Math.cos(th)*rad), y=Math.round(cy+Math.sin(th)*rad*0.95);
    const k=x+','+y; if(!seen[k]){seen[k]=1;a.push([x,y]);} } return a; }

const AudioSys = {
  ctx:null, on:(store('mute')!==true),
  ensure(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
  toggle(){ this.on=!this.on; store('mute',!this.on); },
  play(type){ if(!this.on) return; this.ensure(); const c=this.ctx; if(!c) return;
    const t=c.currentTime, g=c.createGain(); g.connect(c.destination);
    const o=c.createOscillator(); o.connect(g);
    const P={ shoot:[880,220,.06,'square',.05], hit:[220,90,.08,'sawtooth',.06],
      boom:[130,40,.3,'sawtooth',.16], build:[520,760,.09,'triangle',.09],
      sell:[440,200,.12,'triangle',.07], deploy:[300,540,.1,'square',.07],
      win:[523,1046,.5,'triangle',.14], lose:[330,110,.7,'sawtooth',.12],
      zap:[1400,300,.09,'sawtooth',.07], click:[700,700,.03,'square',.04] }[type]||[440,440,.05,'sine',.05];
    o.type=P[3]; o.frequency.setValueAtTime(P[0],t); o.frequency.exponentialRampToValueAtTime(Math.max(30,P[1]),t+P[2]);
    g.gain.setValueAtTime(P[4],t); g.gain.exponentialRampToValueAtTime(.0001,t+P[2]);
    o.start(t); o.stop(t+P[2]+.02);
    if(type==='boom'){ // noise layer
      const len=c.sampleRate*.25, buf=c.createBuffer(1,len,c.sampleRate), d=buf.getChannelData(0);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
      const n=c.createBufferSource(); n.buffer=buf; const ng=c.createGain(); ng.gain.value=.12;
      n.connect(ng); ng.connect(c.destination); n.start(t); }
  }
};

// grid cost: terrain walk cost; wall tiles passable with penalty (units will attack through)
function findPath(sx,sy,tx,ty,G,friendly){
  sx|=0;sy|=0;tx|=0;ty|=0;
  const N=MAPW, size=N*N;
  const gCost=new Float32Array(size).fill(Infinity);
  const from=new Int32Array(size).fill(-1);
  const closed=new Uint8Array(size);
  const si=sy*N+sx, ti=ty*N+tx;
  // binary heap
  const heap=[], hpush=(i,f)=>{ heap.push([f,i]); let c=heap.length-1;
    while(c>0){ const p=(c-1)>>1; if(heap[p][0]<=heap[c][0])break; [heap[p],heap[c]]=[heap[c],heap[p]]; c=p; } };
  const hpop=()=>{ const top=heap[0], lastEl=heap.pop();
    if(heap.length){ heap[0]=lastEl; let c=0; for(;;){ let l=c*2+1,r=l+1,m=c;
      if(l<heap.length&&heap[l][0]<heap[m][0])m=l; if(r<heap.length&&heap[r][0]<heap[m][0])m=r;
      if(m===c)break; [heap[m],heap[c]]=[heap[c],heap[m]]; c=m; } } return top; };
  gCost[si]=0; hpush(si,0);
  const tileCost=(i)=>{
    const b=G.bgrid[i];
    if(b&&b.kind==='bridgeB') return 1; // bridges are always walkable
    const t=G.terrain[i]; let c=WALK_COST[t]; if(c===0) return 0;
    if(b){
      if(friendly){ // defenders never carve through their own works
        if(b.kind==='moat') c+=2.6;
        else if(!PASSIVE[b.kind]) return 0;
      } else {
        if(WALLISH[b.kind]) c+=5+b.hp/220;
        else if(b.kind==='hq'||b.kind==='tower') c+=8+b.hp/180;
        else if(b.kind==='moat') c+=2.6; }
    }
    return c; };
  let guard=0;
  while(heap.length){
    if(++guard>9000) break;
    const [f,i]=hpop(); if(closed[i])continue; closed[i]=1;
    if(i===ti) break;
    const x=i%N,y=(i/N)|0;
    for(let d=0;d<4;d++){
      const nx=x+[1,-1,0,0][d], ny=y+[0,0,1,-1][d];
      if(nx<0||ny<0||nx>=N||ny>=N)continue;
      const ni=ny*N+nx; if(closed[ni])continue;
      const c=tileCost(ni); if(c===0)continue;
      const ng=gCost[i]+c;
      if(ng<gCost[ni]){ gCost[ni]=ng; from[ni]=i;
        hpush(ni, ng + Math.abs(nx-tx)+Math.abs(ny-ty)); }
    }
  }
  if(from[ti]===-1&&ti!==si) return null;
  const path=[]; let cur=ti;
  while(cur!==-1&&cur!==si){ path.push([cur%N+0.5,((cur/N)|0)+0.5]); cur=from[cur]; }
  path.reverse(); return path;
}

function renderClouds(time){

/* ---------- battlefield decals (persistent environment damage) ---------- */

function stampDecal(type,wx,wy,s,col){

function prism(g,w,d,h,top,left,right){

  g.strokeStyle=PAL.outline; g.lineWidth=1; g.beginPath();
  g.moveTo(0,-d-h); g.lineTo(w,-h); g.lineTo(w,0); g.lineTo(0,d); g.lineTo(-w,0); g.lineTo(-w,-h); g.closePath();
  g.stroke();

function prismAt(g,ox,oy,w,d,h,top,left,right){

function brickLines(g,w,h,col){ g.strokeStyle=col; g.lineWidth=.8;

function wateryNeighbors(G,x,y){
  const chk=(nx,ny)=>{ if(nx<0||ny<0||nx>=MAPW||ny>=MAPW)return 0;
    const b=G.bgrid[ny*MAPW+nx];
    if(b&&(b.kind==='moat'||b.kind==='bridgeB'))return 1;
    return G.terrain[ny*MAPW+nx]===T.WATER?1:0; };
  return {px:chk(x+1,y), nx:chk(x-1,y), py:chk(x,y+1), ny:chk(x,y-1)};
}
function wallishNeighbors(G,x,y){

    const b=G.bgrid[ny*MAPW+nx];
    return b&&(WALLISH[b.kind]||b.kind==='tower'||b.kind==='hq')?1:0; };

const SPR={}, SS=2.4; // supersample factor for crisp downscale
function sprite(key,w,h,ay,drawFn){
  let s=SPR[key];
  if(!s){ const c=document.createElement('canvas');
    c.width=Math.ceil(w*SS); c.height=Math.ceil(h*SS);
    const g=c.getContext('2d'); g.scale(SS,SS); g.translate(w/2,ay);
    drawFn(g); s={c,w,h,ay}; SPR[key]=s; }
  return s;
}

/* --- texture helpers (draw onto prism faces) --- */
function faceCourses(g,w,d,h,rows,col,alpha){
  // horizontal masonry courses on both prism faces
  g.strokeStyle=col; g.globalAlpha=alpha??.5; g.lineWidth=.65;
  for(let i=1;i<rows;i++){ const t=i/rows;
    g.beginPath(); g.moveTo(0,d-h*t); g.lineTo(w,-h*t); g.stroke();
    g.beginPath(); g.moveTo(0,d-h*t); g.lineTo(-w,-h*t); g.stroke(); }
  g.globalAlpha=1;
}
function faceJoints(g,w,d,h,rows,cols,col,alpha){
  g.strokeStyle=col; g.globalAlpha=alpha??.4; g.lineWidth=.6;
  for(let side of [1,-1]) for(let i=0;i<rows;i++){
    for(let j=0;j<cols;j++){ const u=(j+(i%2?0.5:1))/(cols+0.5); if(u>=1)continue;
      const x=side*w*u, yb=d*(1-u);
      g.beginPath(); g.moveTo(x,yb-h*i/rows); g.lineTo(x,yb-h*(i+1)/rows); g.stroke(); } }
  g.globalAlpha=1;
}
function stonePatches(g,w,d,h,seed,tone1,tone2){
  const r=mulberry32(seed);
  for(let side of [1,-1]) for(let i=0;i<5;i++){
    if(r()<.45)continue;
    const u0=r()*.7, u1=u0+.12+r()*.15, t0=(r()*.8)|0? r()*.75 : r()*.75, t1=t0+.12+r()*.1;
    const p=(u)=>[side*w*u, d*(1-u)];
    const [xa,ya]=p(u0),[xb,yb]=p(u1);
    g.fillStyle=r()<.5?tone1:tone2; g.globalAlpha=.5;
    g.beginPath(); g.moveTo(xa,ya-h*t0); g.lineTo(xb,yb-h*t0);
    g.lineTo(xb,yb-h*t1); g.lineTo(xa,ya-h*t1); g.closePath(); g.fill();
  }
  g.globalAlpha=1;
}
function aoBase(g,w,d){ // contact shadow ring at foundation

function coneRoof(g,r,y,hh,col){

  } else if(id==='ram'){
    ctx.strokeStyle='#4a3722'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-7,-2); ctx.lineTo(-7+leg*.4,2); ctx.moveTo(7,-2); ctx.lineTo(7-leg*.4,2); ctx.stroke();
    ctx.fillStyle='#7a5c3c'; ctx.fillRect(-10,-13+bob*.4,20,10);
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.strokeRect(-10,-13+bob*.4,20,10);
    ctx.fillStyle='#5c452e'; ctx.beginPath();
    ctx.moveTo(-10,-13+bob*.4); ctx.lineTo(0,-18+bob*.4); ctx.lineTo(10,-13+bob*.4); ctx.closePath(); ctx.fill();
    const swing=Math.sin(time*6+u.seed)*2;
    ctx.strokeStyle='#3d2e1c'; ctx.lineWidth=3.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-12+swing,-8); ctx.lineTo(13+swing,-8); ctx.stroke(); ctx.lineCap='butt';
    ctx.fillStyle='#8a949c'; ctx.beginPath(); ctx.arc(14+swing,-8,2.4,0,7); ctx.fill();
    ctx.fillStyle=col; ctx.fillRect(-10,-15+bob*.4,20,2.4);
  } else if(id==='siegegun'){
    ctx.fillStyle='#4a4038'; ctx.beginPath(); ctx.arc(-5,-3,4.4,0,7); ctx.arc(5,-3,4.4,0,7); ctx.fill();
    ctx.strokeStyle='#2e281f'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(-5,-3,4.4,0,7); ctx.moveTo(9.4,-3); ctx.arc(5,-3,4.4,0,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,-7.4); ctx.lineTo(-5,1.4); ctx.moveTo(5,-7.4); ctx.lineTo(5,1.4); ctx.stroke();
    const a=u.faceAng||0, rec=flash*8;
    ctx.strokeStyle='#2a3038'; ctx.lineWidth=3.4;
    ctx.beginPath(); ctx.moveTo(-3-Math.cos(a)*rec*.4,-6);
    ctx.lineTo(Math.cos(a)*(13-rec),-8+Math.sin(a)*5); ctx.stroke();
    ctx.fillStyle=col; ctx.fillRect(-5.5,-10,11,4.4);
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.strokeRect(-5.5,-10,11,4.4);
    if(flash>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,220,120,'+flash*7+')';
      ctx.beginPath(); ctx.arc(Math.cos(a)*14,-8+Math.sin(a)*5,4.5,0,7); ctx.fill(); ctx.restore(); }
  } else { // infantry
    // legs
    ctx.strokeStyle=shade(col,.5); ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(-1.4,-3+bob*.5); ctx.lineTo(-1.4-leg*.5,1.4);
    ctx.moveTo(1.4,-3+bob*.5); ctx.lineTo(1.4+leg*.5,1.4); ctx.stroke();
    // body
    ctx.fillStyle=col; ctx.beginPath();
    ctx.moveTo(-3.4,-3+bob); ctx.lineTo(-3.4,-11+bob); ctx.arc(0,-11+bob,3.4,Math.PI,0); ctx.lineTo(3.4,-3+bob);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    // belt
    ctx.fillStyle=shade(col,.55); ctx.fillRect(-3.4,-6+bob,6.8,1.4);
    // head + helmet by era
    ctx.fillStyle='#e4c49a'; ctx.beginPath(); ctx.arc(0,-14.5+bob,2.8,0,7); ctx.fill();
    if(u.era===0){ ctx.fillStyle='#c8ccd4'; ctx.beginPath(); ctx.arc(0,-15.3+bob,2.9,Math.PI,0); ctx.fill();
      ctx.fillRect(-2.9,-15.3+bob,5.8,1); }
    else if(u.era===1){ ctx.fillStyle='#2e3238'; ctx.beginPath();
      ctx.ellipse(0,-16.6+bob,3.4,1.4,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(0,-15.6+bob,2.4,Math.PI,0); ctx.fill(); }
    else { ctx.fillStyle=shade(col,.8); ctx.beginPath(); ctx.arc(0,-15.2+bob,2.9,Math.PI,0); ctx.fill();
      ctx.fillRect(-2.9,-15.2+bob,5.8,1.2); }
    // weapon
    ctx.strokeStyle='#c8ccd4'; ctx.lineWidth=1.4;
    if(id==='archer'){ ctx.strokeStyle='#8a6a44'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.arc(5.5,-10+bob,4.5,-1.25,1.25); ctx.stroke();
      ctx.strokeStyle='#d8dde4'; ctx.lineWidth=.7;
      ctx.beginPath(); ctx.moveTo(5.5+4.5*Math.cos(-1.25),-10+bob+4.5*Math.sin(-1.25));
      ctx.lineTo(5.5+4.5*Math.cos(1.25),-10+bob+4.5*Math.sin(1.25)); ctx.stroke(); }
    else if(id==='sword'){ ctx.beginPath(); ctx.moveTo(4,-8+bob); ctx.lineTo(10,-16+bob); ctx.stroke();
      ctx.strokeStyle='#8a6a44'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(4,-8+bob); ctx.lineTo(5.4,-10+bob); ctx.stroke(); }
    else if(id==='shield'){ ctx.fillStyle=shade(col,1.25); ctx.beginPath();
      ctx.ellipse(-5.5,-9+bob,3.4,5,0,0,7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
      ctx.fillStyle=shade(col,.6); ctx.beginPath(); ctx.arc(-5.5,-9+bob,1.4,0,7); ctx.fill();
      ctx.strokeStyle='#c8ccd4'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(3,-8+bob); ctx.lineTo(8,-11+bob); ctx.stroke(); }
    else if(id==='sapper'||id==='c4'){ ctx.fillStyle='#e0604f'; ctx.fillRect(3.4,-11+bob,5,5.5);
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.strokeRect(3.4,-11+bob,5,5.5);
      ctx.strokeStyle='#f0b43c'; ctx.beginPath(); ctx.moveTo(6,-11+bob); ctx.lineTo(7.4,-14+bob); ctx.stroke();
      if(Math.sin(time*9)>0){ ctx.fillStyle='#ffd060'; ctx.beginPath(); ctx.arc(7.4,-14.5+bob,1,0,7); ctx.fill(); } }
    else if(id==='grenadier'){ ctx.strokeStyle='#3a3f45'; ctx.lineWidth=1.7;
      ctx.beginPath(); ctx.moveTo(2,-9+bob); ctx.lineTo(8,-11+bob); ctx.stroke();
      ctx.fillStyle='#3a3f45'; ctx.beginPath(); ctx.arc(6,-14+bob,2.2,0,7); ctx.fill(); }
    else { // rifles
      ctx.strokeStyle='#3a3f45'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(1.4,-9.5+bob); ctx.lineTo(9.5,-11.5+bob); ctx.stroke();
      ctx.strokeStyle='#6b5334'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(1.4,-9.5+bob); ctx.lineTo(4,-10+bob); ctx.stroke(); }
    if(flash>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,220,120,'+flash*7+')';
      ctx.beginPath(); ctx.arc(10.5,-11.5+bob,3,0,7); ctx.fill(); ctx.restore(); }
  }
  if(u.hp<u.maxHp&&u.hp>0) hpBarLocal(ctx,0,-23,16,u.hp/u.maxHp);
  if(u.slow>0){ ctx.fillStyle='rgba(120,180,240,.7)'; ctx.beginPath(); ctx.arc(0,-26,2,0,7); ctx.fill(); }
  ctx.restore();
}

/* ---------- projectiles & particles ---------- */
function drawProjectile(p){
  const [sx,sy]=w2s(p.x,p.y); const z=cam.zoom;
  if(sx<-60||sy<-80||sx>VW+60||sy>VH+60)return;
  ctx.save(); ctx.translate(sx,sy-(p.h||0)*10*z); ctx.scale(z,z);
  if(p.type==='arrow'||p.type==='bolt'){
    const a=Math.atan2(p.vy*.5-(p.dh||0)*.8, p.vx); // tilt follows the arc
    ctx.strokeStyle=p.type==='bolt'?'#e8e4d8':'#c8b490'; ctx.lineWidth=p.type==='bolt'?2.2:1.4;
    ctx.beginPath(); ctx.moveTo(-Math.cos(a)*6,-Math.sin(a)*6); ctx.lineTo(Math.cos(a)*6,Math.sin(a)*6); ctx.stroke();
    ctx.fillStyle='#d8dde4'; ctx.beginPath(); ctx.arc(Math.cos(a)*6,Math.sin(a)*6,1.2,0,7); ctx.fill();
    ctx.strokeStyle='rgba(200,180,140,.35)'; ctx.lineWidth=.8; // fletching hint
    ctx.beginPath(); ctx.moveTo(-Math.cos(a)*6,-Math.sin(a)*6);
    ctx.lineTo(-Math.cos(a)*8.4-Math.sin(a)*2,-Math.sin(a)*8.4+Math.cos(a)*2); ctx.stroke();
  } else if(p.type==='bullet'||p.type==='tracer'){
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(255,215,110,.95)'; ctx.lineWidth=p.type==='tracer'?2.2:1.5;
    const a=Math.atan2(p.vy,p.vx*2);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-Math.cos(a)*11,-Math.sin(a)*11); ctx.stroke();
  } else if(p.type==='ball'){ ctx.fillStyle='#2e3238'; ctx.beginPath(); ctx.arc(0,0,3.2,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.beginPath(); ctx.arc(-1,-1,1.2,0,7); ctx.fill();
  } else if(p.type==='lob'){ ctx.fillStyle='#3e444c'; ctx.beginPath(); ctx.arc(0,0,4,0,7); ctx.fill();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(240,180,60,.8)'; ctx.beginPath(); ctx.arc(1,-1,1.8,0,7); ctx.fill();
  } else if(p.type==='rocket'){ const a=Math.atan2(p.vy,p.vx*2);
    ctx.rotate(a);
    ctx.fillStyle='#d8dde4'; ctx.fillRect(-3,-1.6,7,3.2);
    ctx.fillStyle='#c04a3a'; ctx.beginPath(); ctx.moveTo(4,-1.6); ctx.lineTo(6.4,0); ctx.lineTo(4,1.6); ctx.fill();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,170,60,.9)'; ctx.beginPath(); ctx.arc(-4,0,2.2,0,7); ctx.fill();
  } else if(p.type==='oil'){ ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(240,170,60,.95)'; ctx.beginPath(); ctx.arc(0,0,3,0,7); ctx.fill(); }
  ctx.restore();
  if(p.h>0.1){ ctx.fillStyle='rgba(10,15,20,.22)';
    ctx.beginPath(); ctx.ellipse(sx,sy,3*z,1.5*z,0,0,7); ctx.fill(); }
}
function drawZap(z_){
  const [ax,ay]=w2s(z_.x1,z_.y1), [bx,by]=w2s(z_.x2,z_.y2);
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const [w,a] of [[4,z_.life*.8],[1.6,z_.life*2.2]]){
    ctx.strokeStyle='rgba(140,220,255,'+Math.min(1,a)+')'; ctx.lineWidth=w*cam.zoom;
    ctx.beginPath(); ctx.moveTo(ax,ay-30*cam.zoom);
    for(let i=1;i<4;i++){ const t=i/4;
      ctx.lineTo(lerp(ax,bx,t)+(Math.random()*12-6)*cam.zoom, lerp(ay-30*cam.zoom,by-8*cam.zoom,t)+(Math.random()*9-4)*cam.zoom); }
    ctx.lineTo(bx,by-8*cam.zoom); ctx.stroke();
  }
  ctx.restore();
}
function drawParticles(parts){
  for(const p of parts){ const [sx,sy]=w2s(p.x,p.y); const z=cam.zoom;
    if(sx<-40||sy<-60||sx>VW+40||sy>VH+40)continue;
    const lf=clamp(p.life/p.maxLife,0,1);
    if(p.kind==='ring'){
      ctx.save(); ctx.globalAlpha=lf*.7; ctx.strokeStyle=p.color; ctx.lineWidth=2.4*z*lf;
      const r=(1-lf)*p.size*z;
      ctx.beginPath(); ctx.ellipse(sx,sy,r,r*.5,0,0,7); ctx.stroke(); ctx.restore();
    } else if(p.kind==='flash'){
      ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=lf;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*lf,0,7); ctx.fill(); ctx.restore();
    } else if(p.kind==='smoke'){
      ctx.save(); ctx.globalAlpha=lf*.4; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*(1.6-lf*.9),0,7); ctx.fill(); ctx.restore();
    } else if(p.kind==='fire'){
      ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=lf;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*lf,0,7); ctx.fill(); ctx.restore();
    } else if(p.kind==='ragdoll'){
      // airborne tumbling body
      ctx.fillStyle='rgba(10,15,20,.25)';
      ctx.beginPath(); ctx.ellipse(sx,sy,4.2*z,1.9*z,0,0,7); ctx.fill();
      ctx.save(); ctx.translate(sx,sy-(p.h||0)*10*z); ctx.scale(z*1.15,z*1.15);
      ctx.rotate((p.maxLife-p.life)*p.spin);
      ctx.globalAlpha=clamp(p.life/.35,0,1);
      ctx.fillStyle=p.color; ctx.beginPath();
      ctx.moveTo(-3,3); ctx.lineTo(-3,-3); ctx.arc(0,-3,3,Math.PI,0); ctx.lineTo(3,3); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      ctx.fillStyle='#e4c49a'; ctx.beginPath(); ctx.arc(0,-5.6,2.2,0,7); ctx.fill();
      ctx.strokeStyle=shade(p.color,.6); ctx.lineWidth=1.6; // flailing limbs
      ctx.beginPath(); ctx.moveTo(-2,2); ctx.lineTo(-4.6,6); ctx.moveTo(2,2); ctx.lineTo(5.2,5); ctx.stroke();
      ctx.restore();
    } else {
      ctx.globalAlpha=lf; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*(0.5+0.5*lf),0,7); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  ctx.globalAlpha=1;
}

/* ---------- overlays ---------- */
function drawTileHighlight(x,y,color,alpha){
  const [sx,sy]=w2s(x+0.5,y+0.5); const z=cam.zoom;
  const G=Battle.G||BuildState.G; const rz=G?tileRaise(G,x,y):0;
  ctx.save(); ctx.globalAlpha=alpha??.4; ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(sx,sy-rz*z-TH/2*z); ctx.lineTo(sx+TW/2*z,sy-rz*z);
  ctx.lineTo(sx,sy-rz*z+TH/2*z); ctx.lineTo(sx-TW/2*z,sy-rz*z); ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* ================= TURRET MACHINERY (detailed, aimed, animated) ================= */
function drawTurret(era,ti,ang,rec,flash,time,c1){
  const bx=Math.cos(ang), by=Math.sin(ang);
  const dark=PAL.eraDark[era], body=PAL.eraBody[era];
  if(era===0){
    if(ti===0){ // archer on the crown
      ctx.fillStyle='#6d5334'; ctx.beginPath(); ctx.ellipse(0,1,7.5,3.6,0,0,7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      ctx.fillStyle=c1; ctx.beginPath(); // tunic
      ctx.moveTo(-2.8,0); ctx.lineTo(-2.8,-7); ctx.arc(0,-7,2.8,Math.PI,0); ctx.lineTo(2.8,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      ctx.fillStyle='#e4c49a'; ctx.beginPath(); ctx.arc(0,-10.5,2.4,0,7); ctx.fill();
      ctx.fillStyle='#c8ccd4'; ctx.beginPath(); ctx.arc(0,-11.2,2.4,Math.PI,0); ctx.fill();
      ctx.fillStyle='#5c452e'; ctx.fillRect(-4.4,-8.5,1.6,6); // quiver
      ctx.strokeStyle='#8a6a44'; ctx.lineWidth=1.5; // drawn bow aimed at target
      ctx.beginPath(); ctx.arc(bx*5,-6+by*2.5,4.5,ang-1.15,ang+1.15); ctx.stroke();
      ctx.strokeStyle='#e8e4d8'; ctx.lineWidth=.6;
      const sx1=bx*5+Math.cos(ang-1.15)*4.5, sy1=-6+by*2.5+Math.sin(ang-1.15)*4.5;
      const sx2=bx*5+Math.cos(ang+1.15)*4.5, sy2=-6+by*2.5+Math.sin(ang+1.15)*4.5;
      ctx.beginPath(); ctx.moveTo(sx1,sy1); ctx.lineTo(bx*(5-rec*.4)-bx*3,-6+by*2.5-by*1.5); ctx.lineTo(sx2,sy2); ctx.stroke();
    } else if(ti===1){ // ballista
      ctx.fillStyle='#5c452e'; ctx.beginPath(); ctx.ellipse(0,1,6.5,3.2,0,0,7); ctx.fill(); // swivel
      ctx.strokeStyle='#4a3722'; ctx.lineWidth=3.2; // stock
      ctx.beginPath(); ctx.moveTo(-bx*7,-2-by*3.5); ctx.lineTo(bx*11,-2+by*5.5); ctx.stroke();
      ctx.strokeStyle='#6d5334'; ctx.lineWidth=2; // bow limbs
      ctx.beginPath(); ctx.moveTo(bx*8-by*8,-2+by*4+bx*4*.5);
      ctx.quadraticCurveTo(bx*11,-2+by*5.5, bx*8+by*8,-2+by*4-bx*4*.5); ctx.stroke();
      ctx.strokeStyle='#e8e4d8'; ctx.lineWidth=.7; // string + bolt
      ctx.beginPath(); ctx.moveTo(bx*8-by*8,-2+by*4+bx*2);
      ctx.lineTo(bx*(4-rec*.5),-2+by*2); ctx.lineTo(bx*8+by*8,-2+by*4-bx*2); ctx.stroke();
      ctx.strokeStyle='#d8c8a8'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(bx*(4-rec*.5),-2+by*2); ctx.lineTo(bx*12,-2+by*6); ctx.stroke();
    } else if(ti===2){ // catapult with swinging arm
      ctx.strokeStyle='#4a3722'; ctx.lineWidth=2.6; // A-frame
      ctx.beginPath(); ctx.moveTo(-6,2); ctx.lineTo(-2,-8); ctx.lineTo(2,2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(6,2); ctx.lineTo(2,-8); ctx.stroke();
      ctx.fillStyle='#5c452e'; ctx.fillRect(-8,1,16,2.6); // base beam
      const swing=flash>0?flash/0.15:0; // 1 right after firing
      const armA=lerp(-2.4,-0.6,swing); // cocked back -> thrown forward
      const ax=Math.cos(armA)*11*bx- Math.sin(armA)*0, ay2=-8+Math.sin(armA)*11;
      ctx.strokeStyle='#6d5334'; ctx.lineWidth=2.4; // throwing arm
      ctx.beginPath(); ctx.moveTo(-bx*4,-6); ctx.lineTo(bx*Math.cos(armA)*12,-8+Math.sin(armA)*10); ctx.stroke();
      ctx.fillStyle='#3d454e'; // counterweight
      ctx.fillRect(-bx*6-2.4,-5,4.8,4.4);
      ctx.fillStyle='#5c452e'; ctx.beginPath(); // spoon cup
      ctx.arc(bx*Math.cos(armA)*12,-8+Math.sin(armA)*10,2.6,0,7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.6; ctx.stroke();
    } else { // oil cauldron + crane
      ctx.strokeStyle='#4a3722'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-7,2); ctx.lineTo(-7,-9); ctx.lineTo(2,-11); ctx.stroke();
      ctx.fillStyle='#3a3f45'; ctx.beginPath(); ctx.ellipse(0,0,9,5.5,0,0,7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
      const gl=.6+Math.sin(time*5)*.25;
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(232,160,60,'+gl+')'; ctx.beginPath(); ctx.ellipse(0,-1,6,3.4,0,0,7); ctx.fill();
      ctx.fillStyle='rgba(255,220,140,'+gl*.7+')'; ctx.beginPath(); ctx.ellipse(0,-1.5,3,1.7,0,0,7); ctx.fill();
      ctx.restore();
      ctx.strokeStyle='#2a3038'; ctx.lineWidth=.8; // chain
      ctx.beginPath(); ctx.moveTo(2,-11); ctx.lineTo(0,-5); ctx.stroke();
    }
  } else if(era===1){
    if(ti===0){ // musketeer at post
      ctx.fillStyle=dark; ctx.beginPath(); ctx.ellipse(0,1,7,3.4,0,0,7); ctx.fill();
      ctx.fillStyle=c1; ctx.beginPath();
      ctx.moveTo(-2.8,0); ctx.lineTo(-2.8,-7); ctx.arc(0,-7,2.8,Math.PI,0); ctx.lineTo(2.8,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      ctx.fillStyle='#e4c49a'; ctx.beginPath(); ctx.arc(0,-10.5,2.4,0,7); ctx.fill();
      ctx.fillStyle='#2e3238'; ctx.beginPath(); ctx.ellipse(0,-12.2,3,1.1,0,0,7); ctx.fill(); // tricorne
      ctx.strokeStyle='#2a3038'; ctx.lineWidth=1.6; // long musket
      ctx.beginPath(); ctx.moveTo(-bx*2,-7); ctx.lineTo(bx*(13-rec),-7+by*6); ctx.stroke();
      ctx.strokeStyle='#6b5334'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(-bx*2,-7); ctx.lineTo(bx*3,-7+by*1.5); ctx.stroke();
      ctx.strokeStyle='#8a949c'; ctx.lineWidth=.9; // fork rest
      ctx.beginPath(); ctx.moveTo(bx*6,-7+by*3); ctx.lineTo(bx*6,1); ctx.stroke();
    } else if(ti===1){ // cannon on carriage
      ctx.fillStyle='#5c452e'; ctx.beginPath(); // carriage cheek
      ctx.moveTo(-bx*7-3,1); ctx.lineTo(bx*3,-4+by*1.5); ctx.lineTo(bx*3+3,1); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      const wx2=-bx*3; // spoked wheel
      ctx.strokeStyle='#4a3722'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.ellipse(wx2,-1,4.4,4.4,0,0,7); ctx.stroke();
      for(let s2=0;s2<3;s2++){ const wa=s2*Math.PI/3+time*(flash>0?4:0);
        ctx.beginPath(); ctx.moveTo(wx2-Math.cos(wa)*4,-1-Math.sin(wa)*4);
        ctx.lineTo(wx2+Math.cos(wa)*4,-1+Math.sin(wa)*4); ctx.stroke(); }
      ctx.strokeStyle='#23292f'; ctx.lineWidth=5; // barrel
      ctx.beginPath(); ctx.moveTo(-bx*(3+rec*.5),-4-by*1); ctx.lineTo(bx*(15-rec),-4+by*7); ctx.stroke();
      ctx.strokeStyle='#3d454e'; ctx.lineWidth=1; // reinforcement rings
      for(const t2 of [.35,.6,.85]){ const rx2=lerp(-bx*3,bx*15,t2), ry2=lerp(-4-by*1,-4+by*7,t2);
        ctx.beginPath(); ctx.moveTo(rx2-by*3,ry2-2); ctx.lineTo(rx2+by*3,ry2+2); ctx.stroke(); }
    } else if(ti===2){ // mortar
      ctx.fillStyle='#3d454e'; ctx.beginPath(); ctx.ellipse(0,1.5,8.5,4,0,0,7); ctx.fill(); // base plate
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=6.4; ctx.lineCap='round'; // stubby tube at high angle
      ctx.beginPath(); ctx.moveTo(-bx*2,1); ctx.lineTo(bx*7,-11+by*2); ctx.stroke(); ctx.lineCap='butt';
      ctx.strokeStyle='#454b52'; ctx.lineWidth=1.2; // muzzle ring
      ctx.beginPath(); ctx.ellipse(bx*7,-11+by*2,3,1.6,ang,0,7); ctx.stroke();
      ctx.strokeStyle='#8a949c'; ctx.lineWidth=1; // bipod
      ctx.beginPath(); ctx.moveTo(bx*3,-5); ctx.lineTo(bx*3-3,2); ctx.moveTo(bx*3,-5); ctx.lineTo(bx*3+3,2); ctx.stroke();
      ctx.fillStyle='#5c452e'; ctx.fillRect(-8.5,-3,3.6,4); // shell crate
      ctx.fillStyle='#2e3238'; ctx.beginPath(); ctx.arc(-6.7,-3.6,1.1,0,7); ctx.arc(-7.8,-3.2,1.1,0,7); ctx.fill();
    } else { // gatling
      ctx.strokeStyle='#4a3722'; ctx.lineWidth=1.6; // tripod
      ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(-4,2); ctx.moveTo(0,-4); ctx.lineTo(4,2); ctx.moveTo(0,-4); ctx.lineTo(-1,2.5); ctx.stroke();
      const spin=time*14;
      ctx.strokeStyle='#23292f'; ctx.lineWidth=1.6; // rotating barrel cluster
      for(let i=0;i<3;i++){ const off=Math.sin(spin+i*2.1)*1.6;
        ctx.beginPath(); ctx.moveTo(-bx*1,-5+off*.4); ctx.lineTo(bx*(13-rec),-5+by*6+off); ctx.stroke(); }
      ctx.strokeStyle='#3d454e'; ctx.lineWidth=1; // hoops
      for(const t2 of [.4,.75]){ ctx.beginPath();
        ctx.ellipse(lerp(0,bx*13,t2),lerp(-5,-5+by*6,t2),1.8,2.6,ang,0,7); ctx.stroke(); }
      ctx.fillStyle='#5c452e'; ctx.fillRect(-bx*4-2,-9,4,4.4); // hopper
      ctx.strokeStyle='#8a949c'; ctx.lineWidth=1.1; // crank spinning
      ctx.beginPath(); ctx.arc(-bx*3,-4,2.2,spin,spin+4.6); ctx.stroke();
    }
  } else {
    if(ti===0){ // MG nest
      ctx.fillStyle='#565c64'; ctx.beginPath(); // gun shield
      ctx.moveTo(bx*3-by*5,-3+by*1.5+bx*2.5); ctx.lineTo(bx*3+by*5,-3+by*1.5-bx*2.5);
      ctx.lineTo(bx*3+by*5,-10+by*1.5-bx*2.5); ctx.lineTo(bx*3-by*5,-10+by*1.5+bx*2.5); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=2.2;
      ctx.beginPath(); ctx.moveTo(bx*2,-6.5+by*1); ctx.lineTo(bx*(14-rec),-6.5+by*6.5); ctx.stroke();
      ctx.strokeStyle='#454b52'; ctx.lineWidth=3.4; // cooling jacket
      ctx.beginPath(); ctx.moveTo(bx*3,-6.5+by*1.5); ctx.lineTo(bx*8,-6.5+by*4); ctx.stroke();
      ctx.fillStyle='#3d454e'; ctx.fillRect(-by*4-1.6,-8+bx*2,3.2,4); // ammo box
      ctx.strokeStyle='#d8b23c'; ctx.lineWidth=.8; // belt
      ctx.beginPath(); ctx.moveTo(-by*4,-5.5+bx*2); ctx.quadraticCurveTo(bx*1-by*2,-3, bx*3,-6); ctx.stroke();
    } else if(ti===1){ // sniper platform
      ctx.fillStyle='#565c64'; ctx.beginPath(); ctx.ellipse(0,0,6.5,3.2,0,0,7); ctx.fill();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=1.8; // long barrel
      ctx.beginPath(); ctx.moveTo(-bx*4,-5-by*2); ctx.lineTo(bx*(19-rec),-5+by*9.5); ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=1; // muzzle brake
      ctx.beginPath(); ctx.moveTo(bx*17-by*2,-5+by*8.5-bx*1); ctx.lineTo(bx*17+by*2,-5+by*8.5+bx*1); ctx.stroke();
      ctx.fillStyle='#2e3238'; ctx.fillRect(-bx*2-2,-9.5,4,2.6); // scope
      ctx.save(); ctx.globalCompositeOperation='lighter'; // lens glint
      ctx.fillStyle='rgba(140,220,255,'+(.4+.3*Math.sin(time*3))+')';
      ctx.beginPath(); ctx.arc(-bx*2+1.4,-8.2,.9,0,7); ctx.fill(); ctx.restore();
      ctx.strokeStyle='#8a949c'; ctx.lineWidth=.9; // bipod
      ctx.beginPath(); ctx.moveTo(bx*8,-5+by*4); ctx.lineTo(bx*8-2.5,1); ctx.moveTo(bx*8,-5+by*4); ctx.lineTo(bx*8+2.5,1); ctx.stroke();
    } else if(ti===2){ // heavy artillery
      ctx.fillStyle='#4a5058'; ctx.beginPath(); ctx.ellipse(0,1,8,4,0,0,7); ctx.fill(); // mount
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
      ctx.strokeStyle='#3d454e'; ctx.lineWidth=2.2; // split trails
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-bx*8-by*3,3-by*4);
      ctx.moveTo(0,0); ctx.lineTo(-bx*8+by*3,3+by*4); ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=4.6; // long barrel elevated
      ctx.beginPath(); ctx.moveTo(-bx*(2+rec*.6),-3); ctx.lineTo(bx*16,-12+by*6); ctx.stroke();
      ctx.strokeStyle='#454b52'; ctx.lineWidth=2; // recoil cylinder
      ctx.beginPath(); ctx.moveTo(-bx*1,-1); ctx.lineTo(bx*9,-7+by*3.5); ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=1.2; // muzzle brake slots
      ctx.beginPath(); ctx.moveTo(bx*14-by*3,-11+by*5.5-bx*1.5); ctx.lineTo(bx*14+by*3,-11+by*5.5+bx*1.5);
      ctx.moveTo(bx*15.5-by*3,-11.7+by*5.8-bx*1.5); ctx.lineTo(bx*15.5+by*3,-11.7+by*5.8+bx*1.5); ctx.stroke();
    } else { // tesla coil
      ctx.strokeStyle='#7ec8e8'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(-6,2); ctx.lineTo(0,-10); ctx.lineTo(6,2); ctx.stroke();
      ctx.strokeStyle='#5a8ba0'; ctx.lineWidth=.9;
      for(let i=0;i<3;i++){ const y2=-2-i*2.6;
        ctx.beginPath(); ctx.moveTo(-4+i*1.1,y2); ctx.lineTo(4-i*1.1,y2); ctx.stroke(); }
      const pulse=(time*2)%1;
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(120,200,240,'+(0.8-pulse*.6)+')';
      ctx.beginPath(); ctx.arc(0,-12,3.5+pulse*3,0,7); ctx.fill();
      for(let i=0;i<2;i++){ const sa=time*7+i*3.1; // crawling sparks
        ctx.strokeStyle='rgba(160,230,255,.8)'; ctx.lineWidth=.9;
        ctx.beginPath(); ctx.moveTo(Math.cos(sa)*3,-12+Math.sin(sa)*2);
        ctx.lineTo(Math.cos(sa)*5+1,-12+Math.sin(sa)*3.4-1); ctx.stroke(); }
      ctx.restore();
      ctx.fillStyle='#a8e4ff'; ctx.beginPath(); ctx.arc(0,-12,3.2,0,7); ctx.fill();
    }
  }
  // muzzle flash (gunpowder & modern only; tesla excluded)
  if(flash>0&&era>0&&!(era===2&&ti===3)){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,220,120,'+flash*6+')';
    const fx=bx*16, fy=by*8-4;
    ctx.beginPath();
    for(let i=0;i<5;i++){ const a2=i/5*Math.PI*2;
      const rr=i%2?3:7; ctx.lineTo(fx+Math.cos(a2)*rr,fy+Math.sin(a2)*rr); }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}

/* ================= UNITS v3 (detailed silhouettes; supersedes earlier drawUnit) ================= */
function drawUnit(u,time){
  const G=Battle.G||BuildState.G; if(!G)return;
  const [sx,sy]=w2s(u.x,u.y);
  if(sx<-60||sy<-80||sx>VW+60||sy>VH+60)return;
  const rz=tileRaise(G,u.x,u.y);
  ctx.save(); ctx.translate(sx,sy-rz*cam.zoom); ctx.scale(cam.zoom*1.26,cam.zoom*1.26);
  const col=u.color, dark=shade(col,.68), lite=shade(col,1.28);
  const ph=time*11+u.seed*9;
  const bob=u.moving?Math.sin(ph)*1.2:0;
  const leg=u.moving?Math.sin(ph)*3.4:0;
  const id=u.def.id, flash=u.flash||0;
  const fa=u.faceAng??-.5, dirX=Math.cos(fa)>=0?1:-1;
  ctx.fillStyle='rgba(10,15,20,.32)'; ctx.beginPath(); ctx.ellipse(0,1,7.5,3.1,0,0,7); ctx.fill();
  // melee strike lunge (body darts toward the target on each hit)
  if(u.atkT>0){ const lg=Math.sin((1-(u.atkT/.22))*Math.PI)*2.4;
    ctx.translate(Math.cos(fa)*lg*1.5, Math.sin(fa)*lg*.9); }
  const head=(hx,hy,helm)=>{
    ctx.fillStyle='#e4c49a'; ctx.beginPath(); ctx.arc(hx,hy,2.7,0,7); ctx.fill();
    if(helm===0){ ctx.fillStyle='#c8ccd4'; ctx.beginPath(); ctx.arc(hx,hy-.9,2.8,Math.PI,0); ctx.fill();
      ctx.fillRect(hx-2.8,hy-.9,5.6,1); ctx.fillStyle='#9aa0a8'; ctx.fillRect(hx-.6,hy-.9,1.2,2.6); }
    else if(helm===1){ ctx.fillStyle='#2e3238'; ctx.beginPath(); ctx.ellipse(hx,hy-2.1,3.3,1.2,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(hx,hy-1.2,2.3,Math.PI,0); ctx.fill(); }
    else if(helm===2){ ctx.fillStyle=shade(col,.8); ctx.beginPath(); ctx.arc(hx,hy-.6,2.85,Math.PI,0); ctx.fill();
      ctx.fillRect(hx-2.85,hy-.6,5.7,1.2); }
    else if(helm===3){ ctx.fillStyle='#2a2e33'; ctx.beginPath(); ctx.arc(hx,hy-.8,2.7,Math.PI*.9,Math.PI*2.1); ctx.fill(); } // beret
    else if(helm===4){ ctx.fillStyle='#1e2126'; ctx.fillRect(hx-2.6,hy-6.4,5.2,5); // bearskin
      ctx.strokeStyle='#000'; ctx.lineWidth=.4;
      ctx.beginPath(); ctx.moveTo(hx-1.4,hy-6); ctx.lineTo(hx-1.4,hy-2.4); ctx.moveTo(hx+1.2,hy-6); ctx.lineTo(hx+1.2,hy-2.4); ctx.stroke();
      ctx.strokeStyle='#d8b23c'; ctx.beginPath(); ctx.moveTo(hx-2.4,hy-1.6); ctx.lineTo(hx+2.4,hy-1.8); ctx.stroke(); }
    else if(helm===5){ ctx.fillStyle='#d8a838'; ctx.beginPath(); ctx.arc(hx,hy-.7,2.85,Math.PI,0); ctx.fill(); // hardhat
      ctx.fillRect(hx-3.3,hy-.7,6.6,.9); }
  };
  const legs=()=>{
    ctx.strokeStyle='#2e2a24'; ctx.lineWidth=1.9;
    ctx.beginPath(); ctx.moveTo(-1.5,-3.2+bob*.5); ctx.lineTo(-1.5-leg*.55,1.2);
    ctx.moveTo(1.5,-3.2+bob*.5); ctx.lineTo(1.5+leg*.55,1.2); ctx.stroke();
    ctx.fillStyle='#1e1b16';
    ctx.fillRect(-1.5-leg*.55-1.2,.6,2.4,1.3); ctx.fillRect(1.5+leg*.55-1.2,.6,2.4,1.3);
  };
  const torso=(trim)=>{
    ctx.fillStyle=col; ctx.beginPath();
    ctx.moveTo(-3.6,-2.6+bob); ctx.lineTo(-3.6,-10.6+bob); ctx.arc(0,-10.6+bob,3.6,Math.PI,0); ctx.lineTo(3.6,-2.6+bob);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    ctx.fillStyle=dark; ctx.fillRect(-3.6,-6+bob,7.2,1.5); // belt
    if(trim){ ctx.fillStyle=lite; ctx.fillRect(-3.6,-10.6+bob,1.2,8); } // shoulder trim
  };
  if(id==='knight'||id==='cuirassier'){
    // horse legs w/ hooves
    ctx.strokeStyle='#3d2f20'; ctx.lineWidth=2.2;
    for(const [lx,ff] of [[-7.6,.6],[-3.2,-.5],[3.2,.5],[7.6,-.6]]){
      ctx.beginPath(); ctx.moveTo(lx,-6); ctx.lineTo(lx+leg*ff,1.4); ctx.stroke();
      ctx.fillStyle='#14100c'; ctx.fillRect(lx+leg*ff-1.1,1,2.2,1.3); }
    // body + caparison drape in banner color
    ctx.fillStyle='#6b5340'; ctx.beginPath(); ctx.ellipse(0,-7.6+bob*.5,10.8,5.4,0,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    ctx.fillStyle=col; ctx.beginPath();
    ctx.moveTo(-9,-7+bob*.5); ctx.quadraticCurveTo(0,-2+bob*.5,9,-7+bob*.5);
    ctx.lineTo(9,-9+bob*.5); ctx.quadraticCurveTo(0,-5+bob*.5,-9,-9+bob*.5); ctx.closePath(); ctx.fill();
    // neck + head
    ctx.fillStyle='#6b5340'; ctx.beginPath();
    ctx.moveTo(8*dirX,-9+bob*.5); ctx.quadraticCurveTo(12.5*dirX,-13, 12*dirX,-15);
    ctx.lineTo(9.5*dirX,-14); ctx.quadraticCurveTo(8*dirX,-11, 6.5*dirX,-9); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.ellipse(12.6*dirX,-15.4,3,1.7,dirX*-.5,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
    ctx.fillStyle='#3d2f20'; ctx.beginPath(); // ear + mane
    ctx.moveTo(11*dirX,-17); ctx.lineTo(11.8*dirX,-19); ctx.lineTo(12.8*dirX,-17); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#3d2f20'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(9.5*dirX,-14.5); ctx.quadraticCurveTo(8*dirX,-11.5,7.5*dirX,-9.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-9.5*dirX,-8); ctx.quadraticCurveTo(-13*dirX,-4+leg*.4,-11.5*dirX,-1); ctx.stroke(); // tail
    // rider
    ctx.fillStyle=id==='cuirassier'?'#c8ccd4':col; // cuirass or tunic
    ctx.fillRect(-2.6,-17.5+bob*.4,5.2,7.5);
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.strokeRect(-2.6,-17.5+bob*.4,5.2,7.5);
    if(id==='knight'){ ctx.fillStyle=dark; ctx.beginPath(); // cape
      ctx.moveTo(-2.6*dirX,-17+bob*.4); ctx.quadraticCurveTo(-7*dirX,-12+leg*.3,-5*dirX,-8);
      ctx.lineTo(-2*dirX,-11); ctx.closePath(); ctx.fill(); }
    head(0,-19.5+bob*.4,id==='knight'?0:2);
    if(id==='cuirassier'){ ctx.strokeStyle='#c04a3a'; ctx.lineWidth=1.2; // plume
      ctx.beginPath(); ctx.moveTo(0,-22); ctx.quadraticCurveTo(-2*dirX,-24,-3*dirX,-22.5); ctx.stroke(); }
    // weapon: lance / sabre
    ctx.strokeStyle='#d8dde4'; ctx.lineWidth=1.5;
    if(id==='knight'){ ctx.beginPath(); ctx.moveTo(3*dirX,-15+bob*.4); ctx.lineTo(15*dirX,-21+bob*.4); ctx.stroke();
      ctx.fillStyle=col; ctx.beginPath(); // kite shield
      ctx.moveTo(-4.5*dirX,-16); ctx.lineTo(-2*dirX,-16); ctx.lineTo(-2.6*dirX,-10.5); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.6; ctx.stroke(); }
    else { ctx.beginPath(); ctx.moveTo(3*dirX,-14.5+bob*.4);
      ctx.quadraticCurveTo(8*dirX,-17,9.5*dirX,-19.5); ctx.stroke(); }
  } else if(id==='tank'){
    // treads + road wheels
    ctx.fillStyle='#23282e'; ctx.beginPath(); ctx.ellipse(0,-2.4,12,5.6,0,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    ctx.fillStyle='#3a4048';
    for(const wx2 of [-7,0,7]){ ctx.beginPath(); ctx.ellipse(wx2,-1.2,2.6,2.1,0,0,7); ctx.fill();
      ctx.fillStyle='#565f68'; ctx.beginPath(); ctx.arc(wx2,-1.2,.9,0,7); ctx.fill(); ctx.fillStyle='#3a4048'; }
    const sc=u.moving?(time*22)%3.4:0;
    ctx.strokeStyle='#4a525b'; ctx.lineWidth=.9;
    for(let i=-3;i<=3;i++){ const xx=i*3.4+sc-1.7;
      ctx.beginPath(); ctx.moveTo(xx,-7.2); ctx.lineTo(xx+1.2,-5.4); ctx.stroke(); }
    // hull with glacis + skirt
    ctx.fillStyle=dark; ctx.beginPath(); ctx.ellipse(0,-6,9.6,4.2,0,0,7); ctx.fill();
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,-6.8,9.2,3.6,0,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    ctx.fillStyle=lite; ctx.beginPath(); ctx.ellipse(3.4*dirX,-7.6,4.2,1.6,0,0,7); ctx.fill(); // glacis light
    // turret + barrel
    ctx.fillStyle=shade(col,.85); ctx.beginPath(); ctx.ellipse(-1*dirX,-10,4.8,2.6,0,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
    const a=u.faceAng||0, rec2=flash*10;
    ctx.strokeStyle='#2a3038'; ctx.lineWidth=2.4;
    ctx.beginPath(); ctx.moveTo(-1*dirX-Math.cos(a)*rec2*.3,-10);
    ctx.lineTo(Math.cos(a)*(15-rec2),-10+Math.sin(a)*7); ctx.stroke();
    ctx.strokeStyle='#2a3038'; ctx.lineWidth=3.6; // muzzle thick section
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*11,-10+Math.sin(a)*5.2);
    ctx.lineTo(Math.cos(a)*(14.4-rec2),-10+Math.sin(a)*6.7); ctx.stroke();
    ctx.fillStyle='#1e2126'; ctx.beginPath(); ctx.arc(-2.6*dirX,-11.6,1,0,7); ctx.fill(); // hatch
    ctx.strokeStyle='#565f68'; ctx.lineWidth=.7; // antenna
    ctx.beginPath(); ctx.moveTo(-4*dirX,-11.4); ctx.lineTo(-6*dirX,-17); ctx.stroke();
    if(flash>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,220,120,'+flash*7+')';
      ctx.beginPath(); ctx.arc(Math.cos(a)*16,-10+Math.sin(a)*7.2,4.2,0,7); ctx.fill(); ctx.restore(); }
  } else if(id==='ram'){
    ctx.fillStyle='#2e281f';
    for(const wx2 of [-7,0,7]){ ctx.beginPath(); ctx.ellipse(wx2,.6,2.2,1.8,0,0,7); ctx.fill(); }
    // gabled protective roof
    ctx.fillStyle='#7a5c3c'; ctx.beginPath();
    ctx.moveTo(-11,-6+bob*.3); ctx.lineTo(0,-13+bob*.3); ctx.lineTo(11,-6+bob*.3); ctx.lineTo(11,-4+bob*.3);
    ctx.lineTo(0,-11+bob*.3); ctx.lineTo(-11,-4+bob*.3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#8d6b46'; ctx.beginPath();
    ctx.moveTo(-11,-4+bob*.3); ctx.lineTo(0,-11+bob*.3); ctx.lineTo(0,-8+bob*.3); ctx.lineTo(-11,-1+bob*.3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#5c452e'; ctx.beginPath();
    ctx.moveTo(11,-4+bob*.3); ctx.lineTo(0,-11+bob*.3); ctx.lineTo(0,-8+bob*.3); ctx.lineTo(11,-1+bob*.3); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(-11,-6+bob*.3); ctx.lineTo(0,-13+bob*.3); ctx.lineTo(11,-6+bob*.3); ctx.stroke();
    ctx.strokeStyle='rgba(40,30,18,.5)'; ctx.lineWidth=.7; // roof planks
    for(let i=1;i<4;i++){ ctx.beginPath();
      ctx.moveTo(-11+i*2.6,-4.2-i*1.6+bob*.3); ctx.lineTo(0+i*2.6,-11.2-i*1.6+14*0+bob*.3); ctx.stroke(); }
    // frame posts
    ctx.strokeStyle='#4a3722'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(-9,-3); ctx.lineTo(-9,0); ctx.moveTo(9,-3); ctx.lineTo(9,0); ctx.stroke();
    // swinging iron-headed log
    const swing=Math.sin(time*6+u.seed)*2.4;
    ctx.strokeStyle='#3d2e1c'; ctx.lineWidth=3.4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-12+swing,-4.5); ctx.lineTo(12+swing,-4.5); ctx.stroke(); ctx.lineCap='butt';
    ctx.fillStyle='#8a949c'; ctx.beginPath(); // ram head
    ctx.moveTo(12+swing,-6.2); ctx.lineTo(15.5+swing,-4.5); ctx.lineTo(12+swing,-2.8); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.6; ctx.stroke();
    ctx.strokeStyle='#2a2018'; ctx.lineWidth=.7; // chains
    ctx.beginPath(); ctx.moveTo(-6+swing*.5,-11+bob*.3); ctx.lineTo(-6+swing,-4.5);
    ctx.moveTo(6+swing*.5,-11+bob*.3); ctx.lineTo(6+swing,-4.5); ctx.stroke();
    ctx.fillStyle=col; ctx.fillRect(-11,-14.4+bob*.3,22,1.6); // banner stripe on ridge
  } else if(id==='siegegun'){
    // spoked wheels (rotate while moving)
    const rot=u.moving?time*6:0;
    for(const wx2 of [-5.5,5.5]){
      ctx.strokeStyle='#3d2e1c'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(wx2,-3,4.6,4.6,0,0,7); ctx.stroke();
      for(let s2=0;s2<3;s2++){ const wa=rot+s2*Math.PI/3;
        ctx.beginPath(); ctx.moveTo(wx2-Math.cos(wa)*4.2,-3-Math.sin(wa)*4.2);
        ctx.lineTo(wx2+Math.cos(wa)*4.2,-3+Math.sin(wa)*4.2); ctx.stroke(); }
      ctx.fillStyle='#2a2018'; ctx.beginPath(); ctx.arc(wx2,-3,1.1,0,7); ctx.fill();
    }
    const a=u.faceAng||0, rec2=flash*8;
    ctx.fillStyle='#5c452e'; ctx.beginPath(); // trail beam
    ctx.moveTo(-Math.cos(a)*4,-4); ctx.lineTo(-Math.cos(a)*11,1); ctx.lineTo(-Math.cos(a)*11+2.4,2);
    ctx.lineTo(-Math.cos(a)*4+2.4,-3); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.6; ctx.stroke();
    ctx.strokeStyle='#23292f'; ctx.lineWidth=4; // barrel + rings
    ctx.beginPath(); ctx.moveTo(-Math.cos(a)*(3+rec2*.4),-6.5); ctx.lineTo(Math.cos(a)*(13-rec2),-8+Math.sin(a)*5); ctx.stroke();

/* ---------- ambient birds ---------- */
function drawBirds(time){
  ctx.strokeStyle='rgba(20,28,36,.45)';
  for(let f=0;f<2;f++){
    const span=MAPW*TW*1.5;
    const wx=((time*26+f*820)%span)-span/2;
    const wy=((f*430+time*4)% (MAPW*TH*.8))+MAPW*TH*.1;
    const sx=(wx-cam.x)*cam.zoom+VW/2, sy=(wy-cam.y)*cam.zoom+VH/2-150*cam.zoom;
    if(sx<-80||sy<-80||sx>VW+80||sy>VH+80)continue;
    ctx.lineWidth=1.3*cam.zoom;
    for(let i=0;i<4;i++){
      const bx2=sx+(i*16-(i%2)*6)*cam.zoom, by2=sy+((i*9)%15)*cam.zoom;
      const wflap=Math.sin(time*8+i*1.7)*2.6;
      ctx.beginPath();
      ctx.moveTo(bx2-4.5*cam.zoom,by2-wflap*cam.zoom*.5);
      ctx.quadraticCurveTo(bx2,by2+2*cam.zoom,bx2+0.2,by2);
      ctx.quadraticCurveTo(bx2,by2+2*cam.zoom,bx2+4.5*cam.zoom,by2-wflap*cam.zoom*.5);
      ctx.stroke();
    }
  }
}

// building kind codes for serialization
const KIND_CODE={wall:0,tower:1,hq:2,trap:3,gate:4,palisade:5,moat:6,flag:7,bridgeB:8};
const CODE_KIND=['wall','tower','hq','trap','gate','palisade','moat','flag','bridgeB'];

function bDef(era,kind){ const E=ERAS[era];
  return kind==='wall'?E.wall:kind==='gate'?E.gate:kind==='palisade'?E.palisade:

function makeG(fort){
  const G={ name:fort.name||STR.myFort, era:fort.era|0, tier:fort.tier|0, map:fort.map|0,
    seed:fort.seed|0, sb:!!fort.sb, cust:fort.cust||{c1:'#4fa3e0',c2:'#f0d060',em:'🐻'},
    terrain:genMap(fort.map|0, fort.seed|0),
    bgrid:new Array(MAPW*MAPW).fill(null), buildings:[], garrison:[] };
  for(const b of (fort.b||[])) placeBuilding(G, b[0], b[1], b[2], b[3]);
  for(const g of (fort.g||[])) placeGarrison(G, g[0], g[1], g[2]);
  return G;
}
function serializeFort(G){
  const b=[], g=[];
  for(const bd of G.buildings){
    const k=KIND_CODE[bd.kind]; if(k===undefined)continue;
    b.push([k, bd.tIdx||0, bd.x, bd.y]);
  }
  for(const gd of G.garrison) g.push([gd.uIdx,gd.x,gd.y]);
  return {v:2,name:G.name,era:G.era,tier:G.tier,map:G.map,seed:G.seed,sb:G.sb?1:0,cust:G.cust,b:b,g:g};
}
function canPlace(G,x,y,size){
  for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++){
    const nx=x+dx,ny=y+dy;
    if(nx<0||ny<0||nx>=MAPW||ny>=MAPW) return false;
    if(!BUILDABLE[G.terrain[ny*MAPW+nx]]) return false;
    if(G.bgrid[ny*MAPW+nx]) return false;
    for(const gu of G.garrison) if((gu.x|0)===nx&&(gu.y|0)===ny) return false;
  }
  return true;
}
function canPlaceBridge(G,x,y){
  if(x<0||y<0||x>=MAPW||y>=MAPW) return false;
  if(G.bgrid[y*MAPW+x]) return false;
  for(const gu of G.garrison) if((gu.x|0)===x&&(gu.y|0)===y) return false;

function placeBuilding(G,k,tIdx,x,y){
  const era=G.era, E=ERAS[era];
  const kind=CODE_KIND[k]; if(!kind) return null;
  const size=(kind==='hq')?2:1;
  if(kind==='bridgeB'){
    if(!canPlaceBridge(G,x,y)) return null;
    const b={kind,era,x,y,hp:1,maxHp:1,cost:E.bridge.cost};
    G.bgrid[y*MAPW+x]=b; G.buildings.push(b); return b;
  }
  if(!canPlace(G,x,y,size)) return null;
  let b;
  if(kind==='wall') b={kind,era,x,y,hp:E.wall.hp,maxHp:E.wall.hp,cost:E.wall.cost};
  else if(kind==='gate') b={kind,era,x,y,hp:E.gate.hp,maxHp:E.gate.hp,cost:E.gate.cost};
  else if(kind==='palisade') b={kind,era,x,y,hp:E.palisade.hp,maxHp:E.palisade.hp,cost:E.palisade.cost};
  else if(kind==='moat') b={kind,era,x,y,hp:1,maxHp:1,cost:E.moat.cost};
  else if(kind==='flag') b={kind,era,x,y,hp:1,maxHp:1,cost:E.flag.cost};
  else if(kind==='tower'){ const td=E.towers[tIdx]; if(!td)return null;
    b={kind,era,tIdx,x,y,hp:td.hp,maxHp:td.hp,cost:td.cost,def:td,cd:0,angle:Math.PI/4,target:null,flash:0,fireT:0}; }
  else if(kind==='hq'){
    if(G.buildings.some(o=>o.kind==='hq')) return null;
    b={kind,era,x,y,hp:E.hq.hp,maxHp:E.hq.hp,cost:250}; }
  else if(kind==='trap') b={kind,era,x,y,hp:1,maxHp:1,cost:E.trap.cost,def:E.trap};
  else return null;
  for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++) G.bgrid[(y+dy)*MAPW+(x+dx)]=b;
  if(typeof performance!=='undefined'&&MODE==='build') b.born=performance.now()/1000;
  G.buildings.push(b);
  return b;
}
function placeGarrison(G,uIdx,x,y){
  const def=ERAS[G.era].units[uIdx]; if(!def) return null;
  x=Math.floor(x); y=Math.floor(y);
  if(!canPlace(G,x,y,1)) return null;
  if(WALK_COST[G.terrain[y*MAPW+x]]===0) return null;
  const gu={uIdx,def,x:x,y:y,cost:def.cost};
  G.garrison.push(gu); return gu;
}
function removeAt(G,x,y){
  const b=G.bgrid[y*MAPW+x];
  if(b){ const size=b.kind==='hq'?2:1;
    for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++) G.bgrid[(b.y+dy)*MAPW+(b.x+dx)]=null;
    G.buildings.splice(G.buildings.indexOf(b),1); return b; }
  const gi=G.garrison.findIndex(g=>(g.x|0)===x&&(g.y|0)===y);
  if(gi>=0) return {garrison:true, ...G.garrison.splice(gi,1)[0]};
  return null;
}
function fortSpent(G){
  let bg=0, gg=0;
  for(const b of G.buildings) bg+=b.cost;
  for(const g of G.garrison) gg+=g.cost;
  return {build:bg, gar:gg};
}
function attackBudgetFor(fort){
  if(fort.sb){ // value-based for sandbox forts
    let v=0; const G=makeG(fort); const sp=fortSpent(G);
    v=sp.build+sp.gar;
    return Math.max(1200, Math.round(v*0.62/10)*10);
  }
  return TIERS[fort.tier|0].attack;
}

function makeWaves(era, budget, custom){
  const E=ERAS[era], comp={};
  if(custom){ for(const k in custom) if(custom[k]>0) comp[k]=custom[k]; }
  else { let money=budget, guard=0;
    while(money>50&&guard++<900){ const i=(Math.random()*E.units.length)|0;
      const u=E.units[i]; if(u.cost<=money){ comp[i]=(comp[i]||0)+1; money-=u.cost; } } }
  const total=Object.entries(comp).flatMap(([i,n])=>Array(n).fill(+i));
  for(let i=total.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [total[i],total[j]]=[total[j],total[i]]; }
  const w1=total.slice(0,Math.ceil(total.length*.4));
  const w2=total.slice(w1.length,w1.length+Math.ceil(total.length*.3));
  const w3=total.slice(w1.length+w2.length);
  const waves=[[2,w1],[32,w2],[62,w3]].filter(w=>w[1].length);
  return {era, waves, spawned:0, totalCount:total.length, nextWave:0};
}
function edgeSpawnPoint(G, side, off){
  for(let d=0;d<MAPW;d++){
    let x,y;
    if(side===0){x=off;y=d;} else if(side===1){x=off;y=MAPW-1-d;}
    else if(side===2){x=d;y=off;} else {x=MAPW-1-d;y=off;}
    const b=G.bgrid[y*MAPW+x];
    if(WALK_COST[G.terrain[y*MAPW+x]]>0 && (!b||PASSIVE[b.kind])) return [x+0.5,y+0.5];
  }
  return [0.5,0.5];

function makeDeployMask(G){

    if(WALK_COST[G.terrain[y*MAPW+x]]===0) continue;

    let ok=true;
    for(const b of G.buildings){ if(PASSIVE[b.kind])continue;

      const ddx=Math.max(b.x-x, x-(b.x+s-1), 0), ddy=Math.max(b.y-y, y-(b.y+s-1), 0);

function buildingCenter(b){ const s=b.kind==='hq'?2:1; return [b.x+s/2, b.y+s/2]; }
function pickTarget(u,G){
  const pref=u.def.pref;
  let best=null, bestD=1e9;
  const consider=(b)=>{ if(PASSIVE[b.kind]||b.dead)return;
    const [cx,cy]=buildingCenter(b);
    const d=dist(u.x,u.y,cx,cy);
    if(d<bestD){bestD=d;best=b;} };
  if(pref==='wall'){
    for(const b of G.buildings) if(WALLISH[b.kind]) consider(b);
    if(!best) for(const b of G.buildings) consider(b);
  } else if(pref==='def'){
    for(const b of G.buildings) if(b.kind==='tower') consider(b);
    if(!best) for(const b of G.buildings) consider(b);
  } else {
    for(const b of G.buildings) if(!WALLISH[b.kind]) consider(b);
    if(!best) for(const b of G.buildings) consider(b);
  }
  return best;
}
function nearestDefender(u,rad){

    const dd=dist(u.x,u.y,d.x,d.y); if(dd<bd){bd=dd;best=d;} }
  return best;
}
function nearestAttacker(x,y,minR,maxR){
  let best=null,bd=maxR;
  for(const a of Battle.attackers){ if(a.hp<=0)continue;
    const dd=dist(x,y,a.x,a.y); if(dd<bd&&dd>=(minR||0)){bd=dd;best=a;} }
