function applySeparation(dt){
  // gentle crowd separation so armies hold formation instead of stacking
  const all=[];
  for(const u of Battle.attackers) if(u.hp>0) all.push(u);
  for(const d of Battle.defenders) if(d.hp>0) all.push(d);
  if(all.length<2)return;
  const cell=new Map(), key=(x,y)=>x+y*MAPW;
  for(const u of all){ const k=key(u.x|0,u.y|0);
    let arr=cell.get(k); if(!arr){arr=[];cell.set(k,arr);} arr.push(u); }
  const G=Battle.G;
  for(const u of all){
    const big=(u.def.id==='tank'||u.def.id==='knight'||u.def.id==='cuirassier'||u.def.id==='ram'||u.def.id==='siegegun');
    const R=big?0.5:0.34;
    let px=0,py=0;
    const cx=u.x|0, cy=u.y|0;
    for(let oy=-1;oy<=1;oy++)for(let ox=-1;ox<=1;ox++){
      const arr=cell.get(key(cx+ox,cy+oy)); if(!arr)continue;
      for(const v of arr){ if(v===u)continue;
        const dx=u.x-v.x, dy=u.y-v.y; const dd2=Math.hypot(dx,dy);
        if(dd2>=R)continue;
        if(dd2<1e-4){ const ja=(u.seed||Math.random())*6.28; px+=Math.cos(ja); py+=Math.sin(ja); }
        else { const f=(R-dd2)/R; px+=dx/dd2*f; py+=dy/dd2*f; } } }
    if(px||py){
      const nx=clamp(u.x+px*dt*1.7,0.2,MAPW-0.2), ny=clamp(u.y+py*dt*1.7,0.2,MAPW-0.2);
      const nb=G.bgrid[(ny|0)*MAPW+(nx|0)];
      if((!nb||PASSIVE[nb.kind])&&WALK_COST[G.terrain[(ny|0)*MAPW+(nx|0)]]>0){ u.x=nx; u.y=ny; } }
  }
}
function damageBuilding(b,amt){
  if(b.dead||b.kind==='moat'||b.kind==='flag')return;
  raiseAlarm(b.x+0.5,b.y+0.5); // garrison responds to attacks anywhere
  b.hp-=amt;
  if(b.hp<=0){ b.hp=0; b.dead=true;
    const size=b.kind==='hq'?2:1;
    for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++) Battle.G.bgrid[(b.y+dy)*MAPW+(b.x+dx)]=null;
    Battle.G.buildings.splice(Battle.G.buildings.indexOf(b),1);
    if(!PASSIVE[b.kind]){ Battle.destrDone+=b.maxHp; Battle.pathVersion++; }
    if(b.kind==='hq'){ Battle.hqDown=true; toast(STR.hqDown); addShake(13); }
    // permanent rubble on the battlefield
    stampDecal('rubble', b.x+size/2, b.y+size/2, 1, PAL.eraBody[b.era]);
    if(b.kind==='hq'||b.kind==='tower') stampDecal('scorch', b.x+size/2, b.y+size/2, b.kind==='hq'?2.2:1.4);
    boom(b.x+size/2,b.y+size/2, b.kind==='hq'?26:10, '#c8a060', b.kind==='hq'?2.2:1);
    AudioSys.play('boom');
  }
}
function damageUnit(u,amt,srcX,srcY,heavy){ if(u.hp<=0)return; u.hp-=amt;
  if(u.hp<=0){ u.hp=0;
    if(heavy&&srcX!==undefined&&Battle.parts.length<880){
      // TABS-style ragdoll: the body is launched, tumbles, bounces, then rests
      let dx=u.x-srcX, dy=u.y-srcY; const dd=Math.hypot(dx,dy)||1; dx/=dd; dy/=dd;
      const pow=1.6+Math.random()*2.2;
      Battle.parts.push({kind:'ragdoll', x:u.x, y:u.y, h:.25,
        vx:dx*pow, vy:dy*pow*.7, vh:2.1+Math.random()*1.6,
        spin:(Math.random()*10-5), color:u.color, uid:u.def.id, bounces:0,
        life:2.2, maxLife:2.2, size:5});
      boom(u.x,u.y,3,'#a04038',.4);
    } else {
      stampDecal('corpse',u.x,u.y,1,u.color);
      boom(u.x,u.y,4,'#a04038',.5);
      Battle.parts.push({x:u.x,y:u.y,h:0,vx:0,vy:0,vh:0,kind:'smoke',color:'#3a3f45',
        life:.7,maxLife:.7,size:4});
    } } }
function groundFxAt(x,y,rad){
  // battlefield transformation: craters, scorch, burning forests
  const ti=(y|0)*MAPW+(x|0);
  if(ti<0||ti>=MAPW*MAPW)return;
  const G=Battle.G;
  if(G.terrain[ti]===T.WATER){ // water plume instead of crater
    for(let i=0;i<6;i++) Battle.parts.push({x:x+(Math.random()-.5)*.4,y:y+(Math.random()-.5)*.4,
      h:.1,vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*.7,vh:1.6+Math.random(),
      color:'#9ec8de',life:.5,maxLife:.5,size:2.2});
    return;
  }
  stampDecal('crater',x,y,Math.max(.8,rad*.8));
  stampDecal('scorch',x,y,Math.max(1,rad*1.1));
  // burn forests within blast radius -> terrain becomes dirt (faster to cross!)
  const r=Math.ceil(rad);
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    const tx=(x|0)+dx, ty=(y|0)+dy;
    if(tx<0||ty<0||tx>=MAPW||ty>=MAPW)continue;
    if(G.terrain[ty*MAPW+tx]===T.FOREST&&dist(x,y,tx+0.5,ty+0.5)<=rad+0.3){
      G.terrain[ty*MAPW+tx]=T.DIRT;
      stampDecal('burnt',tx+0.5,ty+0.5,1);
      for(let i=0;i<3;i++) Battle.parts.push({x:tx+0.5,y:ty+0.5,h:.6,
        vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.3,vh:.9,
        kind:'fire',color:'rgba(240,140,50,.9)',life:.5,maxLife:.5,size:3});
    }
  }
}
function knockback(u,x,y,rad,d){
  // explosion shove on survivors
  if(u.hp<=0)return;
  let dx=u.x-x, dy=u.y-y; const dd=Math.hypot(dx,dy)||1;
  const f=0.42*(1-d/rad);
  const nx=clamp(u.x+dx/dd*f,0.2,MAPW-0.2), ny=clamp(u.y+dy/dd*f,0.2,MAPW-0.2);
  const nb=Battle.G.bgrid[(ny|0)*MAPW+(nx|0)];
  if((!nb||PASSIVE[nb.kind])&&WALK_COST[Battle.G.terrain[(ny|0)*MAPW+(nx|0)]]>0){ u.x=nx; u.y=ny; }
}
function splashAt(x,y,rad,dmg,vsAttackers,srcDef){
  if(vsAttackers){
    for(const a of Battle.attackers){ if(a.hp<=0)continue;
      const d=dist(x,y,a.x,a.y); if(d<=rad){ damageUnit(a, dmg*(1-d/rad*.5), x, y, true); knockback(a,x,y,rad,d); } }
  } else {
    for(const dfn of Battle.defenders){ if(dfn.hp<=0)continue;
      const d=dist(x,y,dfn.x,dfn.y); if(d<=rad){ damageUnit(dfn, dmg*(1-d/rad*.5), x, y, true); knockback(dfn,x,y,rad,d); } }
    const seen=new Set();
    const r=Math.ceil(rad);
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
      const tx=(x|0)+dx, ty=(y|0)+dy;
      if(tx<0||ty<0||tx>=MAPW||ty>=MAPW)continue;
      const b=Battle.G.bgrid[ty*MAPW+tx];
      if(b&&!seen.has(b)&&!PASSIVE[b.kind]){ seen.add(b);
        const [cx,cy]=buildingCenter(b);
        if(dist(x,y,cx,cy)<=rad+0.5){
          const mult=WALLISH[b.kind]?(srcDef?srcDef.mw||1:1):(srcDef?srcDef.mb||1:1);
          damageBuilding(b, dmg*mult); } }
    }
  }
  boom(x,y,Math.min(16,rad*5),'#e8b23c',rad*.7);
  addShake(Math.min(9,2+rad*2.4));
  if(rad>=0.7) groundFxAt(x,y,rad);
}
function boom(x,y,n,color,scale){
  scale=scale||1;
  if(Battle.parts.length>900) n=Math.min(n,3);
  // debris
  for(let i=0;i<n;i++){
    Battle.parts.push({x,y,h:.2+Math.random()*.4,
      vx:(Math.random()-.5)*3.4,vy:(Math.random()-.5)*1.8,vh:Math.random()*.9,
      life:.4+Math.random()*.5,maxLife:.9,color:Math.random()<.4?'#5a5f66':color,size:2+Math.random()*2.5});
  }
  // flash + ring + smoke
  Battle.parts.push({x,y,h:.3,vx:0,vy:0,vh:0,kind:'flash',color:'rgba(255,225,150,1)',
    life:.22,maxLife:.22,size:9*scale});
  Battle.parts.push({x,y,h:0,vx:0,vy:0,vh:0,kind:'ring',color:'#f0d090',
    life:.4,maxLife:.4,size:34*scale});
  for(let i=0;i<Math.min(4,1+n/4|0);i++)
    Battle.parts.push({x:x+(Math.random()-.5)*.5,y:y+(Math.random()-.5)*.5,h:.3,
      vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.3,vh:.8+Math.random()*.5,
      kind:'smoke',color:'#4a4f57',life:.8+Math.random()*.6,maxLife:1.4,size:4+Math.random()*3});
}
function fireProjectile(fromX,fromY,fromH,target,def,vsAttackers,type){
  const isLob=(type==='lob'||type==='oil');
  const [tx,ty]=target.kind?buildingCenter(target):[target.x,target.y];
  if(type==='zap'){
    let victims=[target];
    if(def.chain){ let last=target;
      for(let i=1;i<def.chain;i++){ let nb=null,bd=2.4;
        for(const a of Battle.attackers){ if(a.hp<=0||victims.includes(a))continue;
          const dd=dist(last.x,last.y,a.x,a.y); if(dd<bd){bd=dd;nb=a;} }
        if(!nb)break; victims.push(nb); last=nb; } }
    let px=fromX, py=fromY;
    for(const v of victims){ damageUnit(v, def.dmg);
      Battle.zaps.push({x1:px,y1:py,x2:v.x,y2:v.y,life:.4}); px=v.x; py=v.y; }
    AudioSys.play('zap'); return;
  }
  const speed=isLob?7:(type==='arrow'?11:type==='rocket'?9:14);
  const isBall=(type==='ball');
  let aimX=tx, aimY=ty;
  if(isLob||isBall){ // true ballistics: lead the target, then dispersion
    if(!target.kind){
      const ft=dist(fromX,fromY,tx,ty)/speed;
      aimX=tx+(target.vx||0)*ft; aimY=ty+(target.vy||0)*ft;
    }
    const g2=()=>(Math.random()+Math.random()+Math.random())/1.5-1;
    const sc=(isBall?0.035:0.055)*dist(fromX,fromY,aimX,aimY)+0.12;
    aimX=clamp(aimX+g2()*sc,0.2,MAPW-0.2); aimY=clamp(aimY+g2()*sc,0.2,MAPW-0.2);
  }
  const d=dist(fromX,fromY,aimX,aimY);
  const p={type, x:fromX, y:fromY, h:fromH||.12, def, vsAttackers,
    target, tx:aimX, ty:aimY, speed, spl:def.spl||0, dmg:def.dmg,
    lob:isLob, ball:isBall, guided:!isLob&&!isBall, bounced:false,
    t:0, dur:d/speed, sx:fromX, sy:fromY, vx:0, vy:0};
  if(type==='arrow'||type==='bolt'){ // arcing flight
    p.arrowArc=true; p.arc=Math.min(1.8, d*(type==='bolt'?0.05:0.15)); p.dh=0;
  }
  Battle.projs.push(p); AudioSys.play('shoot');
}
function resolveBallImpact(p){
  const G=Battle.G;
  let victim=null;
  if(p.vsAttackers){ victim=nearestAttacker(p.tx,p.ty,0,0.6); }
  else {
    const b=G.bgrid[(p.ty|0)*MAPW+(p.tx|0)];
    if(b&&!PASSIVE[b.kind]) victim=b;
    if(!victim){ let bd=0.6; for(const dfn of Battle.defenders){ if(dfn.hp<=0)continue;
      const dd=dist(p.tx,p.ty,dfn.x,dfn.y); if(dd<bd){bd=dd;victim=dfn;} } }
  }
  const dmg=p.bounced?p.dmg*.5:p.dmg;
  if(victim&&victim.kind){ // structure stops the ball
    damageBuilding(victim, dmg*(WALLISH[victim.kind]?(p.def.mw||1):(p.def.mb||1)));
    if(p.spl>0) splashAt(p.tx,p.ty,p.spl,dmg*.6,p.vsAttackers,p.def);
    boom(p.tx,p.ty,5,'#c8b090',.6); AudioSys.play('hit');
    return true;
  }
  if(victim){ // plows through infantry
    damageUnit(victim,dmg,p.sx,p.sy,true);
    Battle.parts.push({x:p.tx,y:p.ty,h:.15,vx:0,vy:0,vh:0,kind:'flash',color:'rgba(255,230,160,.9)',life:.12,maxLife:.12,size:4});
    if(p.spl>0) splashAt(p.tx,p.ty,Math.max(p.spl,.5),dmg*.5,p.vsAttackers,p.def);
    AudioSys.play('hit');
  } else { // ground strike: dust + scar
    stampDecal('scar',p.tx,p.ty,1);
    for(let i=0;i<4;i++) Battle.parts.push({x:p.tx,y:p.ty,h:.1,
      vx:(Math.random()-.5)*1.4,vy:(Math.random()-.5)*.8,vh:.9+Math.random()*.6,
      kind:'smoke',color:'#8a7a5c',life:.45,maxLife:.45,size:2.6});
  }
  if(!p.bounced){ // ricochet: skip onward once
    p.bounced=true;
    const dx=p.tx-p.sx, dy=p.ty-p.sy, dd=Math.hypot(dx,dy)||1;
    const ext=1.4+Math.random()*.8;
    p.sx=p.tx; p.sy=p.ty;
    p.tx=clamp(p.tx+dx/dd*ext,0.2,MAPW-0.2); p.ty=clamp(p.ty+dy/dd*ext,0.2,MAPW-0.2);
    p.dur=ext/p.speed; p.t=0; p.speed*=.85;
    return false;
  }
  return true;
}

/* ===================== SIM UPDATE ===================== */
function simStep(dt){
  const G=Battle.G;
  Battle.time+=dt;
  Battle.repathBudget=14;
  // --- waves spawn (defend) ---
  if(Battle.mode==='defend'&&Battle.waves){
    const wv=Battle.waves;
    if(wv.nextWave<wv.waves.length && Battle.time>=wv.waves[wv.nextWave][0]){
      const group=wv.waves[wv.nextWave][1];
      const sides=[(Math.random()*4)|0,(Math.random()*4)|0];
      group.forEach((uIdx,i)=>{
        const side=sides[i%sides.length];
        const off=2+((Math.random()*(MAPW-4))|0);
        const [x,y]=edgeSpawnPoint(G,side,off);
        spawnAttacker(wv.era,uIdx,x+(Math.random()-.5)*.6,y+(Math.random()-.5)*.6);
        wv.spawned++;
      });
      wv.nextWave++; toast(STR.wave+' '+wv.nextWave+'/'+wv.waves.length); AudioSys.play('deploy');
      updateHud();
    }
  }
  // --- attackers ---
  for(const u of Battle.attackers){
    if(u.hp<=0)continue;
    u.slow=Math.max(0,u.slow-dt);
    u.flash=Math.max(0,u.flash-dt*3);
    u.atkT=Math.max(0,(u.atkT||0)-dt);
    u.repathCd=Math.max(0,u.repathCd-dt);
    const lab=Battle.mode==='lab';
    u.aggroCd=Math.max(0,(u.aggroCd||0)-dt);
    if(u.interim&&u.interim.unit&&u.interim.unit.hp<=0) u.interim=null;
    if(u.aggroCd<=0&&(!u.def.suicide||lab)){
      u.aggroCd=.22+Math.random()*.14; // throttled aggro scan (perf: O(n²) -> O(n²/13))
      const foe=nearestDefender(u,lab?1e9:3.2);
      if(foe&&(lab||u.def.pref!=='wall')) u.interim={unit:foe};
    }
    if(!u.target||u.target.dead){ u.target=pickTarget(u,G); u.path=null; u.interim=u.interim&&u.interim.unit?u.interim:null; }
    if(!u.target&&!(u.interim&&u.interim.unit&&u.interim.unit.hp>0)){ u.moving=false; continue; }
    if(u.pv!==Battle.pathVersion&&u.repathCd<=0&&Battle.repathBudget>0){ u.path=null; }
    const tgt=u.interim&&u.interim.unit&&u.interim.unit.hp>0?u.interim.unit:
              u.interim&&u.interim.b&&!u.interim.b.dead?u.interim.b:u.target;
    const isB=!!tgt.kind;
    const [tx,ty]=isB?buildingCenter(tgt):[tgt.x,tgt.y];
    const reach=(isB?(tgt.kind==='hq'?1.15:0.75):0.45)+Math.max(u.def.rng,0.55);
    const dd=dist(u.x,u.y,tx,ty);
    if(dd<=reach){
      u.moving=false; u.vx=0; u.vy=0;
      u.faceAng=Math.atan2((ty-u.y),(tx-u.x)*1.6);
      if(u.def.suicide){
        splashAt(u.x+(tx-u.x)*.4, u.y+(ty-u.y)*.4, u.def.spl, u.def.dmg, false, u.def);
        u.hp=0; continue;
      }
      u.cd-=dt;
      if(u.cd<=0){ u.cd=u.def.rate;
        if(u.def.proj&&u.def.rng>1.2){ u.flash=.12;
          fireProjectile(u.x,u.y,.14,tgt,{dmg:u.def.dmg, spl:u.def.spl, mw:u.def.mw, mb:u.def.mb}, false, u.def.proj); }
        else {
          u.atkT=.22; // melee swing
          if(isB) damageBuilding(tgt, u.def.dmg*(WALLISH[tgt.kind]?u.def.mw:u.def.mb));
          else damageUnit(tgt, u.def.dmg);
          if(u.def.spl>0) splashAt(tx,ty,u.def.spl,u.def.dmg*.5,false,u.def);
          AudioSys.play('hit');
        }
      }
      continue;
    }
    if(isB&&!u.path){
      if(Battle.repathBudget>0){
        Battle.repathBudget--;
        u.path=findPath(u.x,u.y,tx|0,ty|0,G)||[];
        u.pathI=0; u.pv=Battle.pathVersion; u.repathCd=.5+Math.random()*.4;
      }
    }
    let mx,my;
    if(isB&&u.path&&u.path.length){
      while(u.pathI<u.path.length-1 && dist(u.x,u.y,u.path[u.pathI][0],u.path[u.pathI][1])<0.3) u.pathI++;
      const wp=u.path[Math.min(u.pathI,u.path.length-1)];
      const wb=G.bgrid[(wp[1]|0)*MAPW+(wp[0]|0)];
      if(wb&&wb!==tgt&&!PASSIVE[wb.kind]&&dist(u.x,u.y,wp[0],wp[1])<0.95+u.def.rng*0.5){
        u.interim={b:wb}; continue;
      }
      mx=wp[0]; my=wp[1];
    } else { mx=tx; my=ty; }
    const ang=Math.atan2(my-u.y,mx-u.x);
    const hereB=G.bgrid[(u.y|0)*MAPW+(u.x|0)];
    let tc=(hereB&&hereB.kind==='bridgeB')?1:(WALK_COST[G.terrain[(u.y|0)*MAPW+(u.x|0)]]||1);
    if(hereB&&hereB.kind==='moat') tc+=2.2;
    let spd=u.def.spd/tc*(u.slow>0?.5:1);
    const nx=clamp(u.x+Math.cos(ang)*spd*dt,0.2,MAPW-0.2);
    const ny=clamp(u.y+Math.sin(ang)*spd*dt,0.2,MAPW-0.2);
    const nb=G.bgrid[(ny|0)*MAPW+(nx|0)];
    if(nb&&!PASSIVE[nb.kind]&&nb!==tgt&&((nx|0)!==(u.x|0)||(ny|0)!==(u.y|0))){
      u.interim={b:nb}; u.moving=false; u.vx=0; u.vy=0; continue; }
    u.vx=Math.cos(ang)*spd; u.vy=Math.sin(ang)*spd;
    u.x=nx; u.y=ny;
    u.moving=true; u.faceAng=Math.atan2(Math.sin(ang),Math.cos(ang)*1.6);
    if(Battle.parts.length<800&&Math.random()<dt*(u.def.id==='tank'||u.def.id==='knight'||u.def.id==='cuirassier'?4:1.6)){
      Battle.parts.push({x:u.x-Math.cos(ang)*.2,y:u.y-Math.sin(ang)*.2,h:.05,
        vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.2,vh:.5,
        kind:'smoke',color:'#9a8a6a',life:.4,maxLife:.4,size:1.8}); }
    const tb=G.bgrid[(u.y|0)*MAPW+(u.x|0)];
    if(tb&&tb.kind==='trap'){
      const td=tb.def;
      splashAt(u.x,u.y,td.spl||0.8,td.dmg,true,null);
      if(td.slow) for(const a of Battle.attackers){ if(dist(a.x,a.y,u.x,u.y)<1.2) a.slow=td.slow; }
      const size=1;
      Battle.G.bgrid[tb.y*MAPW+tb.x]=null;
      Battle.G.buildings.splice(Battle.G.buildings.indexOf(tb),1);
    }
  }
  Battle.attackers=Battle.attackers.filter(u=>u.hp>0);
  // --- defenders: alarm-driven garrison AI (reinforce, navigate, engage) ---
  for(const d of Battle.defenders){
    if(d.hp<=0)continue;
    d.slow=0; d.flash=Math.max(0,(d.flash||0)-dt*3);
    d.atkT=Math.max(0,(d.atkT||0)-dt);
    d.repathCd=Math.max(0,(d.repathCd||0)-dt);
    const engageR=Battle.mode==='lab'?1e9:(alarmActive()?15:Math.max(d.def.rng+2.5,4.5));
    d.rtCd=Math.max(0,(d.rtCd||0)-dt);
    if((!d.target||d.target.hp<=0)&&d.rtCd<=0){
      d.rtCd=.22+Math.random()*.14;
      d.target=nearestAttacker(d.x,d.y,0,engageR); if(d.target)d.path=null; }
    if(d.target&&d.target.hp<=0)d.target=null;
    if(d.target) raiseAlarm(d.target.x,d.target.y);
    let destX=null,destY=null;
    const rng=Math.max(d.def.rng,0.55);
    if(d.target){
      const dd=dist(d.x,d.y,d.target.x,d.target.y);
      if(dd<=rng+0.3){
        d.moving=false; d.cd-=dt; d.path=null; d.vx=0; d.vy=0;
        d.faceAng=Math.atan2((d.target.y-d.y),(d.target.x-d.x)*1.6);
        if(d.cd<=0){ d.cd=Math.max(d.def.rate,.3);
          if(d.def.proj&&d.def.rng>1.2){ d.flash=.12;
            fireProjectile(d.x,d.y,.14,d.target,{dmg:d.def.dmg,spl:d.def.spl},true,d.def.proj); }
          else { d.atkT=.22; damageUnit(d.target,d.def.dmg); AudioSys.play('hit'); } }
        continue;
      }
      destX=d.target.x; destY=d.target.y;
    } else if(alarmActive()&&dist(d.x,d.y,Battle.alarm.x,Battle.alarm.y)>3){
      destX=Battle.alarm.x; destY=Battle.alarm.y; // rush to the breach
    } else {
      if(dist(d.x,d.y,d.hx,d.hy)>0.4){ destX=d.hx; destY=d.hy; }
      else { d.moving=false; d.vx=0; d.vy=0; continue; }
    }
    // navigate through own fortress (gates, gaps, bridges — never through walls)
    if(!d.path||(d.repathCd<=0&&(d.pgx!==(destX|0)||d.pgy!==(destY|0)))){
      if(Battle.repathBudget>0){ Battle.repathBudget--;
        d.path=findPath(d.x,d.y,destX|0,destY|0,Battle.G,true);
        d.pathI=0; d.pgx=destX|0; d.pgy=destY|0; d.repathCd=.7+Math.random()*.5; }
    }
    let mx=destX,my=destY;
    if(d.path&&d.path.length){
      while(d.pathI<d.path.length-1&&dist(d.x,d.y,d.path[d.pathI][0],d.path[d.pathI][1])<0.3) d.pathI++;
      const wp=d.path[Math.min(d.pathI,d.path.length-1)];
      mx=wp[0]; my=wp[1];
    } else if(dist(d.x,d.y,mx,my)>2.5){
      d.moving=false; d.vx=0; d.vy=0; continue; // sealed in — hold position
    }
    const a=Math.atan2(my-d.y,mx-d.x);
    const hereB=Battle.G.bgrid[(d.y|0)*MAPW+(d.x|0)];
    let tc=(hereB&&hereB.kind==='bridgeB')?1:(WALK_COST[Battle.G.terrain[(d.y|0)*MAPW+(d.x|0)]]||1);
    if(hereB&&hereB.kind==='moat') tc+=2.2;
    const spd=d.def.spd/tc;
    const nx=clamp(d.x+Math.cos(a)*spd*dt,0.2,MAPW-0.2);
    const ny=clamp(d.y+Math.sin(a)*spd*dt,0.2,MAPW-0.2);
    const nb=Battle.G.bgrid[(ny|0)*MAPW+(nx|0)];
    if(nb&&!PASSIVE[nb.kind]&&((nx|0)!==(d.x|0)||(ny|0)!==(d.y|0))){ d.moving=false; d.path=null; continue; }
    d.vx=Math.cos(a)*spd; d.vy=Math.sin(a)*spd;
    d.x=nx; d.y=ny; d.moving=true;
    d.faceAng=Math.atan2(Math.sin(a),Math.cos(a)*1.6);
  }
  Battle.defenders=Battle.defenders.filter(d=>d.hp>0);
  applySeparation(dt);
  // --- towers + burning buildings ---
  for(const b of Battle.G.buildings){
    if(b.hp<b.maxHp*.45&&!PASSIVE[b.kind]&&Battle.parts.length<850){
      b.fireT=(b.fireT||0)-dt;
      if(b.fireT<=0){ b.fireT=.25+Math.random()*.3;
        const [cx,cy]=buildingCenter(b);
        Battle.parts.push({x:cx+(Math.random()-.5)*.6,y:cy+(Math.random()-.5)*.6,h:.5,
          vx:0,vy:0,vh:1.2,kind:'fire',color:Math.random()<.5?'rgba(240,140,50,.9)':'rgba(255,200,80,.9)',
          life:.4,maxLife:.4,size:3+Math.random()*2});
        Battle.parts.push({x:cx,y:cy,h:.9,vx:(Math.random()-.5)*.3,vy:0,vh:.9,
          kind:'smoke',color:'#3c4249',life:1.1,maxLife:1.1,size:3.5+Math.random()*2});
      }
    }
    if(b.kind!=='tower'||b.dead)continue;
    b.flash=Math.max(0,b.flash-dt*3);
    const td=b.def;
    const [cx,cy]=buildingCenter(b);
    const onHill=Battle.G.terrain[b.y*MAPW+b.x]===T.HILL;
    const rng=td.rng*(onHill?1.15:1);
    if(!b.target||b.target.hp<=0||dist(cx,cy,b.target.x,b.target.y)>rng)
      b.target=nearestAttacker(cx,cy,td.minRng||0,rng);
    if(b.target){
      b.angle=Math.atan2((b.target.y-cy),(b.target.x-cx)*1.6);
      b.cd-=dt;
      if(b.cd<=0){ b.cd=td.rate; b.flash=.15;
        fireProjectile(cx,cy,.22,b.target,td,true,td.proj); }
    } else b.cd=Math.max(b.cd-dt,0);
  }
  // --- projectiles ---
  for(const p of Battle.projs){
    if(p.hit)continue;
    if(p.lob){
      p.t+=dt; const k=Math.min(p.t/p.dur,1);
      p.x=lerp(p.sx,p.tx,k); p.y=lerp(p.sy,p.ty,k);
      p.h=.12+Math.sin(k*Math.PI)*(.25+p.dur*.14);
      p.vx=p.tx-p.sx; p.vy=p.ty-p.sy;
      if(k>=1){ p.hit=true;
        splashAt(p.tx,p.ty,Math.max(p.spl,0.5),p.dmg,p.vsAttackers,p.def);
        AudioSys.play('boom'); }
    } else if(p.arrowArc){
      const t=p.target;
      const alive=t&&(t.kind?!t.dead:t.hp>0);
      if(alive){ const [tx2,ty2]=t.kind?buildingCenter(t):[t.x,t.y]; p.tx=tx2; p.ty=ty2; }
      p.t+=dt; const k=Math.min(p.t/p.dur,1);
      p.x=lerp(p.sx,p.tx,k); p.y=lerp(p.sy,p.ty,k);
      const h2=.12+Math.sin(k*Math.PI)*p.arc;
      p.dh=(h2-p.h)/Math.max(dt,1e-4); p.h=h2;
      p.vx=p.tx-p.sx; p.vy=p.ty-p.sy;
      if(k>=1){ p.hit=true;
        if(alive){
          if(t.kind) damageBuilding(t, p.dmg*(WALLISH[t.kind]?(p.def.mw||1):(p.def.mb||1)));
          else damageUnit(t,p.dmg);
          AudioSys.play('hit'); } }
    } else {
      const t=p.target;
      const alive=t&&(t.kind?!t.dead:t.hp>0);
      if(p.guided&&alive){ const [tx,ty]=t.kind?buildingCenter(t):[t.x,t.y]; p.tx=tx; p.ty=ty; }
      const d=dist(p.x,p.y,p.tx,p.ty);
      const step=p.speed*dt;
      if(d<=step+0.15){
        if(p.ball){ if(resolveBallImpact(p)) p.hit=true; }
        else { p.hit=true;
        if(p.spl>0){ splashAt(p.tx,p.ty,p.spl,p.dmg,p.vsAttackers,p.def); AudioSys.play('boom'); }
        else if(alive){
          if(t.kind) damageBuilding(t, p.dmg*(WALLISH[t.kind]?(p.def.mw||1):(p.def.mb||1)));
          else damageUnit(t,p.dmg);
          Battle.parts.push({x:p.tx,y:p.ty,h:.2,vx:0,vy:0,vh:0,kind:'flash',
            color:'rgba(255,230,160,.9)',life:.12,maxLife:.12,size:4});
          AudioSys.play('hit'); } }
      } else {
        p.vx=(p.tx-p.x)/d; p.vy=(p.ty-p.y)/d;
        p.x+=p.vx*step; p.y+=p.vy*step;
        p.h=Math.max(0.05,p.h-dt*0.08);
      }
    }
  }
  Battle.projs=Battle.projs.filter(p=>!p.hit);
  for(const z of Battle.zaps) z.life-=dt;
  Battle.zaps=Battle.zaps.filter(z=>z.life>0);
  for(const p of Battle.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.h=(p.h||0)+(p.vh||0)*dt;
    if(p.kind===undefined){ p.vh-=4*dt; if(p.h<0){p.h=0;p.vh*=-0.3;} }
    else if(p.kind==='ragdoll'){ p.vh-=7.5*dt;
      if(p.h<=0&&p.vh<0){
        if(p.bounces<1){ p.bounces++; p.h=0; p.vh*=-0.45; p.vx*=.55; p.vy*=.55; p.spin*=.5; }
        else if(!p.rest){ p.rest=true; p.h=0; p.vx=0; p.vy=0; p.vh=0;
          stampDecal('corpse',p.x,p.y,1,p.color); p.life=Math.min(p.life,.3); } } } }
  Battle.parts=Battle.parts.filter(p=>p.life>0);
  checkEnd();
}
function trayRemaining(){ let n=0; for(const k in Battle.tray) n+=Battle.tray[k]; return n; }
function checkEnd(){
  if(Battle.ended)return;
  if(Battle.mode==='lab'){
    const bTowers=Battle.G.buildings.reduce((n,b)=>n+(b.kind==='tower'?1:0),0);
    if(Battle.time>1&&(Battle.attackers.length===0||(Battle.defenders.length===0&&bTowers===0))){
      const aAlive=Battle.attackers.length, bAlive=Battle.defenders.length;
      Battle.ended=true;
      Battle.result={lab:true, win:aAlive>0, draw:aAlive===0&&bAlive===0&&bTowers===0,
        aAlive, bAlive, bTowers, time:Math.round(Battle.time), destr:0, stars:0, hq:false};
      AudioSys.play(aAlive>0?'win':'lose');
      setTimeout(()=>showResult(),900);
    }
    return;
  }
  const destr=Battle.destrDone/Battle.destrTotal;
  if(Battle.mode==='defend'){
    if(Battle.hqDown){ endBattle(false); return; }
    const wv=Battle.waves;
    if(wv.nextWave>=wv.waves.length&&Battle.attackers.length===0&&Battle.time>4) endBattle(true);
  } else {
    if(destr>=0.9999){ endBattle(true); return; }
    if(Battle.timeLimit&&Battle.time>=Battle.timeLimit){ endBattle(Battle.hqDown||destr>=0.5); return; }
    if(trayRemaining()===0&&Battle.attackers.length===0&&Battle.time>3){
      endBattle(Battle.hqDown||destr>=0.5); }
  }
}
function endBattle(win){
  Battle.ended=true;
  const destr=Math.round(Battle.destrDone/Battle.destrTotal*100);
  let stars=0;
  if(Battle.mode==='attack'){ stars=(destr>=50?1:0)+(Battle.hqDown?1:0)+(destr>=95?1:0); }
  Battle.result={win, destr, stars, hq:Battle.hqDown, time:Math.round(Battle.time)};
  AudioSys.play(win?'win':'lose');
  setTimeout(()=>showResult(),900);
}

function setMode(m){ MODE=m;
  HUD.classList.toggle('hidden', m==='menu');
  PALETTE.classList.toggle('hidden', m==='menu');
  Input.onTap=null; Input.onDragPaint=null; Input.onHover=null;
  if(m==='menu'){ Battle.active=false; clearUI(); showMenu(); }
  else if(m==='battle'){
    clearUI(); battleHudUI();
    if(Battle.mode==='attack'){
      buildDeployOverlay();
      Input.onTap=(sx,sy)=>{
        if(Battle.ended)return;
        const [wx,wy]=s2w(sx,sy); const x=wx|0,y=wy|0;
        if(x<0||y<0||x>=MAPW||y>=MAPW)return;
        const k=Battle.traySel;
        if(Battle.deployMask[y*MAPW+x]&&Battle.tray[k]>0){
          const n=Math.min(Battle.squadSize,Battle.tray[k]);
          for(let i=0;i<n;i++){
            spawnAttacker(Battle.armyEra,+k,
              clamp(wx+(Math.random()-.5)*(n>1?1.6:0),0.3,MAPW-0.3),
              clamp(wy+(Math.random()-.5)*(n>1?1.6:0),0.3,MAPW-0.3));
            Battle.deployTotal[k]=(Battle.deployTotal[k]||0)+1;
            Battle.tray[k]--;
          }
          AudioSys.play('deploy'); updateHud();
        } else if(!Battle.deployMask[y*MAPW+x]) toast(STR.deployHint);
      };

}

}

function budgetLeft(){
  const G=BuildState.G;
  if(G.sb) return {gold:Infinity, gar:Infinity};
  const sp=fortSpent(G), t=TIERS[G.tier];
  return {gold:t.build-sp.build, gar:t.garrison-sp.gar};
}
function buildTap(sx,sy,fromDrag){
  const G=BuildState.G, sel=BuildState.sel; if(!G||!sel)return;
  const [wx,wy]=s2w(sx,sy); const x=wx|0, y=wy|0;
  if(x<0||y<0||x>=MAPW||y>=MAPW)return;
  const bl=budgetLeft();
  if(sel.t==='sell'){ const r=removeAt(G,x,y);
    if(r){ AudioSys.play('sell'); updateHud(); } return; }
  if(sel.t==='garrison'){
    const def=ERAS[G.era].units[sel.i];
    if(def.cost>bl.gar){ if(!fromDrag)toast('주둔 예산 부족!'); return; }
    if(placeGarrison(G,sel.i,x,y)){ AudioSys.play('build'); updateHud(); }
    return; }
  const kindMap={wall:0,tower:1,hq:2,trap:3,gate:4,palisade:5,moat:6,flag:7,bridgeB:8};
  const k=kindMap[sel.t]; if(k===undefined)return;
  let cost;
  const E=ERAS[G.era];
  if(k===0)cost=E.wall.cost; else if(k===1)cost=E.towers[sel.i].cost;
  else if(k===2)cost=250; else if(k===3)cost=E.trap.cost;
  else if(k===4)cost=E.gate.cost; else if(k===5)cost=E.palisade.cost;
  else if(k===6)cost=E.moat.cost; else if(k===8)cost=E.bridge.cost; else cost=E.flag.cost;
  // towers & gates can be built directly onto existing walls (wall refunded)
  let refund=0, swap=null;
  if(k===1||k===4){ const under=G.bgrid[y*MAPW+x];
    if(under&&(under.kind==='wall'||under.kind==='palisade')){ refund=under.cost; swap=under; } }
  if(cost>bl.gold+refund){ if(!fromDrag)toast('금이 부족합니다!'); return; }
  if(swap) removeAt(G,x,y);
  if(k===8){ // bridge replaces a moat tile beneath it
    const under=G.bgrid[y*MAPW+x];
    if(under&&under.kind==='moat') removeAt(G,x,y);
  }
  if(placeBuilding(G,k,sel.i||0,x,y)){ AudioSys.play('build'); updateHud(); }
  else if(swap){ placeBuilding(G,KIND_CODE[swap.kind],0,x,y); } // restore on failure
}

/* ===================== ARMY COMPOSER (shared) ===================== */
function armyComposer(container, era, budget, onChange){
  const comp={}; let left=budget;
  const free=budget>=FREE_BUDGET;
  const render=()=>{ container.innerHTML='';
    const info=el('div','sub',`${STR.armyBudget}: <b style="color:var(--gold)">${free?'∞':'💰'+left}</b>${free?'':' / '+budget}`);
    container.appendChild(info);
    const list=el('div','cardlist');
    ERAS[era].units.forEach((u,i)=>{
      const c=el('div','card');
      const cv=unitIcon(era,i); cv.style.float='left'; cv.style.marginRight='6px';
      c.appendChild(cv);
      c.insertAdjacentHTML('beforeend',`<b>${u.n} <span style="color:var(--gold)">💰${u.cost}</span></b>
        <span>${statLine(u,true)}</span>
        <div class="row" style="margin-top:6px">
          <button class="btn small" data-a="-1" data-i="${i}">−</button>
          <b style="min-width:26px;text-align:center">${comp[i]||0}</b>
          <button class="btn small" data-a="1" data-i="${i}">＋</button>
          <button class="btn small" data-a="5" data-i="${i}">+5</button>
          <button class="btn small" data-a="25" data-i="${i}">+25</button></div>`);
      list.appendChild(c); });
    container.appendChild(list);
    container.querySelectorAll('button[data-i]').forEach(b=>b.onclick=(e)=>{
      e.stopPropagation();
      const i=+b.dataset.i, a=+b.dataset.a, u=ERAS[era].units[i];
      if(a>0){ for(let k=0;k<a;k++){ if(u.cost<=left){ comp[i]=(comp[i]||0)+1; left-=u.cost; } } }
      else if((comp[i]||0)>0){ comp[i]--; left+=u.cost; }
      render(); onChange&&onChange(comp,left); });
  };
  render();
  return ()=>comp;
}

function labTeamColor(t){ return t===0?(getCustom().c1||'#4fa3e0'):PAL.crimson; }
function enterLab(keepUnits){
  if(!keepUnits||!Lab.G){
    Lab.units=keepUnits?Lab.units:[];
    Lab.G=makeG({name:'lab',era:Lab.eras[1],tier:2,map:Lab.map,seed:Lab.seed,sb:1,
      cust:{c1:'#c04a3a',c2:'#f0d060',em:'🐻'},b:[],g:[]});
  }
  buildTerrainCache(Lab.G);
  Battle.active=false; Battle.G=null;
  cam.x=0; cam.y=MAPW*TH/2; cam.zoom=Math.min(1.2,Math.max(.55,VH/(MAPW*TH*1.25)));
  clearUI(); MODE='lab';
  HUD.classList.remove('hidden'); PALETTE.classList.remove('hidden');
  labHudUI(); labPaletteUI();
  Input.onTap=(sx,sy)=>labPlace(sx,sy);
  Input.onDragPaint=(sx,sy)=>labPlace(sx,sy);
  Input.onHover=(sx,sy)=>{ Lab.hover=s2w(sx,sy); };
}
function labPlace(sx,sy){
  const [wx,wy]=s2w(sx,sy);
  if(wx<0.3||wy<0.3||wx>MAPW-0.3||wy>MAPW-0.3)return;
  if(Lab.sel==='erase'){
    if(removeAt(Lab.G,wx|0,wy|0)){ AudioSys.play('sell'); updateHud(); return; }
    let bi=-1,bd=.8;
    Lab.units.forEach((s,i)=>{ const dd=dist(s.x,s.y,wx,wy); if(dd<bd){bd=dd;bi=i;} });
    if(bi>=0){ Lab.units.splice(bi,1); AudioSys.play('sell'); updateHud(); }
    return;
  }
  // red defensive structures (siege experiments)
  if(typeof Lab.sel==='string'&&Lab.sel.indexOf('b:')===0){
    const parts=Lab.sel.split(':'); const k=+parts[1], tIdx=+parts[2]||0;
    const x=wx|0, y=wy|0;
    Lab.G.era=Lab.eras[1];
    for(const s of Lab.units) if((s.x|0)===x&&(s.y|0)===y) return; // don't bury troops
    if(k===1||k===4){ const under=Lab.G.bgrid[y*MAPW+x];
      if(under&&(under.kind==='wall'||under.kind==='palisade')) removeAt(Lab.G,x,y); }
    if(k===8){ const under=Lab.G.bgrid[y*MAPW+x];
      if(under&&under.kind==='moat') removeAt(Lab.G,x,y); }
    if(placeBuilding(Lab.G,k,tIdx,x,y)){ AudioSys.play('build'); updateHud(); }
    return;
  }
  // formation stamp: brush×brush block of troops in one click
  const n=Lab.brush, sp=.75, off=(n-1)*sp/2;
  let placed=0;
  outer:
  for(let ry=0;ry<n;ry++)for(let rx=0;rx<n;rx++){
    if(Lab.units.length>=1200) break outer; // sanity ceiling, far beyond playable
    const px2=clamp(wx-off+rx*sp,0.3,MAPW-0.3), py2=clamp(wy-off+ry*sp,0.3,MAPW-0.3);
    if(WALK_COST[Lab.G.terrain[(py2|0)*MAPW+(px2|0)]]===0)continue;
    let blocked=false;
    for(const s of Lab.units) if(dist(s.x,s.y,px2,py2)<.55){ blocked=true; break; }
    if(blocked)continue;
    Lab.units.push({team:Lab.team, era:Lab.eras[Lab.team], uIdx:Lab.sel, x:px2, y:py2});
    placed++;
  }
  if(placed){ AudioSys.play('build'); updateHud(); }
}

      <i>${STR.destroyed}</i><b>${r.destr}%</b>
      <i>본부</i><b>${r.hq?'💥 함락':'🏰 사수'}</b>
      <i>${STR.timeUsed}</i><b>${r.time}초</b></div>
    ${codeHtml}
    <div class="row" style="margin-top:14px">
      <button class="btn primary" id="retry">${STR.retry}</button>
      ${Battle.mode==='defend'&&BuildState.G?`<button class="btn" id="edit">${STR.editFort}</button>`:''}
      <button class="btn" id="menu">${STR.toMenu}</button></div>`);
  if(Battle.mode==='attack'){
    p.querySelector('#rc').onclick=e=>e.target.select();
    p.querySelector('#cpR').onclick=()=>copyText(p.querySelector('#rc').value); }
  p.querySelector('#retry').onclick=()=>{ const ls=Battle.lastSetup;
    if(ls){ clearUI(); startBattle(ls.mode, makeG(ls.fortData), ls.opts); } else setMode('menu'); };
  const eb=p.querySelector('#edit');
  if(eb) eb.onclick=()=>{ startBuild(serializeFort(BuildState.G)); };
  p.querySelector('#menu').onclick=()=>setMode('menu');
}
/* ===================== DEPLOY OVERLAY CACHE ===================== */
let deployOverlay=null;
function buildDeployOverlay(){
  const c=document.createElement('canvas');
  c.width=MAPW*TW+8; c.height=MAPW*TH+OY+40;
  const g=c.getContext('2d');
  for(let y=0;y<MAPW;y++)for(let x=0;x<MAPW;x++){
    if(!Battle.deployMask[y*MAPW+x])continue;
    const [pxr,pyr]=wpx(x+0.5,y+0.5); const px=pxr+OX, py=pyr+OY;
    g.fillStyle='rgba(94,201,123,.2)'; g.beginPath();
    g.moveTo(px,py-TH/2); g.lineTo(px+TW/2,py); g.lineTo(px,py+TH/2); g.lineTo(px-TW/2,py);
    g.closePath(); g.fill();
  }
  deployOverlay=c;
}

/* ===================== RENDER FRAME ===================== */
function render(time){
  ctx.fillStyle='#101820'; ctx.fillRect(0,0,VW,VH);
  const G=Battle.active?Battle.G:(MODE==='build'?BuildState.G:(MODE==='lab'?Lab.G:null));
  if(!G){
    ctx.save(); ctx.globalAlpha=.05; ctx.strokeStyle='#4fa3e0';
    for(let i=0;i<14;i++){ const x=(i*173)%VW, y=(i*97)%VH, s=30+(i%4)*18;
      ctx.beginPath(); ctx.moveTo(x,y-s/2); ctx.lineTo(x+s,y); ctx.lineTo(x,y+s/2); ctx.lineTo(x-s,y);
      ctx.closePath(); ctx.stroke(); }
    ctx.restore(); return; }
  // screen shake
  const ocx=cam.x, ocy=cam.y;
  if(SHAKE.t>0&&SHAKE.mag>0){
    const k=SHAKE.t/.32;
    cam.x+=(Math.random()-.5)*SHAKE.mag*k/cam.zoom;
    cam.y+=(Math.random()-.5)*SHAKE.mag*k*.7/cam.zoom;
  }
  blitTerrain();
  if(Battle.active) blitDecals();
  renderWater(time);
  if(Battle.active&&Battle.mode==='attack'&&deployOverlay&&trayRemaining()>0&&!Battle.ended){
    const sx=(-OX-cam.x)*cam.zoom+VW/2, sy=(-OY-cam.y)*cam.zoom+VH/2;
    ctx.drawImage(deployOverlay,sx,sy,deployOverlay.width*cam.zoom,deployOverlay.height*cam.zoom);
  }
  // build ghost
  if(MODE==='build'&&BuildState.hover&&BuildState.sel){
    const x=BuildState.hover[0]|0, y=BuildState.hover[1]|0;
    if(x>=0&&y>=0&&x<MAPW&&y<MAPW){
      const size=BuildState.sel.t==='hq'?2:1;
      let ok;
      if(BuildState.sel.t==='sell') ok=true;
      else if(BuildState.sel.t==='bridgeB'){
        const under=G.bgrid[y*MAPW+x];
        ok=canPlaceBridge(G,x,y)||(under&&under.kind==='moat');
      } else if(BuildState.sel.t==='tower'||BuildState.sel.t==='gate'){
        const under=G.bgrid[y*MAPW+x];
        ok=canPlace(G,x,y,size)||!!(under&&(under.kind==='wall'||under.kind==='palisade'));
      } else ok=canPlace(G,x,y,size);
      if(BuildState.sel.t==='garrison') ok=ok&&WALK_COST[G.terrain[y*MAPW+x]]>0;
      for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++)
        drawTileHighlight(x+dx,y+dy, BuildState.sel.t==='sell'?'#e0604f':(ok?'#5ec97b':'#e0604f'), .45);
      // translucent sprite preview of the building about to be placed
      const st=BuildState.sel.t;
      if(ok&&(st==='wall'||st==='gate'||st==='palisade'||st==='hq'||st==='tower')){
        const [gx,gy]=w2s(x+(size===2?1:0.5),y+(size===2?1:0.5));
        const rz2=tileRaise(G,x,y);
        ctx.save(); ctx.globalAlpha=.55;
        ctx.translate(gx,gy-rz2*cam.zoom); ctx.scale(cam.zoom,cam.zoom);
        blitSprite(st==='wall'?wallSprite(G.era):st==='gate'?gateSprite(G.era):
          st==='palisade'?palSprite(G.era):st==='hq'?hqSprite(G.era):towerSprite(G.era,BuildState.sel.i));
        ctx.restore();
      }
      if(BuildState.sel.t==='tower'&&ok){
        const td=ERAS[G.era].towers[BuildState.sel.i];
        const onHill=G.terrain[y*MAPW+x]===T.HILL;
        const [cx,cy]=w2s(x+0.5,y+0.5);
        ctx.strokeStyle='rgba(240,180,60,.5)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.ellipse(cx,cy,td.rng*(onHill?1.15:1)*TW/2*cam.zoom,td.rng*(onHill?1.15:1)*TH/2*cam.zoom,0,0,7); ctx.stroke();
        if(td.minRng){ ctx.strokeStyle='rgba(224,96,79,.5)';
          ctx.beginPath(); ctx.ellipse(cx,cy,td.minRng*TW/2*cam.zoom,td.minRng*TH/2*cam.zoom,0,0,7); ctx.stroke(); }
      }
    }
  }
  // drawables (flat/ground kinds first via lower sort key)
  const items=[];
  for(const b of G.buildings){
    const flat=(b.kind==='moat')?-31:(b.kind==='bridgeB'||b.kind==='trap')?-30:(b.kind==='flag'?-0.4:0);
    items.push({k:b.x+b.y+(b.kind==='hq'?1:0)+flat, f:()=>drawBuilding(b,time,G.cust)});
  }
  if(MODE==='build'){
    for(const gu of G.garrison){
      const u={def:gu.def,era:G.era,x:gu.x+0.5,y:gu.y+0.5,hp:1,maxHp:1,color:G.cust.c1,seed:gu.x*7+gu.y,moving:false,slow:0,faceAng:-.5};
      items.push({k:gu.x+gu.y, f:()=>drawUnit(u,time)});
    }
  }
  if(MODE==='lab'&&!Battle.active){
    for(const s of Lab.units){
      const u={def:ERAS[s.era].units[s.uIdx],era:s.era,x:s.x,y:s.y,hp:1,maxHp:1,
        color:labTeamColor(s.team),seed:s.x*7+s.y,moving:false,slow:0,faceAng:s.team===0?-.5:Math.PI+.5};
      items.push({k:s.x+s.y, f:()=>drawUnit(u,time)});
    }
    // placement cursor
    if(Lab.hover){
      const hx=Lab.hover[0], hy=Lab.hover[1];
      if(hx>0&&hy>0&&hx<MAPW&&hy<MAPW){
        if(typeof Lab.sel==='string'&&Lab.sel.indexOf('b:')===0){
          const parts=Lab.sel.split(':'); const bk=+parts[1], bti=+parts[2]||0;
          const tx2=hx|0, ty2=hy|0;
          const under=G.bgrid[ty2*MAPW+tx2];
          let ok=bk===8?(canPlaceBridge(G,tx2,ty2)||(under&&under.kind==='moat'))
                :(canPlace(G,tx2,ty2,1)||((bk===1||bk===4)&&under&&(under.kind==='wall'||under.kind==='palisade')));
          drawTileHighlight(tx2,ty2, ok?'#5ec97b':'#e0604f', .45);
          if(ok&&(bk===0||bk===4||bk===5||bk===1)){
            const [gx,gy]=w2s(tx2+0.5,ty2+0.5);
            ctx.save(); ctx.globalAlpha=.55; ctx.translate(gx,gy); ctx.scale(cam.zoom,cam.zoom);
            blitSprite(bk===0?wallSprite(Lab.eras[1]):bk===4?gateSprite(Lab.eras[1]):
              bk===5?palSprite(Lab.eras[1]):towerSprite(Lab.eras[1],bti));
            ctx.restore();
          }
        } else {
          const [cx2,cy2]=w2s(hx,hy);
          ctx.strokeStyle=Lab.sel==='erase'?'rgba(224,96,79,.8)':labTeamColor(Lab.team);
          ctx.lineWidth=1.6;
          ctx.beginPath(); ctx.ellipse(cx2,cy2,10*cam.zoom,5*cam.zoom,0,0,7); ctx.stroke();
        }
      }
    }
  }
  if(Battle.active){
    for(const u of Battle.attackers) items.push({k:u.x+u.y-1, f:()=>drawUnit(u,time)});
    for(const d of Battle.defenders) items.push({k:d.x+d.y-1, f:()=>drawUnit(d,time)});
  }
  items.sort((a,b)=>a.k-b.k);
  for(const it of items) it.f();
  if(Battle.active){
    for(const p of Battle.projs) drawProjectile(p);
    for(const z of Battle.zaps) drawZap(z);
    drawParticles(Battle.parts);
  }
  drawBirds(time);
  renderClouds(time);
  cam.x=ocx; cam.y=ocy;
}

/* ===================== MAIN LOOP ===================== */
const STEP=1000/60;
let acc=0, last=performance.now(), hudTimer=0;
let frames=0, fpsAt=last;
const devOn=new URLSearchParams(location.search).has('dev');
if(devOn) $('#dev').style.display='block';
addEventListener('blur',()=>{ if(Battle.active) Battle.paused=true; });
function frame(now){
  requestAnimationFrame(frame);
  acc+=now-last; last=now;
  if(acc>250)acc=250;
  while(acc>=STEP){
    const dt=STEP/1000;
    panByKeys(dt);
    // shake decays everywhere (fixes residual jitter lingering into build mode)
    if(SHAKE.t>0){ SHAKE.t-=dt; if(SHAKE.t<=0)SHAKE.mag=0; }
    if(Battle.active&&!Battle.paused&&!Battle.ended){
      for(let i=0;i<Battle.speed;i++) simStep(dt);
    }
    acc-=STEP;
  }
  if(Battle.active){ hudTimer+=1; if(hudTimer>=15){ hudTimer=0; updateHud(); } }
  render(now/1000);
  if(devOn){ frames++;
    if(now-fpsAt>=500){ $('#dev').textContent=Math.round(frames*1000/(now-fpsAt))+' fps · e'+
      (Battle.attackers.length+Battle.defenders.length)+' p'+(Battle.projs.length+Battle.parts.length);
      frames=0; fpsAt=now; } }
}

/* ===================== BOOT ===================== */
setMode('menu');
requestAnimationFrame(frame);
</script>
