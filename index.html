function drawRoofSeg(g,mi,isX,e0,e1,h0,h1){ // 박공 세그먼트 — e*: 용마루 연장(0=중앙마루), h*: 끝단 모임지붕
  const m=BLOCK.mats[mi]||BLOCK.mats[0], ct=m.top, cs=m.side;
  const D=isX?[16,8]:[-16,8];
  const P=isX?[-10.7,5.4]:[10.7,5.4];
  const AY=-16;
  const RA=[-D[0]*e0,-D[1]*e0+AY], RB=[D[0]*e1,D[1]*e1+AY];
  const EA1=[-D[0]*.99-P[0],-D[1]*.99-P[1]], EB1=[D[0]*.99-P[0],D[1]*.99-P[1]];
  const EA2=[-D[0]*.99+P[0],-D[1]*.99+P[1]], EB2=[D[0]*.99+P[0],D[1]*.99+P[1]];
  const q=(p1,p2,p3,p4,f)=>{g.fillStyle=f;g.beginPath();
    g.moveTo(p1[0],p1[1]);g.lineTo(p2[0],p2[1]);g.lineTo(p3[0],p3[1]);g.lineTo(p4[0],p4[1]);
    g.closePath();g.fill();g.strokeStyle=PAL.outline;g.lineWidth=1;g.stroke();};
  q(RA,RB,EB1,EA1,ct);
  q(RA,RB,EB2,EA2,shade(cs,.82));
  const hip=(R,E1,E2)=>{g.fillStyle=shade(cs,.95);g.beginPath();
    g.moveTo(R[0],R[1]);g.lineTo(E1[0],E1[1]);g.lineTo(E2[0],E2[1]);
    g.closePath();g.fill();g.strokeStyle=PAL.outline;g.lineWidth=1;g.stroke();};
  if(h0) hip(RA,EA1,EA2);
  if(h1) hip(RB,EB1,EB2);
  g.strokeStyle='rgba(30,26,20,.4)'; g.lineWidth=.8; // 기와줄
  for(const t of [.45,.75]){
    g.beginPath();
    g.moveTo(lerp(RA[0],EA2[0],t),lerp(RA[1],EA2[1],t));
    g.lineTo(lerp(RB[0],EB2[0],t),lerp(RB[1],EB2[1],t)); g.stroke(); }
  g.strokeStyle='rgba(255,255,255,.4)'; g.lineWidth=1.4; // 용마루광
  g.beginPath(); g.moveTo(RA[0],RA[1]); g.lineTo(RB[0],RB[1]); g.stroke();
}

      g.strokeStyle='#8a6a44'; g.lineWidth=1;
      g.beginPath(); g.moveTo(-8.6,-16); g.lineTo(-8,-14.3); g.moveTo(-6,-16); g.lineTo(-6.6,-14.3); g.stroke();
      g.strokeStyle='#e8e4d8'; g.lineWidth=1.1; // sling strings (kept within x<=19)
      g.beginPath(); g.moveTo(13,-22); g.lineTo(15.8,-18); g.stroke();
      g.fillStyle=BEAR.steelDk; g.beginPath(); g.arc(16.2,-16.8,1.7,0,7); g.fill(); bOut(g,1);
      bearHeadC(g,-8,-9,4.8); // bear at base
      break; }
    case 'siegegun':{ // 리벳 강판 + 바퀴 2 + 포수 곰 (포신 VDYN, pivot x0,y-9 여유)
      g.fillStyle=BEAR.wood; g.beginPath(); // trail
      g.moveTo(3,-6); g.lineTo(12,-2); g.lineTo(13.4,-4); g.lineTo(4.4,-8); g.closePath(); g.fill(); bOut(g,1.4);
      for(const wx of [-4.5,4.5]){ g.fillStyle=BEAR.steelDk; g.beginPath(); g.arc(wx,-3.2,3.1,0,7); g.fill(); bOut(g,1.4);
        g.fillStyle=BEAR.steel; g.beginPath(); g.arc(wx,-3.2,1.1,0,7); g.fill(); }
      g.save(); g.translate(-1,-9.5); g.rotate(-.12); // riveted angled shield plate
      g.fillStyle=BEAR.steel; g.beginPath();
      if(g.roundRect) g.roundRect(-6,-8,12,10,1.4); else g.rect(-6,-8,12,10);
      g.fill(); bOut(g,1.6);
      g.fillStyle=BEAR.steelDk;
      for(const rx of [-4,-1,2,5]) for(const ry of [-6,-1,4]){ g.beginPath(); g.arc(rx,ry,.5,0,7); g.fill(); }
      g.restore();
      bearHeadC(g,-8,-13,4.8); // kneeling bear crew behind
      break; }
    case 'mortarUnit':{ // 무릎앉은 곰 + 다크 포판 + 개방형 포탄 상자(2발) (포신 VDYN 고정앙각)
      g.fillStyle=BEAR.dark; g.beginPath(); g.ellipse(0,-3.6,8.5,3,0,0,7); g.fill(); bOut(g,1.6);
      g.fillStyle=BEAR.steelDk; g.beginPath(); g.ellipse(0,-4.6,3.6,2.2,0,0,7); g.fill(); bOut(g,1.2);
      g.fillStyle=BEAR.wood; g.beginPath(); // open shell crate
      if(g.roundRect) g.roundRect(-13,-7,7,5.6,1.2); else g.rect(-13,-7,7,5.6);
      g.fill(); bOut(g,1.4);
      for(const sx of [-11,-8]){ g.fillStyle=BEAR.steelDk; g.beginPath(); g.ellipse(sx,-7.4,1.2,2.4,0,0,7); g.fill(); bOut(g,1.1);
        g.fillStyle=BEAR.gold; g.beginPath(); g.arc(sx,-9.4,.9,0,7); g.fill(); }
      g.fillStyle=BEAR.boot; g.beginPath(); // kneeling leg
      if(g.roundRect) g.roundRect(2,-6,4,5,1); else g.rect(2,-6,4,5);
      g.fill(); bOut(g,1.3);
      g.fillStyle=C.c; g.beginPath(); // small torso
      g.ellipse(3.5,-9.4,4.4,4,0,0,7); g.fill(); bOut(g,1.5);
      bearHeadC(g,4,-14.4,4.6);
      break; }
    case 'bombard':{ // 거대 목제 썰매 받침 + 로프 라싱 + 횃불(금빛 불꽃) 든 곰 (포신 VDYN)
      g.fillStyle=BEAR.wood; g.beginPath(); // massive sled beams
      if(g.roundRect) g.roundRect(-13,-6.6,26,5.4,1.6); else g.rect(-13,-6.6,26,5.4);
      g.fill(); bOut(g,1.7);
      g.strokeStyle=BEAR.woodLt; g.lineWidth=2;
      g.beginPath(); g.moveTo(-13,-3.6); g.lineTo(13,-3.6); g.stroke();
      g.save(); g.translate(0,-8.6); g.rotate(-.34); // 포신 앙각에 맞춘 경사 크래들
      g.fillStyle=BEAR.steelDk; g.beginPath();
      if(g.roundRect) g.roundRect(-7,-2.6,14,5.6,1.6); else g.rect(-7,-2.6,14,5.6);
      g.fill(); bOut(g,1.5);
      g.restore();
      g.fillStyle=BEAR.wood; g.beginPath(); // 전방 받침목(초크)
      if(g.roundRect) g.roundRect(4.6,-9.6,4.4,3.6,1.2); else g.rect(4.6,-9.6,4.4,3.6);
      g.fill(); bOut(g,1.3);
      g.strokeStyle='#8a6a44'; g.lineWidth=1.3; // rope lashings
      for(const rx of [-9,-3,3,9]){ g.beginPath(); g.moveTo(rx,-6.6); g.lineTo(rx-1.2,-1.6); g.stroke(); }
      bearHeadC(g,-10,-11.5,5); // bear holding torch
      g.strokeStyle=BEAR.wood; g.lineWidth=1.6;
      g.beginPath(); g.moveTo(-13.5,-13.5); g.lineTo(-15.5,-19); g.stroke();
      g.fillStyle=BEAR.gold; g.beginPath(); g.arc(-15.8,-20.6,2,0,7); g.fill(); bOut(g,1); // flame
      g.fillStyle='#f4d060'; g.beginPath(); g.arc(-15.8,-21.4,1.1,0,7); g.fill();
      break; }
    case 'gatlingGun':{ // 삼각대 받침 + 탄약 호퍼 + 크랭크 곰 (총신 VDYN 3연장, pivot x1,y-9)
      g.strokeStyle=BEAR.steelDk; g.lineWidth=2.2; // tripod legs
      g.beginPath(); g.moveTo(0,-9); g.lineTo(-7,-2); g.moveTo(0,-9); g.lineTo(7,-2);
      g.moveTo(0,-9); g.lineTo(0,-1.5); g.stroke();
      g.fillStyle=BEAR.steel; g.beginPath(); g.arc(0,-9.4,2.4,0,7); g.fill(); bOut(g,1.3);
      g.fillStyle=BEAR.steelDk; g.beginPath(); // ammo hopper
      if(g.roundRect) g.roundRect(-3.4,-15,4.6,5.6,1.2); else g.rect(-3.4,-15,4.6,5.6);
      g.fill(); bOut(g,1.3);
      g.fillStyle=BEAR.gold; g.fillRect(-2.6,-14,1,3.6); g.fillRect(-.6,-14,1,3.6);
      g.fillStyle=C.c; g.beginPath(); // bear torso standing behind
      g.ellipse(-7,-11.4,4.2,5,0,0,7); g.fill(); bOut(g,1.5);
      g.fillStyle=BEAR.fur; g.beginPath(); // one paw out (crank)
      if(g.roundRect) g.roundRect(-3.6,-11.5,3.4,2.6,1.2); else g.rect(-3.6,-11.5,3.4,2.6);
      g.fill(); bOut(g,1.2);
      g.strokeStyle=BEAR.steelDk; g.lineWidth=1.3; g.beginPath(); g.arc(-2,-9.8,1.6,0,7); g.stroke(); // crank handle
      bearHeadC(g,-7,-16.6,4.8);
      break; }
    case 'apc':{ // 4륜 경장갑 차체(C.c) + 상부 해치 곰(helm2) (포신 VDYN)
      g.fillStyle=BEAR.dark; g.beginPath(); // hull skirt
      g.moveTo(-13,-3.5); g.lineTo(-11.5,1); g.lineTo(11.5,1); g.lineTo(13,-3.5); g.closePath();
      g.fill(); bOut(g,1.6);
      for(const wx of [-9,-3,3,9]){ g.fillStyle=BEAR.black; g.beginPath(); g.arc(wx,-.6,2.1,0,7); g.fill(); bOut(g,1.2);
        g.fillStyle=BEAR.steelDk; g.beginPath(); g.arc(wx,-.6,.8,0,7); g.fill(); }
      g.fillStyle=C.c; g.beginPath(); // light armored hull
      g.moveTo(-13.5,-10); g.lineTo(-12,-3.5); g.lineTo(12,-3.5); g.lineTo(14,-7);
      g.lineTo(11,-10); g.closePath(); g.fill(); bOut(g,1.6);
      g.fillStyle=C.dk; g.fillRect(-12,-9.6,24,1.6); // hull seam shading
      g.fillStyle=BEAR.navy; g.beginPath(); // roof hatch
      if(g.roundRect) g.roundRect(-4,-13.5,8,4.2,1); else g.rect(-4,-13.5,8,4.2);
      g.fill(); bOut(g,1.3);
      bearHeadC(g,0,-17.8,5); bearHelm(g,'helm2',0,-17.8,5);
      break; }
    case 'howitzer':{ // 궤도 차체(짧은 tank 스커트) + 유압 받침 + 포병 곰(helm2) (장포신 VDYN)
      g.fillStyle=BEAR.dark; g.beginPath(); // tracked base (shorter than tank)
      g.moveTo(-13,-3); g.lineTo(-11.5,1.4); g.lineTo(11.5,1.4); g.lineTo(13,-3); g.closePath();
      g.fill(); bOut(g,1.6);
      for(let i=0;i<4;i++){ const wx=-8.4+i*5.6;
        g.fillStyle=BEAR.steelDk; g.beginPath(); g.arc(wx,-.6,2.3,0,7); g.fill(); bOut(g,1.3); }
      g.fillStyle=C.c; g.beginPath(); // hull
      g.moveTo(-12.5,-9); g.lineTo(-11,-3); g.lineTo(11,-3); g.lineTo(13,-6.6);
      g.lineTo(10.4,-9); g.closePath(); g.fill(); bOut(g,1.6);
      g.fillStyle=BEAR.steel; g.beginPath(); // hydraulic recoil cradle (angled steel block)
      g.save(); g.translate(1,-12); g.rotate(-.18);
      if(g.roundRect) g.roundRect(-4.5,-3,9,5.6,1.3); else g.rect(-4.5,-3,9,5.6);
      g.fill(); g.restore(); bOut(g,1.5);
      g.fillStyle=BEAR.steelDk; g.beginPath(); g.arc(-2,-11,1.4,0,7); g.fill(); bOut(g,1);
      bearHeadC(g,-8,-13.6,5); bearHelm(g,'helm2',-8,-13.6,5); // bear beside
      break; }
    /* ═══════════ AGENT-BEAR-RIGS-END ═══════════ */
    default:
      if(gear){
        bearTorsoC(g,C);
        if(gear.s) bearShield(g,gear.s,C);
        bearHeadC(g,0,-22.5,8.2, era===0?'angry':null);
        bearHelm(g,gear.h,0,-22.5,8.2);
        bearWeapon(g,gear.w,C);
      } else if(VDYN[id]||BEAR_BIG[id]) bearRigFallback(g,era,C,id);
      else { bearTorsoC(g,C); bearHeadC(g,0,-22.5,8.2);
        bearHelm(g,era===0?'cap':era===1?'tricorne':'helm2',0,-22.5,8.2); }
  }
}
function unitSprite(era,uIdx,color,flip){
  const key='bu_'+era+'_'+uIdx+'_'+color+'_'+(flip?1:0);
  return sprite(key,52,64,52,g=>{
    if(flip) g.scale(-1,1);
    const C={c:color,dk:shade(color,.62),lt:shade(color,1.22)};
    drawBearUnit(g,era,uIdx,C);
  });
}
/* drawUnit v6 — 곰 스프라이트 + 동적 포신 + 뒤뚱 애니메이션 (이전 정의 대체) */
function drawUnit(u,time){
  const G=curG(); if(!G)return;
  const [sx,sy]=w2s(u.x,u.y);
  if(sx<-70||sy<-90||sx>VW+70||sy>VH+70)return;
  const rz=tileRaise(G,u.x,u.y);
  ctx.save(); ctx.translate(sx,sy-rz*cam.zoom);
  const id=u.def.id, big=BEAR_BIG[id];
  const sc=cam.zoom*.9*(BEAR_SCALE[id]||.78);
  ctx.scale(sc,sc);
  ctx.fillStyle='rgba(27,27,27,.3)';
  ctx.beginPath(); ctx.ellipse(0,1,big?13:8.5,big?5:3.4,0,0,7); ctx.fill();
  if(u.atkT>0){ const lg=Math.sin((1-(u.atkT/.22))*Math.PI)*2.6;
    ctx.translate(Math.cos(u.faceAng||0)*lg*1.5, Math.sin(u.faceAng||0)*lg*.9); }
  const wob=u.moving?Math.sin(time*9+(u.seed||0)*9)*(big?.03:.06):0;
  ctx.rotate(wob);
  const flip=Math.cos(u.faceAng??.5)<0;
  blitSprite(unitSprite(u.era,u.uIdx,u.color,flip));
  if(u.hitT>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=Math.min(1,u.hitT*5.5)*.75;
    blitSprite(unitSprite(u.era,u.uIdx,u.color,flip)); ctx.restore(); }
  const vd=VDYN[id];
  if(vd){
    const dirH=flip?-1:1;
    let bx,by;
    if(vd.fixed!=null){ bx=Math.cos(vd.fixed)*dirH; by=-Math.sin(vd.fixed); }
    else { const a=u.faceAng??0; bx=Math.cos(a); by=Math.sin(a)*.6-(vd.elev||0); }
    const px=vd.x*dirH, py=vd.y;
    const rec=(u.flash||0)*vd.len*.45;
    ctx.strokeStyle=BEAR.out; ctx.lineWidth=vd.w+2.4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(px-bx*rec,py-by*rec);
    ctx.lineTo(px+bx*(vd.len-rec),py+by*(vd.len-rec)); ctx.stroke();
    ctx.strokeStyle=BEAR.steelDk; ctx.lineWidth=vd.w;
    if(vd.tri){ for(let i=-1;i<=1;i++){
        ctx.beginPath(); ctx.moveTo(px-bx*rec,py+i*1.7-by*rec);
        ctx.lineTo(px+bx*(vd.len-rec),py+i*1.7+by*(vd.len-rec)); ctx.stroke(); } }
    else { ctx.beginPath(); ctx.moveTo(px-bx*rec,py-by*rec);
      ctx.lineTo(px+bx*(vd.len-rec),py+by*(vd.len-rec)); ctx.stroke(); }
    ctx.lineCap='butt';
    if(vd.cap){ ctx.fillStyle=BEAR.steel;
      ctx.beginPath(); ctx.arc(px+bx*(vd.len-rec),py+by*(vd.len-rec),vd.cap,0,7); ctx.fill();
      ctx.strokeStyle=BEAR.out; ctx.lineWidth=1; ctx.stroke(); }
    if(u.flash>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,220,120,'+u.flash*7+')';
      ctx.beginPath(); ctx.arc(px+bx*(vd.len+2),py+by*(vd.len+2),3+vd.w,0,7); ctx.fill(); ctx.restore(); }
  } else if(u.flash>0){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,220,120,'+u.flash*7+')';
    ctx.beginPath(); ctx.arc(flip?-14:14,-14,3.2,0,7); ctx.fill(); ctx.restore();
  }
  ctx.rotate(-wob);
  if(u.hp<u.maxHp&&u.hp>0) hpBarLocal(ctx,0,big?-28:-36,big?22:16,u.hp/u.maxHp);
  if(u.slow>0){ ctx.fillStyle='rgba(120,180,240,.7)'; ctx.beginPath(); ctx.arc(0,big?-31:-39,2,0,7); ctx.fill(); }
  ctx.restore();
}
/* unitIcon v2 — 팔레트/트레이 아이콘도 곰 스프라이트로 통일 */
function unitIcon(era,uIdx,color){
  const s=unitSprite(era,uIdx,color||'#2AB2E9',false);
  const cv=document.createElement('canvas'); cv.width=56; cv.height=46;
  const g=cv.getContext('2d');
  const k=.78;
  g.drawImage(s.c,28-(s.w*k)/2,44-s.ay*k,s.w*k,s.h*k);
  return cv;
}

function drawBHit(b){ // 건물 피격 글로우 — 가산 합성 소프트 플래시
  const G=curG(); if(!G)return;
  const sz=b.kind==='hq'?2:1;
  const [fx,fy]=w2s(b.x+sz/2,b.y+sz/2);
  const rz=tileRaise(G,b.x,b.y);
  const hgt=(b.kind==='block'?(b.layers?b.layers.length:1)*13
            :b.kind==='tower'?30:b.kind==='hq'?34:18)*cam.zoom;
  ctx.save(); ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=Math.min(1,b.hitT*4.5)*.42;
  ctx.fillStyle='rgba(255,208,140,1)';
  ctx.beginPath();
  ctx.ellipse(fx,fy-rz*cam.zoom-hgt*.5,TW/2*sz*cam.zoom*.52,hgt*.52+TH/2*cam.zoom*.4,0,0,7);
  ctx.fill(); ctx.restore();
}

function drawBuildGhost(){
  if(MODE!=='build'||!BuildState.hover||!BuildState.sel) return;
  const G=BuildState.G; if(!G) return;
  const x=BuildState.hover[0]|0, y=BuildState.hover[1]|0;
  if(x<0||y<0||x>=MAPW||y>=MAPW) return;
  const st=BuildState.sel.t;
  const size=st==='hq'?2:1;
  const underG=G.bgrid[y*MAPW+x];
  let ok;
  if(st==='sell') ok=true;
  else if(st==='bridgeB') ok=canPlaceBridge(G,x,y)||!!(underG&&underG.kind==='moat');
  else if(st==='tower'||st==='gate')
    ok=canPlace(G,x,y,size)||!!(underG&&(underG.kind==='wall'||underG.kind==='palisade'));
  else if(st==='wall')
    ok=canPlace(G,x,y,size)||!!(underG&&underG.kind==='wall'&&(underG.lvl||1)<BLOCK.lvlMax);
  else if(st==='block'){
    const topOk=underG&&underG.kind==='block'
      &&!MAT_TERMINAL[(BLOCK.mats[(underG.layers||[underG.tIdx||0])[(underG.layers||[0]).length-1]]||BLOCK.mats[0]).kind];
    ok=canPlace(G,x,y,size)||!!(topOk&&(underG.lvl||1)<maxHFor(G,x,y));
  } else if(st==='flag')
    ok=canPlace(G,x,y,size)||!!(underG&&(underG.kind==='wall'||underG.kind==='block'||underG.kind==='tower')&&!underG.flagTop);
  else if(st==='hq'){
    const tiles=[[x,y],[x+1,y],[x,y+1],[x+1,y+1]];
    const cols=tiles.map(([tx2,ty2])=>(tx2<MAPW&&ty2<MAPW)?G.bgrid[ty2*MAPW+tx2]:null);
    const allB=cols.every(o=>o&&o.kind==='block');
    const platOk=allB&&new Set(cols).size===4
      &&cols.every(o=>o.layers.length===cols[0].layers.length
        &&!MAT_TERMINAL[(BLOCK.mats[o.layers[o.layers.length-1]]||BLOCK.mats[0]).kind]);
    ok=canPlace(G,x,y,size)||platOk;
  } else ok=canPlace(G,x,y,size);
  if(st==='garrison') ok=ok&&WALK_COST[G.terrain[y*MAPW+x]]>0;
  const lift0=(st==='wall'&&underG&&underG.kind==='wall')?13*(underG.lvl||1):
              (st==='block'&&underG&&underG.kind==='block')?13*((underG.layers||[0]).length):
              (st==='tower'&&underG&&underG.kind==='wall')?13*(underG.lvl||1):
              (st==='hq'&&underG&&underG.kind==='block')?13*(underG.layers?underG.layers.length:1):0;
  const hlc=st==='sell'?'#e0604f':(ok?'#5ec97b':'#e0604f');
  if(lift0>0){ // 착지층에 떠 있는 다이아몬드
    const rz0=tileRaise(G,x,y);
    const P=[[x,y],[x+1,y],[x+1,y+1],[x,y+1]].map(p=>w2s(p[0],p[1]));
    ctx.save(); ctx.globalAlpha=.5; ctx.translate(0,-(lift0+rz0)*cam.zoom);
    ctx.fillStyle=hlc; ctx.beginPath();
    ctx.moveTo(P[0][0],P[0][1]); for(let i2=1;i2<4;i2++) ctx.lineTo(P[i2][0],P[i2][1]);
    ctx.closePath(); ctx.globalAlpha=.28; ctx.fill();
    ctx.globalAlpha=.75; ctx.strokeStyle=hlc; ctx.lineWidth=1.4*cam.zoom; ctx.stroke();
    ctx.restore();
  } else {
    for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++)
      drawTileHighlight(x+dx,y+dy, hlc, .4);
  }
  if(st==='tower'&&ok){
    const td=ERAS[G.era].towers[BuildState.sel.i];
    if(td){ const onHill=G.terrain[y*MAPW+x]===T.HILL;
      const [cx2,cy2]=w2s(x+0.5,y+0.5);
      ctx.strokeStyle='rgba(240,180,60,.5)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(cx2,cy2,td.rng*(onHill?1.15:1)*TW/2*cam.zoom,td.rng*(onHill?1.15:1)*TH/2*cam.zoom,0,0,7); ctx.stroke();
      if(td.minRng){ ctx.strokeStyle='rgba(224,96,79,.5)';
        ctx.beginPath(); ctx.ellipse(cx2,cy2,td.minRng*TW/2*cam.zoom,td.minRng*TH/2*cam.zoom,0,0,7); ctx.stroke(); } }
  }
  if(!ok) return;
  if(!(st==='wall'||st==='gate'||st==='palisade'||st==='hq'||st==='tower'||st==='block')) return;
  const lift=lift0;
  const [gx,gy]=w2s(x+(size===2?1:0.5),y+(size===2?1:0.5));
  const rz2=tileRaise(G,x,y);
  if(lift>0){ // 스택 유도선
    const [glx,gly]=w2s(x+.5,y+.5);
    ctx.save(); ctx.strokeStyle='rgba(94,201,123,.75)'; ctx.lineWidth=1.4*cam.zoom;
    ctx.setLineDash([4*cam.zoom,3*cam.zoom]);
    ctx.beginPath(); ctx.moveTo(glx,gly); ctx.lineTo(glx,gly-lift*cam.zoom); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }
  ctx.save(); ctx.globalAlpha=.6;
  ctx.translate(gx,gy-rz2*cam.zoom-lift*cam.zoom); ctx.scale(cam.zoom,cam.zoom);
  blitSprite(st==='wall'?wallSprite(G.era):st==='gate'?gateSprite(G.era):
    st==='palisade'?palSprite(G.era,2):st==='hq'?hqSprite(G.era):
    st==='block'?blockSprite(BuildState.sel.i||0,lift<=0):towerSprite(G.era,BuildState.sel.i));
  ctx.restore();
}
