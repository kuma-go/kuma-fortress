<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>KUMA FORTRESS — 쿠마의 요새 전쟁</title>
<style>
:root{
  --bg:#070c0f; --panel:#151c24; --panel2:#202b36; --line:#35424f;
  --ink:#edf3f7; --ink2:#aebbc4; --gold:#e5a837; --accent:#37a3f1;
  --ok:#5ec97b; --bad:#e0604f; --navy:#0b1218; --warm:#b87332;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif;color:var(--ink);}
canvas#world{display:block;position:fixed;inset:0;touch-action:none;}
#dev{position:fixed;top:4px;left:4px;color:#0f0;font:12px monospace;display:none;z-index:99;pointer-events:none;}
.hidden{display:none !important;}
button{font-family:inherit;}
.btn{background:linear-gradient(180deg,#263443,#19232e);border:1px solid #3d4d5c;color:var(--ink);
  border-radius:8px;padding:10px 16px;font-size:15px;cursor:pointer;transition:filter .12s, transform .05s, border-color .12s, box-shadow .12s;}
.btn:hover{filter:brightness(1.2);} .btn:active{transform:scale(.97);}
.btn.primary{background:linear-gradient(180deg,#3f88c5,#2f6ea5);border-color:#5aa0d8;font-weight:700;}
.btn.gold{background:linear-gradient(180deg,#c9962f,#a4781f);border-color:#e8b64a;font-weight:700;}
.btn.danger{background:linear-gradient(180deg,#b8503f,#96402f);border-color:#d97b62;}
.btn.small{padding:6px 10px;font-size:13px;border-radius:8px;min-height:36px;}
.btn.sel{outline:2px solid var(--gold);}
.btn:disabled{opacity:.4;cursor:default;}
/* ---------- overlay screens ---------- */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,rgba(6,10,13,.82),rgba(8,12,16,.9));backdrop-filter:blur(3px);z-index:20;overflow:auto;padding:16px;}
.panel{background:linear-gradient(180deg,rgba(22,30,39,.98),rgba(13,19,25,.98));border:1px solid #3b4855;border-radius:12px;
  padding:22px;max-width:680px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 22px 70px rgba(0,0,0,.58), inset 0 1px 0 rgba(255,255,255,.04);}
.panel h1{margin:0 0 4px;font-size:30px;letter-spacing:1px;}
.panel h2{margin:0 0 14px;font-size:21px;}
.panel h3{margin:16px 0 8px;font-size:14px;color:var(--ink2);text-transform:uppercase;letter-spacing:.08em;}
.sub{color:var(--ink2);font-size:13px;margin:2px 0 16px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cardlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.card{background:linear-gradient(180deg,#22303c,#151e27);border:1px solid #3b4855;border-radius:8px;padding:10px;cursor:pointer;}
.card:hover{filter:brightness(1.15);border-color:#596a7b;}
.card.sel{outline:2px solid var(--gold);}
.card b{display:block;font-size:14px;}
.card span{font-size:12px;color:var(--ink2);}
textarea.code{width:100%;height:84px;background:var(--navy);color:#bfe0a8;border:1px solid var(--line);
  border-radius:8px;font:12px monospace;padding:8px;resize:vertical;}
input[type=text]{background:var(--navy);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:9px 12px;font-size:15px;width:100%;}
input[type=color]{width:46px;height:34px;border:none;background:none;padding:0;cursor:pointer;}
.titleArt{font-size:44px;line-height:1;margin-bottom:6px;}
/* ---------- main menu ---------- */
.menu-screen{align-items:flex-start;justify-content:center;overflow:auto;padding:clamp(10px,2vw,28px);
  background:
    radial-gradient(circle at 50% 0%,rgba(49,64,76,.22),transparent 34%),
    linear-gradient(180deg,#03090b 0%,#071012 56%,#04080a 100%);}
.main-menu{width:min(94vw,1480px,105vh);min-height:0;display:grid;
  grid-template-rows:auto 1fr auto;gap:clamp(12px,1.3vw,20px);position:relative;}
.menu-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.menu-kicker{color:var(--gold);font-weight:900;font-size:clamp(17px,1.45vw,25px);letter-spacing:.01em;
  text-shadow:0 2px 10px rgba(0,0,0,.65);}
.menu-help{background:transparent;border:none;color:#cbd5dc;font-size:clamp(14px,1.2vw,22px);font-weight:700;
  cursor:pointer;padding:8px 4px;border-radius:8px;}
.menu-help:hover{color:#fff;text-shadow:0 0 14px rgba(229,168,55,.35);}
.menu-grid,.menu-bottom{display:grid;grid-template-columns:repeat(2,minmax(0,1fr)) minmax(230px,.82fr) repeat(2,minmax(0,1fr));
  gap:clamp(10px,1.35vw,22px);align-items:stretch;}
.menu-card{position:relative;display:block;width:100%;min-width:0;justify-self:stretch;border:6px solid #2f3943;border-radius:8px;overflow:hidden;padding:0;
  background:#0a0f12;color:var(--ink);cursor:pointer;box-shadow:0 20px 42px rgba(0,0,0,.5);
  transition:transform .14s ease,filter .14s ease,border-color .14s ease,box-shadow .14s ease;}
.menu-card:hover{transform:translateY(-3px);filter:brightness(1.12);border-color:#4c5b68;
  box-shadow:0 24px 54px rgba(0,0,0,.6),0 0 0 1px rgba(229,168,55,.2),0 0 26px rgba(229,168,55,.15);}
.menu-card:active{transform:translateY(0) scale(.992);}
.menu-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.menu-card::after{content:"";position:absolute;inset:0;background:
  linear-gradient(180deg,rgba(0,0,0,.05) 45%,rgba(2,6,8,.72) 100%),
  linear-gradient(90deg,rgba(0,0,0,.18),transparent 18%,transparent 82%,rgba(0,0,0,.18));
  pointer-events:none;}
.menu-card.tall{aspect-ratio:793/1983;min-height:0;}
.menu-card.wide{aspect-ratio:1633/600;}
.menu-card-label{position:absolute;left:10px;right:10px;bottom:clamp(12px,2.2vw,32px);z-index:1;
  font-size:clamp(25px,2vw,42px);font-weight:900;line-height:1.08;color:#edf3f7;text-align:center;
  overflow-wrap:anywhere;text-shadow:0 3px 14px rgba(0,0,0,.85);}
.menu-card.wide .menu-card-label{bottom:clamp(10px,1.8vw,24px);font-size:clamp(24px,2vw,40px);}
.menu-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,1.2vw,18px);
  min-width:0;text-align:center;color:var(--ink);}
.brand-mark{width:min(88%,212px);filter:drop-shadow(0 16px 28px rgba(0,0,0,.55));}
.commander-label{font-size:13px;color:#7e8d98;font-weight:800;}
.commander-name{font-size:clamp(18px,1.35vw,27px);font-weight:900;color:var(--accent);line-height:1;}
.fort-name{max-width:100%;font-size:clamp(24px,1.7vw,36px);font-weight:1000;color:#2ca5ff;line-height:1.08;
  overflow-wrap:break-word;text-shadow:0 0 20px rgba(55,163,241,.22);}
.crest-panel{width:min(92%,205px);min-height:246px;border:4px solid #303b46;border-radius:8px;background:#12181e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;cursor:pointer;color:var(--ink);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 18px 36px rgba(0,0,0,.35);}
.crest-panel:hover{border-color:#4c5b68;filter:brightness(1.08);}
.crest-title{font-size:13px;color:#83919c;font-weight:800;margin-top:8px;}
.crest-shield{width:96px;height:120px;background:linear-gradient(180deg,var(--c1),var(--c1) 70%,var(--c2) 70%);
  clip-path:polygon(0 0,100% 0,100% 74%,50% 100%,0 74%);display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:42px;text-shadow:0 2px 9px rgba(0,0,0,.45);box-shadow:0 10px 24px rgba(0,0,0,.3);}
.crest-stars{font-size:24px;color:#f0f1f2;letter-spacing:2px;margin-bottom:-10px;text-shadow:0 2px 8px rgba(0,0,0,.6);}
#menuCrestSlot canvas{display:block;width:124px;height:158px;}
.menu-credits{font-size:12px;color:#52616c;line-height:1.45;margin-top:auto;}
.menu-wide-left{grid-column:1/3;}
.menu-wide-right{grid-column:4/6;}
.menu-ad{grid-column:3/4;min-height:90px;overflow:hidden;border-radius:8px;text-align:center;}
/* ---------- HUD ---------- */
#hud{position:fixed;left:0;right:0;top:0;z-index:10;display:flex;gap:6px;align-items:center;
  padding:8px 10px;background:linear-gradient(180deg,rgba(13,18,24,.92),rgba(13,18,24,.55) 80%,transparent);
  pointer-events:none;flex-wrap:wrap;}
#hud>*{pointer-events:auto;}
.stat{background:rgba(20,28,38,.85);border:1px solid var(--line);border-radius:9px;
  padding:5px 11px;font-size:14px;font-weight:700;display:flex;gap:6px;align-items:center;}
.stat i{font-style:normal;font-size:13px;color:var(--ink2);font-weight:400;}
#palette{position:fixed;left:0;right:0;bottom:0;z-index:10;
  background:linear-gradient(0deg,rgba(13,18,24,.95),rgba(13,18,24,.7) 75%,transparent);
  padding:8px 10px max(10px,env(safe-area-inset-bottom));display:flex;gap:6px;overflow-x:auto;align-items:flex-end;}
.pbtn{flex:0 0 auto;width:76px;min-height:70px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:5px 4px 6px;cursor:pointer;text-align:center;color:var(--ink);}
.pbtn:hover{filter:brightness(1.2);}
.pbtn.sel{outline:2px solid var(--gold);background:#2c3c50;}
.pbtn.foe{background:#3b2528;border-color:#6a3a3a;}
.pbtn.foe:hover{filter:brightness(1.28);}
.pbtn.foe.sel{outline-color:#e0604f;background:#4a2b2b;}
#palette.tworow{flex-direction:column;align-items:stretch;gap:6px;}
.labrow{display:flex;gap:6px;overflow-x:auto;align-items:flex-end;}
.labrow.ctrl{align-items:center;padding-bottom:4px;border-bottom:1px solid rgba(51,70,92,.55);}
.rowchip{flex:0 0 auto;font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.06em;padding:0 4px;}
.pbtn canvas{display:block;margin:0 auto;}
.pbtn .n{font-size:11px;line-height:1.15;display:block;margin-top:2px;}
.pbtn .c{font-size:11px;color:var(--gold);font-weight:700;display:block;}
.pbtn .cnt{font-size:12px;color:#8fe0a0;font-weight:700;display:block;}
.pbtn:disabled{opacity:.35;}
#tip{position:fixed;z-index:30;background:rgba(12,17,23,.95);border:1px solid var(--line);border-radius:10px;
  padding:9px 12px;font-size:12.5px;max-width:250px;pointer-events:none;line-height:1.5;}
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:40;background:rgba(18,24,32,.95);
  border:1px solid var(--gold);color:var(--ink);border-radius:10px;padding:9px 18px;font-size:14px;
  font-weight:700;pointer-events:none;transition:opacity .4s;opacity:0;}
.stars{font-size:34px;letter-spacing:6px;color:var(--gold);}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:14px;margin:10px 0;}
.kv i{font-style:normal;color:var(--ink2);}
hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0;}
.help p{font-size:13.5px;line-height:1.65;color:var(--ink2);margin:6px 0;}
.help b{color:var(--ink);}
.custom-panel{max-width:1280px;}
.custom-layout{display:grid;grid-template-columns:minmax(330px,1.2fr) minmax(260px,.75fr) minmax(300px,.9fr);gap:14px;align-items:start;}
.custom-box{background:rgba(13,22,30,.72);border:1px solid #344454;border-radius:10px;padding:14px;}
.custom-box h3{margin-top:0;}
.custom-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.swatch-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.swatch-control label,.range-control label{display:block;color:var(--ink2);font-size:13px;font-weight:800;margin-bottom:7px;}
.swatch{display:grid;grid-template-columns:1fr 42px;align-items:center;border:1px solid #344454;border-radius:8px;overflow:hidden;background:#0c151d;}
.swatch input[type=color]{width:42px;height:38px;border-left:1px solid #344454;}
.swatch span{display:block;height:38px;}
.choice-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(78px,1fr));gap:8px;}
.choice{min-height:58px;background:linear-gradient(180deg,#1c2a36,#101922);border:1px solid #354656;border-radius:8px;color:var(--ink);cursor:pointer;font-weight:800;}
.choice.sel{outline:2px solid var(--gold);border-color:#d99b25;}
.choice small{display:block;color:var(--ink2);font-size:11px;font-weight:700;margin-top:3px;}
.symbol-grid{display:grid;grid-template-columns:repeat(8,minmax(36px,1fr));gap:7px;}
.symbol-grid .choice{min-height:42px;font-size:20px;}
.custom-preview{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;min-height:470px;background:
  radial-gradient(circle at 50% 28%,rgba(61,92,116,.28),transparent 48%),linear-gradient(180deg,#13212d,#091119);border-radius:10px;}
.custom-preview canvas{height:auto;filter:drop-shadow(0 24px 34px rgba(0,0,0,.48));}
.custom-preview .crest-preview-canvas{width:min(58%,300px);}
.custom-preview .unit-preview-canvas{width:min(34%,175px);}
.range-stack{display:grid;gap:14px;}
.range-control input[type=range]{width:100%;accent-color:#3f92dc;}
.toggle-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.toggle-row label{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#101a23;border:1px solid #344454;border-radius:8px;padding:9px 10px;font-size:13px;color:var(--ink2);font-weight:800;}
.preset-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.preset-list .choice{min-height:74px;text-align:left;padding:9px;}
.preset-chip{display:block;width:44px;height:32px;border-radius:4px;margin-bottom:6px;border:2px solid rgba(255,255,255,.25);}
@media (max-width:1080px){
  .menu-screen{align-items:flex-start;}
  .main-menu{width:100%;min-height:0;}
  .menu-grid,.menu-bottom{grid-template-columns:repeat(2,minmax(0,1fr));}
  .menu-center{grid-column:1/-1;order:-1;display:grid;grid-template-columns:auto 1fr auto;grid-template-areas:
    "mark commander crest"
    "mark fort crest"
    "credits credits credits";column-gap:16px;row-gap:8px;justify-items:center;text-align:left;}
  .brand-mark{grid-area:mark;width:126px;align-self:center;}
  .menu-center>div:nth-of-type(1){grid-area:commander;justify-self:start;align-self:end;}
  .fort-name{grid-area:fort;justify-self:start;}
  .crest-panel{grid-area:crest;width:118px;min-height:150px;gap:7px;align-self:center;}
  .crest-stars{font-size:16px;margin-bottom:-4px;}
  .crest-shield{width:66px;height:82px;font-size:28px;}
  .menu-credits{grid-area:credits;text-align:center;margin-top:0;}
  .menu-wide-left,.menu-wide-right,.menu-ad{grid-column:auto;}
  .menu-ad{display:none;}
  .custom-layout{grid-template-columns:1fr;}
  .custom-preview{min-height:360px;}
}
@media (max-height:950px) and (min-width:1081px){
  .menu-screen{padding-top:20px;padding-bottom:20px;}
  .main-menu{width:min(96vw,1760px,104vh);}
  .menu-card-label{font-size:clamp(24px,1.85vw,38px);}
  .brand-mark{width:min(84%,188px);}
  .crest-panel{min-height:218px;}
  #menuCrestSlot canvas{width:108px;height:138px;}
  .menu-credits{font-size:11px;}
}
@media (max-height:1280px) and (min-width:1081px){
  .menu-screen{padding:14px 18px;}
  .main-menu{width:clamp(720px,calc((100vh - 140px) * 1.05),1320px);gap:10px;}
  .menu-topbar{min-height:36px;}
  .menu-grid,.menu-bottom{grid-template-columns:repeat(2,minmax(0,1fr)) minmax(170px,.72fr) repeat(2,minmax(0,1fr));gap:10px;}
  .menu-center{display:flex;flex-direction:column;grid-column:auto;order:0;gap:8px;padding:0;text-align:center;}
  .brand-mark{width:min(84%,150px);}
  .commander-name{font-size:clamp(16px,1.05vw,22px);}
  .fort-name{font-size:clamp(20px,1.35vw,27px);}
  .crest-panel{width:min(88%,140px);min-height:170px;gap:8px;border-width:3px;}
  .crest-title{display:block;font-size:12px;margin-top:4px;}
  #menuCrestSlot canvas{width:84px;height:107px;}
  .menu-credits{display:block;font-size:10px;line-height:1.35;}
  .menu-wide-left{grid-column:1/3;}
  .menu-wide-right{grid-column:4/6;}
  .menu-ad{display:none;}
  .menu-card{border-width:5px;}
  .menu-card-label{font-size:clamp(20px,1.55vw,30px);bottom:14px;}
  .menu-card.wide .menu-card-label{font-size:clamp(20px,1.55vw,30px);bottom:10px;}
}
@media (max-height:620px) and (min-width:1081px){
  .menu-screen{padding:10px 14px;}
  .main-menu{width:clamp(700px,calc((100vh - 96px) * 1.12),860px);}
  .main-menu{gap:8px;}
  .menu-kicker{font-size:18px;}
  .menu-help{font-size:16px;}
  .menu-grid{gap:8px;}
  .menu-bottom{gap:8px;}
  .brand-mark{width:min(80%,118px);}
  .commander-label{display:none;}
  .commander-name{font-size:16px;}
  .fort-name{font-size:19px;}
  .crest-panel{width:min(86%,112px);min-height:128px;gap:5px;}
  .crest-title,.menu-credits{display:none;}
  #menuCrestSlot canvas{width:64px;height:82px;}
  .menu-card-label{font-size:clamp(20px,2vw,28px);bottom:12px;}
  .menu-card.wide .menu-card-label{font-size:clamp(20px,2vw,28px);bottom:10px;}
}
@media (max-width:640px){
  .panel h1{font-size:24px;} .grid2{grid-template-columns:1fr;}
  .screen{padding:10px;}
  .menu-topbar{align-items:flex-start;}
  .menu-kicker{font-size:16px;line-height:1.35;}
  .menu-help{font-size:14px;white-space:nowrap;}
  .menu-grid,.menu-bottom{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
  .menu-center{display:flex;text-align:center;gap:10px;padding:2px 0 4px;}
  .menu-center>div:nth-of-type(1),.fort-name{align-self:center;justify-self:auto;}
  .brand-mark{width:130px;}
  .fort-name{font-size:27px;}
  .crest-panel{width:148px;min-height:178px;}
  .menu-card{border-width:5px;}
  .menu-card.tall{aspect-ratio:16/21;}
  .menu-card.wide{aspect-ratio:16/6.6;}
  .menu-card-label,.menu-card.wide .menu-card-label{font-size:28px;bottom:18px;}
  .menu-credits{display:none;}
  .custom-fields,.swatch-row,.toggle-row,.preset-list{grid-template-columns:1fr;}
  .symbol-grid{grid-template-columns:repeat(4,1fr);}
}
@media (max-width:360px){
  .menu-grid,.menu-bottom{grid-template-columns:1fr;}
  .menu-card.tall{aspect-ratio:16/18;}
}
</style>
</head>
<body>
<canvas id="world"></canvas>
<div id="dev"></div>
<div id="hud" class="hidden"></div>
<div id="palette" class="hidden"></div>
<div id="tip" class="hidden"></div>
<div id="toast"></div>
<div id="ui"></div>
<script>
'use strict';
/* ===================== SITE CONFIG =====================
   Google AdSense: 승인된 도메인에서 호스팅할 때만 동작합니다.
   본인 계정의 값으로 채우면 메인 메뉴 하단에 반응형 배너가 표시됩니다. */
let DEV_UNLOCK_ALL=true; // 개발 중 전체 모듈 해금 — 출시 시 false로!
const ADSENSE_CLIENT=''; // 예: 'ca-pub-1234567890123456'
const ADSENSE_SLOT='';   // 예: '9876543210'
/* ===================== STRINGS (single source of player-visible text) ===================== */
const STR = {
  title:'KUMA FORTRESS', subtitle:'쿠마의 요새 전쟁 — 짓고, 지키고, 무너뜨려라',

/* ===================== MAP GENERATORS ===================== */
function genMap(preset, seed){
  const r = mulberry32(seed);
  const g = new Uint8Array(MAPW*MAPW).fill(T.GRASS);
  const at=(x,y)=>g[y*MAPW+x], set=(x,y,v)=>{ if(x>=0&&y>=0&&x<MAPW&&y<MAPW) g[y*MAPW+x]=v; };
  for(let i=0;i<40;i++){ const x=(r()*MAPW)|0, y=(r()*MAPW)|0; set(x,y,T.DIRT); if(r()<.5)set(x+1,y,T.DIRT); }
  const blob=(cx,cy,rad,type,den)=>{ for(let y=cy-rad;y<=cy+rad;y++)for(let x=cx-rad;x<=cx+rad;x++){
      const d=Math.hypot(x-cx,y-cy); if(d<=rad&&r()<(den??.8)*(1-d/rad*.5)) set(x,y,type); } };
  if(preset===0){
    for(let i=0;i<6;i++) blob((r()*MAPW)|0,(r()*MAPW)|0, 2+(r()*2|0), T.FOREST,.7);
    for(let i=0;i<3;i++) blob((r()*MAPW)|0,(r()*MAPW)|0, 2, T.HILL,.9);
  } else if(preset===1){
    const rx = 13+(r()*8|0);
    for(let y=0;y<MAPW;y++){ const w=2+((Math.sin(y*.4+seed)+1)*1.2|0);
      for(let dx=0;dx<w;dx++) set(rx+dx+((Math.sin(y*.25)*2)|0), y, T.WATER); }
    const b1=5+(r()*6|0), b2=22+(r()*7|0);
    for(const by of [b1,b2]) for(let x=rx-2;x<rx+7;x++){ if(at(Math.max(0,Math.min(MAPW-1,x)),by)===T.WATER){ set(x,by,T.BRIDGE); set(x,by+1,T.BRIDGE);} }
    for(let i=0;i<5;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.FOREST,.7);
  } else if(preset===2){
    blob(MAPW>>1,MAPW>>1,6,T.HILL,.95);
    for(let i=0;i<5;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2+(r()*2|0),T.HILL,.85);
    for(let i=0;i<4;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.ROCK,.75);
    for(let i=0;i<4;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.FOREST,.7);
  } else if(preset===3){
    for(let i=0;i<26;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2+(r()*2|0),T.FOREST,.8);
    for(let y=10;y<24;y++)for(let x=10;x<24;x++) if(Math.hypot(x-17,y-17)<7&&at(x,y)===T.FOREST) set(x,y,T.GRASS);
    for(let i=0;i<3;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.HILL,.8);
  } else if(preset===4){
    for(let y=0;y<MAPW;y++)for(let x=0;x<MAPW;x++){
      const d=Math.min(x,y,MAPW-1-x,MAPW-1-y);
      if(d<3) set(x,y,T.WATER); else if(d===3||d===4) { if(r()<.8) set(x,y,T.SAND); }
    }
    const mid=MAPW>>1;
    for(let d=0;d<5;d++){ set(mid,d,T.SAND); set(mid+1,d,T.SAND); set(mid,MAPW-1-d,T.SAND); set(mid+1,MAPW-1-d,T.SAND);
      set(d,mid,T.SAND); set(d,mid+1,T.SAND); set(MAPW-1-d,mid,T.SAND); set(MAPW-1-d,mid+1,T.SAND); }
    for(let i=0;i<4;i++) blob(8+(r()*18|0),8+(r()*18|0),2,T.FOREST,.7);
    blob(mid,mid,3,T.HILL,.8);
  } else if(preset===5){
    for(let i=0;i<MAPW;i++){
      const y1=8+((Math.sin(i*.3+seed%7)*3)|0), y2=24+((Math.cos(i*.27+seed%5)*3)|0);
      if(i%9>1){ set(i,y1,T.ROCK); set(i,y1+1,T.ROCK); set(i,y2,T.ROCK); set(i,y2+1,T.ROCK);}
      if(i%11>2){ set(y1+2,i,T.ROCK); }
    }
    for(let i=0;i<6;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.HILL,.7);
    for(let i=0;i<3;i++) blob((r()*MAPW)|0,(r()*MAPW)|0,2,T.DIRT,.9);
  }
  for(let y=12;y<22;y++)for(let x=12;x<22;x++){ const t=at(x,y);
    if(t===T.WATER||t===T.ROCK||t===T.FOREST) set(x,y,T.DIRT); }
  return g;
}

    const rad=r*(0.72+0.28*Math.abs(Math.cos(th*2)));
    const x=Math.round(cx+Math.cos(th)*rad), y=Math.round(cy+Math.sin(th)*rad*0.95);
    const k=x+','+y; if(!seen[k]){seen[k]=1;a.push([x,y]);} } return a; }

const AudioSys = {
  ctx:null, on:(store('mute')!==true),
  ensure(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
  toggle(){ this.on=!this.on; store('mute',!this.on); },
  play(type){ if(!this.on) return; this.ensure(); const c=this.ctx; if(!c) return;
    const t=c.currentTime, g=c.createGain(); g.connect(c.destination);
    const o=c.createOscillator(); o.connect(g);
    const P={ shoot:[880,220,.06,'square',.05], hit:[220,90,.08,'sawtooth',.06],
      boom:[130,40,.3,'sawtooth',.16], build:[520,760,.09,'triangle',.09],
      sell:[440,200,.12,'triangle',.07], deploy:[300,540,.1,'square',.07],
      win:[523,1046,.5,'triangle',.14], lose:[330,110,.7,'sawtooth',.12],
      zap:[1400,300,.09,'sawtooth',.07], click:[700,700,.03,'square',.04] }[type]||[440,440,.05,'sine',.05];
    o.type=P[3]; o.frequency.setValueAtTime(P[0],t); o.frequency.exponentialRampToValueAtTime(Math.max(30,P[1]),t+P[2]);
    g.gain.setValueAtTime(P[4],t); g.gain.exponentialRampToValueAtTime(.0001,t+P[2]);
    o.start(t); o.stop(t+P[2]+.02);
    if(type==='boom'){ // noise layer
      const len=c.sampleRate*.25, buf=c.createBuffer(1,len,c.sampleRate), d=buf.getChannelData(0);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
      const n=c.createBufferSource(); n.buffer=buf; const ng=c.createGain(); ng.gain.value=.12;
      n.connect(ng); ng.connect(c.destination); n.start(t); }
  }
};

    if(heap.length){ heap[0]=lastEl; let c=0; for(;;){ let l=c*2+1,r=l+1,m=c;
      if(l<heap.length&&heap[l][0]<heap[m][0])m=l; if(r<heap.length&&heap[r][0]<heap[m][0])m=r;
      if(m===c)break; [heap[m],heap[c]]=[heap[c],heap[m]]; c=m; } } return top; };

    if(b&&b.kind==='bridgeB') return 1; // bridges are always walkable
    const t=G.terrain[i]; let c=WALK_COST[t]; if(c===0) return 0;

        else if(b.kind==='moat') c+=2.6;

}

    const ph=Math.sin(time*1.6+h*0.7);
    const ox=ph*6*cam.zoom;
    ctx.moveTo(sx-10*cam.zoom+ox,sy+((h%3)-1)*4*cam.zoom);
    ctx.lineTo(sx+6*cam.zoom+ox,sy+((h%3)-1)*4*cam.zoom);
  }

}
function renderClouds(time){
  ctx.fillStyle='rgba(10,16,26,.07)';
  for(let i=0;i<3;i++){
    const span=MAPW*TW*1.6;
    const wxp=((time*10+i*760)%span)-span/2, wyp=(i*340)%(MAPW*TH);
    const sx=(wxp-cam.x)*cam.zoom+VW/2, sy=(wyp-cam.y)*cam.zoom+VH/2;
    ctx.beginPath(); ctx.ellipse(sx,sy,280*cam.zoom,120*cam.zoom,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx+140*cam.zoom,sy+40*cam.zoom,180*cam.zoom,80*cam.zoom,0,0,7); ctx.fill();
  }
}
function battleIntensity(){
  if(!Battle.active)return 0;
  const alive=Battle.attackers.length+Battle.defenders.length;
  const destruction=Battle.destrDone/Math.max(1,Battle.destrTotal);
  return clamp(alive/95 + Battle.parts.length/900 + destruction*.75,0,1);
}
function renderAtmosphere(time){
  const k=battleIntensity();
  ctx.save();
  const grad=ctx.createLinearGradient(0,0,0,VH);
  grad.addColorStop(0,'rgba(12,22,32,'+(0.10+k*.08)+')');
  grad.addColorStop(.55,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(20,13,10,'+(0.08+k*.10)+')');
  ctx.fillStyle=grad; ctx.fillRect(0,0,VW,VH);
  const vg=ctx.createRadialGradient(VW*.5,VH*.48,Math.min(VW,VH)*.24,VW*.5,VH*.52,Math.max(VW,VH)*.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(4,7,10,'+(0.18+k*.14)+')');
  ctx.fillStyle=vg; ctx.fillRect(0,0,VW,VH);
  if(k>0.05){
    ctx.globalCompositeOperation='lighter';
    for(let i=0;i<26;i++){
      const h=thash(i*17,(time*10|0)+i*5);
      const x=((h%1000)/1000*VW + time*(18+i%5*7))%VW;
      const y=(((h>>10)%1000)/1000*VH + Math.sin(time*.9+i)*18)%VH;
      const a=(0.05+k*.13)*(0.35+(h%7)/10);
      ctx.fillStyle='rgba(245,185,95,'+a+')';
      ctx.beginPath(); ctx.ellipse(x,y,1.2+(h%3),0.7+(h%2)*.5,0,0,7); ctx.fill();
    }
  }
  ctx.restore();
}
function tileRaise(G,x,y){ x|=0;y|=0; if(x<0||y<0||x>=MAPW||y>=MAPW)return 0;
  return G.terrain[y*MAPW+x]===T.HILL?8:0; }

/* ---------- battlefield decals (persistent environment damage) ---------- */
let decalCache=null;
function initDecals(){

}
function blitDecals(){ if(!decalCache)return;
  const sx=(-OX-cam.x)*cam.zoom+VW/2, sy=(-OY-cam.y)*cam.zoom+VH/2;
  ctx.drawImage(decalCache,sx,sy,decalCache.width*cam.zoom,decalCache.height*cam.zoom); }
function stampDecal(type,wx,wy,s,col){
  if(!decalCache)return;
  const g=decalCache.getContext('2d');
  const [pxr,pyr]=wpx(wx,wy); const px=pxr+OX, py=pyr+OY;
  if(type==='scorch'){
    const r=s*TW*.5;
    const gr=g.createRadialGradient(px,py,r*.15,px,py,r);
    gr.addColorStop(0,'rgba(22,18,14,.5)'); gr.addColorStop(1,'rgba(22,18,14,0)');
    g.save(); g.translate(px,py); g.scale(1,.5);
    g.fillStyle=gr===null?'rgba(22,18,14,.4)':gr;
    // gradient coords are pre-scale; redo simply:
    g.restore();

    const gr2=g.createRadialGradient(0,0,r*.15,0,0,r);
    gr2.addColorStop(0,'rgba(24,19,14,.55)'); gr2.addColorStop(1,'rgba(24,19,14,0)');
    g.fillStyle=gr2; g.beginPath(); g.arc(0,0,r,0,7); g.fill(); g.restore();
  } else if(type==='crater'){
    const r=s*TW*.22;
    g.save(); g.translate(px,py); g.scale(1,.5);
    g.fillStyle='rgba(30,24,18,.7)'; g.beginPath(); g.arc(0,0,r,0,7); g.fill();
    g.fillStyle='rgba(15,12,9,.7)'; g.beginPath(); g.arc(0,1.5,r*.55,0,7); g.fill();
    g.strokeStyle='rgba(120,100,70,.5)'; g.lineWidth=2;
    g.beginPath(); g.arc(0,-1,r*1.05,Math.PI*1.05,Math.PI*1.95); g.stroke();
    g.restore();
  } else if(type==='rubble'){
    g.save(); g.translate(px,py);
    g.fillStyle='rgba(28,32,38,.45)'; g.beginPath(); g.ellipse(0,0,20,10,0,0,7); g.fill();
    for(let i=0;i<6;i++){ const a=i/6*Math.PI*2, rr=4+((i*37)%9);
      const bx=Math.cos(a)*rr*1.6, by=Math.sin(a)*rr*.8;
      g.fillStyle=i%2?(col||'#7a7f88'):'#5a5f66';
      g.beginPath(); g.moveTo(bx-3,by+2); g.lineTo(bx,by-3.4); g.lineTo(bx+3.4,by+1); g.lineTo(bx+1,by+3); g.closePath(); g.fill();
      g.strokeStyle='rgba(20,28,38,.6)'; g.lineWidth=.7; g.stroke(); }
    g.restore();
  } else if(type==='corpse'){
    // 쓰러진 곰 병사 — 형태가 남는다
    g.save(); g.translate(px,py);
    const a=(wx*13+wy*7)%6.28;
    g.rotate(a*.25-.12); g.globalAlpha=.88;
    g.fillStyle='rgba(60,20,16,.3)'; g.beginPath(); g.ellipse(1,2.2,8.5,3,0,0,7); g.fill();
    g.strokeStyle='rgba(25,20,15,.85)'; g.lineWidth=.9;
    g.fillStyle=col||'#5a6a7a'; g.beginPath(); // 몸통(팀색 튜닉)
    if(g.roundRect) g.roundRect(-1,-2.7,8,5.4,2.5); else g.rect(-1,-2.7,8,5.4);
    g.fill(); g.stroke();
    g.fillStyle='#3D291B'; g.beginPath(); g.ellipse(7.6,0,1.6,2,0,0,7); g.fill(); // 부츠
    g.fillStyle='#976231';
    g.beginPath(); g.arc(-6.6,-2.8,1.5,0,7); g.fill(); g.stroke(); // 귀
    g.beginPath(); g.arc(-6.6,2.8,1.5,0,7); g.fill(); g.stroke();
    g.beginPath(); g.arc(-4.4,0,3.6,0,7); g.fill(); g.stroke();   // 머리
    g.fillStyle='#EED6B1'; g.beginPath(); g.ellipse(-5.9,0,1.7,1.3,0,0,7); g.fill(); // 주둥이
    g.fillStyle='rgba(25,20,15,.85)';
    g.beginPath(); g.arc(-3.4,-1,.4,0,7); g.arc(-3.4,1,.4,0,7); g.fill(); // 감은 눈(x)
    g.restore();
  } else if(type==='burnt'){
    // burned forest tile: cover with charred ground + standing charred trunks
    g.save(); g.translate(px,py);
    g.fillStyle='#6a5a44'; g.beginPath();
    g.moveTo(0,-TH/2); g.lineTo(TW/2,0); g.lineTo(0,TH/2); g.lineTo(-TW/2,0); g.closePath(); g.fill();
    g.fillStyle='rgba(25,20,15,.5)'; g.beginPath();
    g.moveTo(0,-TH/2+3); g.lineTo(TW/2-6,0); g.lineTo(0,TH/2-3); g.lineTo(-TW/2+6,0); g.closePath(); g.fill();
    // cover old tree tops (they extend upward in the terrain cache)
    g.fillStyle='rgba(0,0,0,0)';
    for(const [tx0,ty0] of [[-5,-2],[4,1],[0,-5]]){
      g.strokeStyle='#241d15'; g.lineWidth=2.4;
      g.beginPath(); g.moveTo(tx0,ty0+4); g.lineTo(tx0,ty0-9); g.stroke();
      g.strokeStyle='#382c1e'; g.lineWidth=1.2;
      g.beginPath(); g.moveTo(tx0,ty0-4); g.lineTo(tx0+3.4,ty0-7); g.stroke(); }
    g.restore();
  } else if(type==='scar'){ // small bullet/impact chips
    g.fillStyle=col||'rgba(30,34,40,.4)';
    g.beginPath(); g.ellipse(px,py,3.5,1.8,0,0,7); g.fill();
  }
}

function prism(g,w,d,h,top,left,right){
  g.fillStyle=left; g.beginPath();
  g.moveTo(-w,0); g.lineTo(0,d); g.lineTo(0,d-h); g.lineTo(-w,-h); g.closePath(); g.fill();
  g.fillStyle=right; g.beginPath();
  g.moveTo(w,0); g.lineTo(0,d); g.lineTo(0,d-h); g.lineTo(w,-h); g.closePath(); g.fill();
  g.fillStyle=top; g.beginPath();
  g.moveTo(0,-d-h); g.lineTo(w,-h); g.lineTo(0,d-h); g.lineTo(-w,-h); g.closePath(); g.fill();
  g.strokeStyle=PAL.outline; g.lineWidth=1; g.beginPath();
  g.moveTo(0,-d-h); g.lineTo(w,-h); g.lineTo(w,0); g.lineTo(0,d); g.lineTo(-w,0); g.lineTo(-w,-h); g.closePath();
  g.stroke();
}
function prismAt(g,ox,oy,w,d,h,top,left,right){
  g.save(); g.translate(ox,oy); prism(g,w,d,h,top,left,right); g.restore(); }
function brickLines(g,w,h,col){ g.strokeStyle=col; g.lineWidth=.8;
  for(let i=1;i<3;i++){ const yy=-h*i/3;
    g.beginPath(); g.moveTo(-w+1,yy); g.lineTo(0,yy+w*0.5-1); g.lineTo(w-1,yy); g.stroke(); } }
function flag(g,x,y,h,c1,c2,em,time){
  g.strokeStyle='#3a3f47'; g.lineWidth=1.6;
  g.beginPath(); g.moveTo(x,y); g.lineTo(x,y-h); g.stroke();
  const wav=Math.sin(time*3+x)*2;
  g.fillStyle=c1; g.beginPath();
  g.moveTo(x,y-h); g.lineTo(x+14,y-h+3+wav); g.lineTo(x,y-h+8); g.closePath(); g.fill();
  g.strokeStyle=PAL.outline; g.lineWidth=.7; g.stroke();
  if(em){ g.fillStyle=c2; g.font='6px sans-serif'; g.textAlign='center'; g.fillText(em,x+6,y-h+6); }

function bearHead(g,x,y,r,col,dark){
  // KUMA signature bear
  g.fillStyle=col;
  g.beginPath(); g.arc(x-r*.62,y-r*.62,r*.42,0,7); g.fill();
  g.beginPath(); g.arc(x+r*.62,y-r*.62,r*.42,0,7); g.fill();
  g.beginPath(); g.arc(x,y,r,0,7); g.fill();
  g.strokeStyle=dark||PAL.outline; g.lineWidth=Math.max(1,r*.09);
  g.beginPath(); g.arc(x,y,r,0,7); g.stroke();
  g.beginPath(); g.arc(x-r*.62,y-r*.62,r*.42,0,7); g.stroke();
  g.beginPath(); g.arc(x+r*.62,y-r*.62,r*.42,0,7); g.stroke();
  g.fillStyle=dark||PAL.outline;
  g.beginPath(); g.arc(x-r*.34,y-r*.14,r*.11,0,7); g.fill();
  g.beginPath(); g.arc(x+r*.34,y-r*.14,r*.11,0,7); g.fill();
  g.fillStyle=shade(col,1.3);
  g.beginPath(); g.ellipse(x,y+r*.34,r*.42,r*.32,0,0,7); g.fill();

}
function drawEmblem(g,em,x,y,size,color){
  if(em==='🐻'||em==='bear'){ bearHead(g,x,y-size*.1,size*.5,color,shade(color,.45)); return; }
  g.save();
  g.font='900 '+size+'px sans-serif'; g.textAlign='center';
  g.lineWidth=Math.max(1,size*.14); g.strokeStyle='rgba(15,20,26,.55)';

}
/* in-game crest: renders the player's full custom banner design, cached & supersampled */
let _crest={key:'',cv:null};
function crestSprite(cust){
  const c=Object.assign({shape:'banner',pattern:'chevron',patternOn:1,border:'square',
    scale:85,rot:0,stars:1,decor:1,bg:'dark',c1:'#4fa3e0',c2:'#f0d060',c3:'#f0d060',em:'🐻'},cust||{});
  if(!c.c3) c.c3=c.c2;
  const key=[c.shape,c.pattern,c.patternOn,c.c1,c.c2,c.c3,c.em,c.stars,c.decor].join('|');
  if(_crest.key!==key){
    const cv=document.createElement('canvas'); cv.width=104; cv.height=132;
    const g=cv.getContext('2d');
    const cc=Object.assign({},c,{rot:0});
    drawCustomBanner(g,cc,10,6,84,116,true);
    // finishing pass: silk sheen + crisp rim so the crest reads at map scale
    g.save(); customShapePath(g,cc.shape,10,6,84,116); g.clip();
    const gr=g.createLinearGradient(0,6,0,122);
    gr.addColorStop(0,'rgba(255,255,255,.22)'); gr.addColorStop(.3,'rgba(255,255,255,.05)');
    gr.addColorStop(1,'rgba(0,0,0,.26)');
    g.fillStyle=gr; g.fillRect(0,0,104,132); g.restore();
    g.strokeStyle='rgba(12,17,23,.7)'; g.lineWidth=2.4;

}
function drawCrestFlag(g,fc,x,y,h,time){ // 유저 문장이 새겨진 군기 — 어느 건축물 위든
  g.strokeStyle='#3a3f47'; g.lineWidth=1.8;
  g.beginPath(); g.moveTo(x,y); g.lineTo(x,y-h); g.stroke();
  g.save(); g.translate(x,y-h); g.rotate(Math.sin((time||0)*2.4+x)*.06);
  g.drawImage(crestSprite(fc),.8,0,10,12.5);
  g.restore();
  g.fillStyle='#E9B329'; g.beginPath(); g.arc(x,y-h,1.4,0,7); g.fill();
  g.strokeStyle='#2C241D'; g.lineWidth=.8; g.stroke();
}
function customShapePath(g,shape,x,y,w,h){
  g.beginPath();
  if(shape==='shield'){
    g.moveTo(x,y); g.lineTo(x+w,y); g.lineTo(x+w,y+h*.62); g.quadraticCurveTo(x+w*.5,y+h,x,y+h*.62); g.closePath();
  } else if(shape==='pennant'){
    g.moveTo(x,y); g.lineTo(x+w,y); g.lineTo(x+w,y+h*.75); g.lineTo(x+w*.5,y+h*.58); g.lineTo(x,y+h*.75); g.closePath();
  } else if(shape==='tower'){
    const c=w/5; g.moveTo(x,y+c*.35); g.lineTo(x+c,y+c*.35); g.lineTo(x+c,y); g.lineTo(x+c*2,y);
    g.lineTo(x+c*2,y+c*.35); g.lineTo(x+c*3,y+c*.35); g.lineTo(x+c*3,y); g.lineTo(x+c*4,y);
    g.lineTo(x+c*4,y+c*.35); g.lineTo(x+w,y+c*.35); g.lineTo(x+w,y+h*.78); g.lineTo(x+w*.5,y+h); g.lineTo(x,y+h*.78); g.closePath();
  } else if(shape==='round'){
    g.ellipse(x+w*.5,y+h*.48,w*.48,h*.44,0,0,7); g.closePath();
  } else {
    g.moveTo(x,y); g.lineTo(x+w,y); g.lineTo(x+w,y+h*.74); g.lineTo(x+w*.5,y+h); g.lineTo(x,y+h*.74); g.closePath();
  }
}
function drawCustomBanner(g,c,x,y,w,h,mini){
  const oldAlign=g.textAlign;
  g.save();
  g.translate(x+w/2,y+h/2); g.rotate((c.rot||0)*Math.PI/180); g.translate(-w/2,-h/2);
  g.shadowColor='rgba(0,0,0,.35)'; g.shadowBlur=mini?8:18; g.shadowOffsetY=mini?4:9;
  customShapePath(g,c.shape,0,0,w,h); g.fillStyle=c.c1; g.fill(); g.shadowColor='transparent';
  g.save(); customShapePath(g,c.shape,0,0,w,h); g.clip();
  if(c.patternOn&&c.pattern!=='none'){
    if(c.pattern==='split'){ g.fillStyle=c.c2; g.fillRect(0,0,w*.38,h); }
    else if(c.pattern==='border'){ g.strokeStyle=c.c2; g.lineWidth=w*.12; customShapePath(g,c.shape,w*.08,h*.06,w*.84,h*.84); g.stroke(); }
    else if(c.pattern==='chevron'){ g.fillStyle=c.c2; g.beginPath(); g.moveTo(0,h*.68); g.lineTo(w*.5,h*.48); g.lineTo(w,h*.68); g.lineTo(w,h*.82); g.lineTo(w*.5,h*.62); g.lineTo(0,h*.82); g.closePath(); g.fill(); }
    else if(c.pattern==='stripe'){ g.fillStyle=c.c2; for(let i=-2;i<6;i++){ g.save(); g.translate(i*w*.26,0); g.rotate(-.45); g.fillRect(0,-h*.2,w*.11,h*1.5); g.restore(); } }
    else if(c.pattern==='medal'){ g.strokeStyle=c.c2; g.lineWidth=w*.06; g.beginPath(); g.arc(w*.5,h*.52,w*.28,0,7); g.stroke(); }
    else if(c.pattern==='stars'){ g.fillStyle=c.c2; g.font=(w*.19)+'px sans-serif'; g.textAlign='center'; g.fillText('★★★',w*.5,h*.24); }
  }
  if(c.decor){
    g.strokeStyle=shade(c.c2,.75); g.lineWidth=w*.035; g.beginPath(); g.moveTo(w*.1,h*.08); g.lineTo(w*.9,h*.08); g.stroke();
    g.fillStyle=shade(c.c2,.85); g.beginPath(); g.arc(w*.1,h*.08,w*.028,0,7); g.arc(w*.9,h*.08,w*.028,0,7); g.fill();
  }
  if(c.stars){
    g.fillStyle=c.c3; g.font=(w*.16)+'px sans-serif'; g.textAlign='center'; g.fillText('★★★',w*.5,h*.25);
  }
  g.save();
  g.translate(w*.5,h*.5); g.scale((c.scale||85)/85,(c.scale||85)/85);
  drawEmblem(g,c.em,0,0,w*.34,c.c3);
  g.restore();
  g.restore();
  g.strokeStyle=c.c2; g.lineWidth=c.border==='round'?w*.04:w*.055;
  if(c.border==='round') g.lineJoin='round';
  customShapePath(g,c.shape,0,0,w,h); g.stroke();
  g.restore();
  g.textAlign=oldAlign;
}

/* ---------- buildings ---------- */
function wateryNeighbors(G,x,y){
  const chk=(nx,ny)=>{ if(nx<0||ny<0||nx>=MAPW||ny>=MAPW)return 0;
    const b=G.bgrid[ny*MAPW+nx];
    if(b&&(b.kind==='moat'||b.kind==='bridgeB'))return 1;
    return G.terrain[ny*MAPW+nx]===T.WATER?1:0; };
  return {px:chk(x+1,y), nx:chk(x-1,y), py:chk(x,y+1), ny:chk(x,y-1)};
}
function wallishNeighbors(G,x,y){
  const chk=(nx,ny)=>{ if(nx<0||ny<0||nx>=MAPW||ny>=MAPW)return 0;

          ctx.fillStyle=cs2; ctx.beginPath(); // 전면
          ctx.moveTo(0,-10.6); ctx.lineTo(ex,ey-10.6); ctx.lineTo(ex,ey-13.8); ctx.lineTo(0,-13.8);
          ctx.closePath(); ctx.fill();
          ctx.strokeStyle=PAL.outline; ctx.lineWidth=1; ctx.stroke();
          ctx.fillStyle=ct2; ctx.beginPath(); // 윗면 띠
          ctx.moveTo(0,-13.8); ctx.lineTo(ex,ey-13.8); ctx.lineTo(ex-1.8,ey-15); ctx.lineTo(-1.8,-15);
          ctx.closePath(); ctx.fill();
          ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
        } else if(m.kind==='cren'){
          prismAt(ctx,ox,oy,14,7,8,ct2,cl2,cs2);
        } else { // cube family: curtain segment
          prismAt(ctx,ox,oy,12,6,11,ct2,cl2,cs2);
        } };
      let seg;
      const isPil=m.kind==='pillar'||m.kind==='pillarArch';
      if(isPil){ // 수직 연속 샤프트
        const pk=k2=>{const mm=BLOCK.mats[layers[k2]]; return mm&&(mm.kind==='pillar'||mm.kind==='pillarArch');};
        const up=L<layers.length-1&&pk(L+1), dn=L>0&&pk(L-1);
        seg=up&&dn?'m':up?'b':dn?'t':'s';
      } else if(m.kind==='cren'){ // 연결 마스크 → 통로 스프라이트
        seg='c'+(sameAt(-1,0,L)?1:0)+(sameAt(1,0,L)?1:0)+(sameAt(0,-1,L)?1:0)+(sameAt(0,1,L)?1:0);
      }
      if(!isPil){
        if(sameAt(-1,0,L)) conn(-TW/4,-TH/4);
        if(sameAt(0,-1,L)) conn( TW/4,-TH/4);
      } else { // 아치/린텔: 내 최상단이거나, 이웃 기둥이 이 층에서 끝나면(높이차) 연결
        const myTop=seg==='t'||seg==='s';
        const nbPilTopAt=(dx,dy)=>{
          const nx2=b.x+dx, ny2=b.y+dy;
          if(nx2<0||ny2<0||nx2>=MAPW||ny2>=MAPW)return false;
          const o=G.bgrid[ny2*MAPW+nx2];
          if(!o||o.kind!=='block'||!o.layers)return false;
          const mm=BLOCK.mats[o.layers[L]], mu=BLOCK.mats[o.layers[L+1]];
          return !!(mm&&(mm.kind==='pillar'||mm.kind==='pillarArch'))
               &&!(mu&&(mu.kind==='pillar'||mu.kind==='pillarArch'));
        };
        if(sameAt(-1,0,L)&&(myTop||nbPilTopAt(-1,0))) conn(-TW/4,-TH/4);
        if(sameAt(0,-1,L)&&(myTop||nbPilTopAt(0,-1))) conn( TW/4,-TH/4);
      }
      blitSprite(blockSprite(mi, L===0, seg));
      ctx.restore();
    }
    if(b.flagTop){
      const topM=BLOCK.mats[layers[layers.length-1]]||BLOCK.mats[0];
      const yb=topM.kind==='roof'?-13*(layers.length-1)-21
             :topM.kind==='cren'?-13*(layers.length-1)-15
             :-13*layers.length-1;
      drawCrestFlag(ctx,fortCust,0,yb,14,time);
    }
  } else if(b.kind==='moat'){
    const nb=wateryNeighbors(G,b.x,b.y);
    // FULL-TILE water: adjacent moat tiles merge seamlessly into rivers & lakes
    ctx.fillStyle=PAL.water;
    ctx.beginPath(); ctx.moveTo(0,-TH/2); ctx.lineTo(TW/2,0); ctx.lineTo(0,TH/2); ctx.lineTo(-TW/2,0);
    ctx.closePath(); ctx.fill();
    if(nb.px&&nb.nx&&nb.py&&nb.ny){ // deep open water in lake centers (seamless full tile)
      ctx.fillStyle='rgba(18,38,56,.3)';
      ctx.beginPath(); ctx.moveTo(0,-TH/2); ctx.lineTo(TW/2,0); ctx.lineTo(0,TH/2); ctx.lineTo(-TW/2,0);
      ctx.closePath(); ctx.fill();
    }
    // earthen banks only along shores (edges without water)
    const bank=(x1,y1,x2,y2)=>{
      ctx.fillStyle='#5f4e37';
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      ctx.lineTo(x2*.72,y2*.72); ctx.lineTo(x1*.72,y1*.72); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(30,24,16,.55)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.strokeStyle='rgba(190,225,245,.4)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x1*.72,y1*.72); ctx.lineTo(x2*.72,y2*.72); ctx.stroke();
    };
    const N=[0,-TH/2],E=[TW/2,0],S=[0,TH/2],W=[-TW/2,0];
    if(!nb.px) bank(E[0],E[1],S[0],S[1]);
    if(!nb.py) bank(S[0],S[1],W[0],W[1]);
    if(!nb.nx) bank(W[0],W[1],N[0],N[1]);
    if(!nb.ny) bank(N[0],N[1],E[0],E[1]);
    // moving glints
    const ph=Math.sin(time*1.8+b.x*1.7+b.y*.9);
    ctx.strokeStyle='rgba(180,220,240,.35)'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(-9+ph*5,((b.x+b.y)%3-1)*3); ctx.lineTo(4+ph*5,((b.x+b.y)%3-1)*3);
    ctx.stroke();
    if(era===2){ // barbed wire line across the trench water
      ctx.strokeStyle='#6a7076'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(-16,-5); ctx.lineTo(16,-3); ctx.stroke();
      for(let i=-1;i<=1;i++){ ctx.beginPath();
        ctx.moveTo(i*11-3,-2); ctx.lineTo(i*11+3,-8); ctx.moveTo(i*11+3,-2); ctx.lineTo(i*11-3,-8); ctx.stroke(); }
    }
  } else if(b.kind==='bridgeB'){
    const nb=wateryNeighbors(G,b.x,b.y);
    // deck orientation: follow bridge chains first, then span between land banks
    const isBr=(dx,dy)=>{ const nx2=b.x+dx,ny2=b.y+dy;
      if(nx2<0||ny2<0||nx2>=MAPW||ny2>=MAPW)return 0;
      const nbB=G.bgrid[ny2*MAPW+nx2]; return nbB&&nbB.kind==='bridgeB'?1:0; };
    const brY=isBr(0,1)||isBr(0,-1), brX=isBr(1,0)||isBr(-1,0);
    let alongY;
    if(brY&&!brX) alongY=true;
    else if(brX&&!brY) alongY=false;
    else alongY=(nb.px||nb.nx)&&!(nb.py||nb.ny); // channel E-W -> deck runs N-S
    const A=alongY?[-TW/4,TH/4]:[TW/4,TH/4];   // deck axis (half-tile step)
    const P=alongY?[TW/4,TH/4]:[-TW/4,TH/4];   // across-deck
    const L=1.32, Wd=.56, lift=5;
    const pt=(a,p,dz)=>[A[0]*a+P[0]*p, A[1]*a+P[1]*p+(dz||0)];
    const deckCol=era===0?'#9a7a50':era===1?'#b0b5bd':'#828c94';
    const deckDark=era===0?'#6d5334':era===1?'#84898f':'#565f66';
    // water shadow
    ctx.fillStyle='rgba(10,18,26,.35)';
    ctx.beginPath(); ctx.ellipse(0,4,26,10,0,0,7); ctx.fill();
    // stone piers with visible arch
    ctx.fillStyle=era===0?'#7d838c':era===1?'#8f949c':'#6a7278';
    for(const s of [-0.52,0.52]){
      const [bx,by]=pt(s,0,0);
      ctx.beginPath();
      ctx.moveTo(bx-6,by-lift); ctx.lineTo(bx-7.5,by+6);
      ctx.lineTo(bx+7.5,by+6); ctx.lineTo(bx+6,by-lift);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.9; ctx.stroke();
    }
    // arch between piers
    ctx.strokeStyle=era===0?'#8d939c':'#9aa0a8'; ctx.lineWidth=2.4;
    ctx.beginPath(); ctx.moveTo(pt(-.5,0)[0],pt(-.5,0)[1]+4);
    ctx.quadraticCurveTo(0,pt(0,0)[1]-6, pt(.5,0)[0],pt(.5,0)[1]+4); ctx.stroke();
    // deck side skirt
    const c1d=pt(-L,Wd,-lift), c2d=pt(L,Wd,-lift), c3d=pt(L,-Wd,-lift), c4d=pt(-L,-Wd,-lift);
    ctx.fillStyle=deckDark; ctx.beginPath();
    ctx.moveTo(c1d[0],c1d[1]); ctx.lineTo(c2d[0],c2d[1]);
    ctx.lineTo(c2d[0],c2d[1]+4.5); ctx.lineTo(c1d[0],c1d[1]+4.5); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(c4d[0],c4d[1]); ctx.lineTo(c3d[0],c3d[1]);
    ctx.lineTo(c3d[0],c3d[1]+4.5); ctx.lineTo(c4d[0],c4d[1]+4.5); ctx.closePath(); ctx.fill();
    // deck surface
    ctx.fillStyle=deckCol; ctx.beginPath();
    ctx.moveTo(c1d[0],c1d[1]); ctx.lineTo(c2d[0],c2d[1]);
    ctx.lineTo(c3d[0],c3d[1]); ctx.lineTo(c4d[0],c4d[1]); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=1; ctx.stroke();
    // surface pattern: planks / slabs / tread plates
    ctx.strokeStyle='rgba(30,26,18,.45)'; ctx.lineWidth=.9;
    const nPl=era===0?7:5;
    for(let i=1;i<nPl;i++){ const t2=-L+2*L*i/nPl;
      const pa=pt(t2,Wd,-lift), pb=pt(t2,-Wd,-lift);
      ctx.beginPath(); ctx.moveTo(pa[0],pa[1]); ctx.lineTo(pb[0],pb[1]); ctx.stroke(); }
    if(era===2){ ctx.strokeStyle='rgba(255,220,80,.5)'; ctx.lineWidth=1;
      const pa=pt(-L*.9,0,-lift), pb=pt(L*.9,0,-lift);
      ctx.setLineDash([4,3]); ctx.beginPath(); ctx.moveTo(pa[0],pa[1]); ctx.lineTo(pb[0],pb[1]); ctx.stroke();
      ctx.setLineDash([]); }
    // railings on both sides
    for(const sgn of [1,-1]){
      const rail=[];
      for(let i=0;i<=4;i++){ const t2=-L*.92+2*L*.92*i/4; rail.push(pt(t2,Wd*sgn,-lift)); }
      ctx.strokeStyle=era===0?'#5c452e':era===1?'#c8cdd4':'#98a2aa';
      ctx.lineWidth=era===1?2.2:1.6;
      // posts
      for(const [rx,ry] of rail){ ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx,ry-7); ctx.stroke(); }
      // top rail
      ctx.beginPath(); ctx.moveTo(rail[0][0],rail[0][1]-7);
      for(const [rx,ry] of rail) ctx.lineTo(rx,ry-7); ctx.stroke();
      if(era===2){ // X truss between posts
        ctx.lineWidth=1;
        for(let i=0;i<4;i++){ ctx.beginPath();
          ctx.moveTo(rail[i][0],rail[i][1]); ctx.lineTo(rail[i+1][0],rail[i+1][1]-7);
          ctx.moveTo(rail[i][0],rail[i][1]-7); ctx.lineTo(rail[i+1][0],rail[i+1][1]); ctx.stroke(); }
      }
    }
  } else if(b.kind==='flag'){
    ctx.strokeStyle='#3a3f47'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,2); ctx.lineTo(0,-34); ctx.stroke();
    const wav=Math.sin(time*2.6+b.x)*2.5;
    ctx.save(); ctx.translate(0,-34); ctx.rotate(Math.sin(time*2.4+b.x)*.07);
    ctx.drawImage(crestSprite(fortCust),1,0,14,17.5); // 문장 배너 단독 — 겹침 없음
    ctx.restore();
    ctx.fillStyle='#E9B329'; ctx.beginPath(); ctx.arc(0,-34,1.6,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.9; ctx.stroke();
    ctx.fillStyle='#6b7078'; ctx.beginPath(); ctx.ellipse(0,2,5,2.5,0,0,7); ctx.fill();
  } else if(b.kind==='hq'){
    const hqElev=b.elev||0;
    if(hqElev&&b.baseCols){ // enthroned on its block pedestal
      ctx.fillStyle='rgba(10,15,20,.25)';
      ctx.beginPath(); ctx.ellipse(0,10,56,26,0,0,7); ctx.fill();
      const seq=[[0,0,-16],[1,32,0],[2,-32,0],[3,0,16]]; // depth order
      for(const [ci2,ox,oy] of seq){
        const col=b.baseCols[ci2]||[0];
        for(let L=0;L<col.length;L++){
          ctx.save(); ctx.translate(ox,oy-13*L);
          blitSprite(blockSprite(col[L], L===0));
          ctx.restore();
        }
      }
      ctx.translate(0,-13*hqElev);
    }
    blitSprite(hqSprite(era));
    if(era===0){
      ctx.drawImage(crestSprite(fortCust),-9,-48,18,23);
      flag(ctx,0,-101,16,c1,c2,'',time);
    } else if(era===1){
      ctx.drawImage(crestSprite(fortCust),-9,-46,18,23);
      flag(ctx,0,-74,16,c1,c2,'',time);
    } else {
      ctx.drawImage(crestSprite(fortCust),-11,-24,22,28);
      if(Math.sin(time*4)>0){ ctx.fillStyle='#ff5040';
        ctx.beginPath(); ctx.arc(30,-87,2.4,0,7); ctx.fill(); }
      const ra=time*1.5;
      ctx.save(); ctx.translate(14,-53); ctx.scale(1,.55); ctx.rotate(ra);
      ctx.fillStyle='#c8d2d8'; ctx.beginPath(); ctx.arc(0,0,8,-.7,2.2); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
      ctx.restore();
      flag(ctx,-34,-4,22,c1,c2,'',time);
    }
  } else if(b.kind==='tower'){
    const ti=b.tIdx;
    const elev=b.elev||0;
    if(elev){ // tower raised on rampart storeys
      for(let L=1;L<=elev;L++){ ctx.save(); ctx.translate(0,-13*(L-1)); blitSprite(wallSegSprite(era)); ctx.restore(); }
      ctx.translate(0,-13*elev);
    }
    blitSprite(towerSprite(era,ti));
    const ang=b.angle||0, flash=b.flash||0;
    const rec=flash>0?flash*22:0; // recoil
    ctx.save(); ctx.translate(0,era===0?-44:era===1?-40:-33);
    drawTurret(era,ti,ang,rec,flash,time,c1);
    ctx.restore();
    if(ti===1) flag(ctx,-14,-30,14,c1,c2,'',time);
    if(b.flagTop) drawCrestFlag(ctx,fortCust,12,era===0?-40:era===1?-37:-30,14,time);
  } else if(b.kind==='trap'){
    if(!(Battle.active&&Battle.mode==='attack')){
      if(era===0){ ctx.fillStyle='#7d838c';
        for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*9-4,4); ctx.lineTo(i*9,-7); ctx.lineTo(i*9+4,4); ctx.closePath(); ctx.fill(); }
        ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7;
        for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*9-4,4); ctx.lineTo(i*9,-7); ctx.lineTo(i*9+4,4); ctx.stroke(); }
      } else { ctx.fillStyle='#4a5058'; ctx.beginPath(); ctx.ellipse(0,0,8,4.5,0,0,7); ctx.fill();
        ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
        ctx.fillStyle=(Math.sin(time*6)>0)?'#e05040':'#802a20';
        ctx.beginPath(); ctx.arc(0,-1,2,0,7); ctx.fill(); }
    }
  }
  if(hpFrac<1&&b.kind!=='trap'&&b.kind!=='moat'&&b.kind!=='flag'){
    if(hpFrac<0.55){ ctx.strokeStyle='rgba(15,20,26,.65)'; ctx.lineWidth=1.3;
      ctx.beginPath(); ctx.moveTo(-9,-5); ctx.lineTo(-3,-13); ctx.lineTo(2,-7); ctx.lineTo(7,-15); ctx.stroke(); }
    if(hpFrac<0.3){ ctx.fillStyle='rgba(20,26,33,.5)';
      ctx.beginPath(); ctx.moveTo(-14,-2); ctx.lineTo(-7,-9); ctx.lineTo(-2,-3); ctx.closePath(); ctx.fill(); }
    hpBarLocal(ctx,0,b.kind==='hq'?-96:-46,b.kind==='hq'?44:24,hpFrac);
  }
  ctx.restore();
}
function hpBarLocal(g,x,y,w,frac){
  g.fillStyle='rgba(10,14,18,.8)'; g.fillRect(x-w/2,y,w,4);
  g.fillStyle=frac>0.5?'#5ec97b':frac>0.25?'#e8b23c':'#e0604f';
  g.fillRect(x-w/2+0.5,y+0.5,(w-1)*frac,3); }

/* ---------- units ---------- */
function drawUnit(u,time){
  const G=curG(); if(!G)return;
  const [sx,sy]=w2s(u.x,u.y);
  if(sx<-60||sy<-80||sx>VW+60||sy>VH+60)return;
  const rz=tileRaise(G,u.x,u.y);
  ctx.save(); ctx.translate(sx,sy-rz*cam.zoom); ctx.scale(cam.zoom*1.26,cam.zoom*1.26);
  const col=u.color, dark=shade(col,.7);
  const ph=time*11+u.seed*9;
  const bob=u.moving?Math.sin(ph)*1.2:0;
  const leg=u.moving?Math.sin(ph)*3.4:0;
  const id=u.def.id, flash=u.flash||0;
  ctx.fillStyle='rgba(10,15,20,.32)'; ctx.beginPath(); ctx.ellipse(0,1,7,3,0,0,7); ctx.fill();
  if(id==='knight'||id==='cuirassier'){
    // horse legs
    ctx.strokeStyle='#4a3826'; ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.moveTo(-6,-4); ctx.lineTo(-6+leg*.6,1); ctx.moveTo(6,-4); ctx.lineTo(6-leg*.6,1);
    ctx.moveTo(-3,-4); ctx.lineTo(-3-leg*.5,1); ctx.moveTo(3,-4); ctx.lineTo(3+leg*.5,1); ctx.stroke();
    ctx.fillStyle='#6b5340'; ctx.beginPath(); ctx.ellipse(0,-6+bob*.5,9.5,4.6,0,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    // head + tail
    ctx.fillStyle='#5c452e'; ctx.beginPath(); ctx.ellipse(9.5,-9+bob*.5,3.4,2.6,-.5,0,7); ctx.fill();
    ctx.strokeStyle='#5c452e'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(-9,-7); ctx.quadraticCurveTo(-13,-4+leg*.4,-11,-1); ctx.stroke();
    // rider + cape
    ctx.fillStyle=shade(col,.55); ctx.beginPath();
    ctx.moveTo(-2,-13+bob); ctx.quadraticCurveTo(-8,-8+leg*.3,-5,-4); ctx.lineTo(-1,-8); ctx.closePath(); ctx.fill();
    ctx.fillStyle=col; ctx.fillRect(-3,-15+bob,6,9);
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.strokeRect(-3,-15+bob,6,9);
    ctx.fillStyle='#e4c49a'; ctx.beginPath(); ctx.arc(0,-17+bob,2.8,0,7); ctx.fill();
    ctx.fillStyle='#d8dde4'; ctx.beginPath(); ctx.arc(0,-18+bob,2.8,Math.PI,0); ctx.fill();
    ctx.strokeStyle='#d8dde4'; ctx.lineWidth=1.7;
    ctx.beginPath(); ctx.moveTo(4,-13+bob); ctx.lineTo(13,-20+bob); ctx.stroke();
  } else if(id==='tank'){
    // treads with scrolling ticks
    ctx.fillStyle='#2e343b'; ctx.beginPath(); ctx.ellipse(0,-2,11.5,5.8,0,0,7); ctx.fill();
    ctx.strokeStyle='#4a525b'; ctx.lineWidth=1;
    const sc=u.moving?(time*20)%4:0;
    for(let i=-2;i<=2;i++){ const xx=i*4.4+sc-2;
      ctx.beginPath(); ctx.moveTo(xx,-6.5); ctx.lineTo(xx+1.4,2); ctx.stroke(); }
    ctx.fillStyle=dark; ctx.beginPath(); ctx.ellipse(0,-5,9,4.4,0,0,7); ctx.fill();
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,-8.5,6.4,3.4,0,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    const a=u.faceAng||0, rec=flash*10;
    ctx.strokeStyle='#2a3038'; ctx.lineWidth=2.6;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*-rec*.3,-8.5);
    ctx.lineTo(Math.cos(a)*(14-rec),-8.5+Math.sin(a)*7); ctx.stroke();
    if(flash>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,220,120,'+flash*7+')';
      ctx.beginPath(); ctx.arc(Math.cos(a)*15,-8.5+Math.sin(a)*7,4,0,7); ctx.fill(); ctx.restore(); }
  } else if(id==='ram'){
    ctx.strokeStyle='#4a3722'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-7,-2); ctx.lineTo(-7+leg*.4,2); ctx.moveTo(7,-2); ctx.lineTo(7-leg*.4,2); ctx.stroke();
    ctx.fillStyle='#7a5c3c'; ctx.fillRect(-10,-13+bob*.4,20,10);
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.strokeRect(-10,-13+bob*.4,20,10);
    ctx.fillStyle='#5c452e'; ctx.beginPath();
    ctx.moveTo(-10,-13+bob*.4); ctx.lineTo(0,-18+bob*.4); ctx.lineTo(10,-13+bob*.4); ctx.closePath(); ctx.fill();
    const swing=Math.sin(time*6+u.seed)*2;
    ctx.strokeStyle='#3d2e1c'; ctx.lineWidth=3.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-12+swing,-8); ctx.lineTo(13+swing,-8); ctx.stroke(); ctx.lineCap='butt';
    ctx.fillStyle='#8a949c'; ctx.beginPath(); ctx.arc(14+swing,-8,2.4,0,7); ctx.fill();
    ctx.fillStyle=col; ctx.fillRect(-10,-15+bob*.4,20,2.4);
  } else if(id==='siegegun'){
    ctx.fillStyle='#4a4038'; ctx.beginPath(); ctx.arc(-5,-3,4.4,0,7); ctx.arc(5,-3,4.4,0,7); ctx.fill();
    ctx.strokeStyle='#2e281f'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(-5,-3,4.4,0,7); ctx.moveTo(9.4,-3); ctx.arc(5,-3,4.4,0,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,-7.4); ctx.lineTo(-5,1.4); ctx.moveTo(5,-7.4); ctx.lineTo(5,1.4); ctx.stroke();
    const a=u.faceAng||0, rec=flash*8;
    ctx.strokeStyle='#2a3038'; ctx.lineWidth=3.4;
    ctx.beginPath(); ctx.moveTo(-3-Math.cos(a)*rec*.4,-6);
    ctx.lineTo(Math.cos(a)*(13-rec),-8+Math.sin(a)*5); ctx.stroke();
    ctx.fillStyle=col; ctx.fillRect(-5.5,-10,11,4.4);
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.strokeRect(-5.5,-10,11,4.4);
    if(flash>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,220,120,'+flash*7+')';
      ctx.beginPath(); ctx.arc(Math.cos(a)*14,-8+Math.sin(a)*5,4.5,0,7); ctx.fill(); ctx.restore(); }
  } else { // infantry
    // legs
    ctx.strokeStyle=shade(col,.5); ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(-1.4,-3+bob*.5); ctx.lineTo(-1.4-leg*.5,1.4);
    ctx.moveTo(1.4,-3+bob*.5); ctx.lineTo(1.4+leg*.5,1.4); ctx.stroke();
    // body
    ctx.fillStyle=col; ctx.beginPath();
    ctx.moveTo(-3.4,-3+bob); ctx.lineTo(-3.4,-11+bob); ctx.arc(0,-11+bob,3.4,Math.PI,0); ctx.lineTo(3.4,-3+bob);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    // belt
    ctx.fillStyle=shade(col,.55); ctx.fillRect(-3.4,-6+bob,6.8,1.4);
    // head + helmet by era
    ctx.fillStyle='#e4c49a'; ctx.beginPath(); ctx.arc(0,-14.5+bob,2.8,0,7); ctx.fill();
    if(u.era===0){ ctx.fillStyle='#c8ccd4'; ctx.beginPath(); ctx.arc(0,-15.3+bob,2.9,Math.PI,0); ctx.fill();
      ctx.fillRect(-2.9,-15.3+bob,5.8,1); }
    else if(u.era===1){ ctx.fillStyle='#2e3238'; ctx.beginPath();
      ctx.ellipse(0,-16.6+bob,3.4,1.4,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(0,-15.6+bob,2.4,Math.PI,0); ctx.fill(); }
    else { ctx.fillStyle=shade(col,.8); ctx.beginPath(); ctx.arc(0,-15.2+bob,2.9,Math.PI,0); ctx.fill();
      ctx.fillRect(-2.9,-15.2+bob,5.8,1.2); }
    // weapon
    ctx.strokeStyle='#c8ccd4'; ctx.lineWidth=1.4;
    if(id==='archer'){ ctx.strokeStyle='#8a6a44'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.arc(5.5,-10+bob,4.5,-1.25,1.25); ctx.stroke();
      ctx.strokeStyle='#d8dde4'; ctx.lineWidth=.7;
      ctx.beginPath(); ctx.moveTo(5.5+4.5*Math.cos(-1.25),-10+bob+4.5*Math.sin(-1.25));
      ctx.lineTo(5.5+4.5*Math.cos(1.25),-10+bob+4.5*Math.sin(1.25)); ctx.stroke(); }
    else if(id==='sword'){ ctx.beginPath(); ctx.moveTo(4,-8+bob); ctx.lineTo(10,-16+bob); ctx.stroke();
      ctx.strokeStyle='#8a6a44'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(4,-8+bob); ctx.lineTo(5.4,-10+bob); ctx.stroke(); }
    else if(id==='shield'){ ctx.fillStyle=shade(col,1.25); ctx.beginPath();
      ctx.ellipse(-5.5,-9+bob,3.4,5,0,0,7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
      ctx.fillStyle=shade(col,.6); ctx.beginPath(); ctx.arc(-5.5,-9+bob,1.4,0,7); ctx.fill();
      ctx.strokeStyle='#c8ccd4'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(3,-8+bob); ctx.lineTo(8,-11+bob); ctx.stroke(); }
    else if(id==='sapper'||id==='c4'){ ctx.fillStyle='#e0604f'; ctx.fillRect(3.4,-11+bob,5,5.5);
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.strokeRect(3.4,-11+bob,5,5.5);
      ctx.strokeStyle='#f0b43c'; ctx.beginPath(); ctx.moveTo(6,-11+bob); ctx.lineTo(7.4,-14+bob); ctx.stroke();
      if(Math.sin(time*9)>0){ ctx.fillStyle='#ffd060'; ctx.beginPath(); ctx.arc(7.4,-14.5+bob,1,0,7); ctx.fill(); } }
    else if(id==='grenadier'){ ctx.strokeStyle='#3a3f45'; ctx.lineWidth=1.7;
      ctx.beginPath(); ctx.moveTo(2,-9+bob); ctx.lineTo(8,-11+bob); ctx.stroke();
      ctx.fillStyle='#3a3f45'; ctx.beginPath(); ctx.arc(6,-14+bob,2.2,0,7); ctx.fill(); }
    else { // rifles
      ctx.strokeStyle='#3a3f45'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(1.4,-9.5+bob); ctx.lineTo(9.5,-11.5+bob); ctx.stroke();
      ctx.strokeStyle='#6b5334'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(1.4,-9.5+bob); ctx.lineTo(4,-10+bob); ctx.stroke(); }
    if(flash>0){ ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,220,120,'+flash*7+')';
      ctx.beginPath(); ctx.arc(10.5,-11.5+bob,3,0,7); ctx.fill(); ctx.restore(); }
  }
  if(u.hp<u.maxHp&&u.hp>0) hpBarLocal(ctx,0,-23,16,u.hp/u.maxHp);
  if(u.slow>0){ ctx.fillStyle='rgba(120,180,240,.7)'; ctx.beginPath(); ctx.arc(0,-26,2,0,7); ctx.fill(); }
  if(u.suppression>0){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(255,215,110,.75)'; ctx.lineWidth=1.1;
    ctx.beginPath(); ctx.arc(0,-26,3.6+Math.sin(time*8+u.seed)*.8,0,7); ctx.stroke();
    ctx.fillStyle='rgba(255,215,110,.85)';
    ctx.beginPath(); ctx.moveTo(-2,-31); ctx.lineTo(0,-35); ctx.lineTo(2,-31); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

/* ---------- projectiles & particles ---------- */
function projectileOffset(p,k){
  const amp=Math.sin(k*Math.PI), wind=p.wind||[0,0];
  return [wind[0]*amp, wind[1]*amp];
}
function projectileHeight(p,k){
  const peak=p.peak??(p.arc??0);
  if(p.lob||p.arrowArc||p.ballArc) return .12+Math.sin(k*Math.PI)*peak;
  return p.h||.08;
}
function projectileSample(p,k){
  const o=projectileOffset(p,k);
  return {x:lerp(p.sx,p.tx,k)+o[0], y:lerp(p.sy,p.ty,k)+o[1], h:projectileHeight(p,k)};
}
function projectileScreenAngle(p,z){
  if(p.screenAngle!=null) return p.screenAngle;
  const k=clamp((p.t||0)/Math.max(p.dur||1,1e-4),0,1);
  const a=projectileSample(p,Math.max(0,k-.035)), b=projectileSample(p,Math.min(1,k+.035));
  const [ax,ay]=w2s(a.x,a.y), [bx,by]=w2s(b.x,b.y);
  return Math.atan2((by-b.h*10*z)-(ay-a.h*10*z), bx-ax);
}
function drawProjectileTrail(p,z){
  if(!(p.lob||p.arrowArc||p.ballArc))return;
  const k=clamp((p.t||0)/Math.max(p.dur||1,1e-4),0,1);
  if(k<=0.04)return;
  ctx.save();
  ctx.globalAlpha=p.type==='ball'?0.28:0.38;
  ctx.strokeStyle=p.type==='rocket'?'rgba(255,160,70,.55)':p.type==='arrow'||p.type==='bolt'?'rgba(230,220,190,.42)':'rgba(75,80,85,.38)';
  ctx.lineWidth=(p.type==='ball'?2.2:1.2)*z;
  ctx.beginPath();
  let started=false;
  for(let i=6;i>=0;i--){
    const kk=clamp(k-i*.025,0,1);
    const q=projectileSample(p,kk), [qx,qy]=w2s(q.x,q.y);
    const sy=qy-q.h*10*z;
    if(!started){ ctx.moveTo(qx,sy); started=true; } else ctx.lineTo(qx,sy);
  }
  ctx.stroke();
  ctx.restore();
}
function drawProjectile(p){
  const [sx,sy]=w2s(p.x,p.y); const z=cam.zoom;
  if(sx<-60||sy<-80||sx>VW+60||sy>VH+60)return;
  drawProjectileTrail(p,z);
  ctx.save(); ctx.translate(sx,sy-(p.h||0)*10*z); ctx.scale(z,z);
  if(p.type==='arrow'||p.type==='bolt'){
    const a=projectileScreenAngle(p,z);
    ctx.strokeStyle=p.type==='bolt'?'#e8e4d8':'#c8b490'; ctx.lineWidth=p.type==='bolt'?2.2:1.4;
    ctx.beginPath(); ctx.moveTo(-Math.cos(a)*6,-Math.sin(a)*6); ctx.lineTo(Math.cos(a)*6,Math.sin(a)*6); ctx.stroke();
    ctx.fillStyle='#d8dde4'; ctx.beginPath(); ctx.arc(Math.cos(a)*6,Math.sin(a)*6,1.2,0,7); ctx.fill();
    ctx.strokeStyle='rgba(200,180,140,.35)'; ctx.lineWidth=.8; // fletching hint
    ctx.beginPath(); ctx.moveTo(-Math.cos(a)*6,-Math.sin(a)*6);
    ctx.lineTo(-Math.cos(a)*8.4-Math.sin(a)*2,-Math.sin(a)*8.4+Math.cos(a)*2); ctx.stroke();
  } else if(p.type==='bullet'||p.type==='tracer'){
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(255,215,110,.95)'; ctx.lineWidth=p.type==='tracer'?2.2:1.5;
    const a=projectileScreenAngle(p,z);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-Math.cos(a)*11,-Math.sin(a)*11); ctx.stroke();
  } else if(p.type==='ball'){ ctx.fillStyle='#2e3238'; ctx.beginPath(); ctx.arc(0,0,3.2,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.beginPath(); ctx.arc(-1,-1,1.2,0,7); ctx.fill();
    const a=projectileScreenAngle(p,z);
    ctx.strokeStyle='rgba(40,38,34,.4)'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(-Math.cos(a)*7,-Math.sin(a)*7); ctx.lineTo(-Math.cos(a)*2,-Math.sin(a)*2); ctx.stroke();
  } else if(p.type==='lob'){ const a=projectileScreenAngle(p,z);
    ctx.save(); ctx.rotate(a); ctx.fillStyle='#3e444c'; ctx.beginPath(); ctx.arc(0,0,4,0,7); ctx.fill();
    ctx.strokeStyle='rgba(255,220,130,.35)'; ctx.lineWidth=1.1;
    ctx.beginPath(); ctx.moveTo(-7,0); ctx.lineTo(-2,0); ctx.stroke(); ctx.restore();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(240,180,60,.8)'; ctx.beginPath(); ctx.arc(1,-1,1.8,0,7); ctx.fill();
  } else if(p.type==='rocket'){ const a=projectileScreenAngle(p,z);
    ctx.rotate(a);
    ctx.fillStyle='#d8dde4'; ctx.fillRect(-3,-1.6,7,3.2);
    ctx.fillStyle='#c04a3a'; ctx.beginPath(); ctx.moveTo(4,-1.6); ctx.lineTo(6.4,0); ctx.lineTo(4,1.6); ctx.fill();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,170,60,.9)'; ctx.beginPath(); ctx.arc(-4,0,2.2,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,230,140,.6)'; ctx.beginPath(); ctx.arc(-6.2,0,1.2+Math.sin((p.t||0)*30)*.4,0,7); ctx.fill();
  } else if(p.type==='shell'){ // 야포: flat supersonic tracer shell
    ctx.rotate(projectileScreenAngle(p,z));
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(255,190,90,.9)'; ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(-2,0); ctx.stroke();
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#d8dde4'; ctx.beginPath();
    ctx.moveTo(4.5,0); ctx.lineTo(-2,-1.9); ctx.lineTo(-2,1.9); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
  } else if(p.type==='pierce'){ // 공성포: bunker-piercing bolt
    ctx.rotate(projectileScreenAngle(p,z));
    ctx.fillStyle='#2e363c'; ctx.beginPath();
    ctx.moveTo(6.5,0); ctx.lineTo(-4,-2.6); ctx.lineTo(-4,2.6); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.9; ctx.stroke();
    ctx.fillStyle='#9eadb8'; ctx.beginPath();
    ctx.moveTo(6.5,0); ctx.lineTo(2,-1.4); ctx.lineTo(2,1.4); ctx.closePath(); ctx.fill();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(150,220,255,.8)'; ctx.beginPath(); ctx.arc(-5.2,0,1.7,0,7); ctx.fill();
  } else if(p.type==='bigball'){ // 대형포: monstrous smoking cannonball
    ctx.fillStyle='#23272c'; ctx.beginPath(); ctx.arc(0,0,6.4,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=1.3; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.26)'; ctx.beginPath(); ctx.arc(-2.1,-2.1,2.1,0,7); ctx.fill();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,160,60,.55)'; ctx.beginPath(); ctx.arc(-6.4,1,2.6,0,7); ctx.fill();
  } else if(p.type==='oil'){ ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(240,170,60,.95)'; ctx.beginPath(); ctx.arc(0,0,3,0,7); ctx.fill(); }
  ctx.restore();
  if(p.h>0.1){ const sh=clamp(1-(p.h||0)*.12,.35,1);
    ctx.fillStyle='rgba(10,15,20,'+(0.24*sh)+')';
    ctx.beginPath(); ctx.ellipse(sx,sy,3*z*sh,1.5*z*sh,0,0,7); ctx.fill(); }
}
function drawZap(z_){
  const [ax,ay]=w2s(z_.x1,z_.y1), [bx,by]=w2s(z_.x2,z_.y2);
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const [w,a] of [[4,z_.life*.8],[1.6,z_.life*2.2]]){
    ctx.strokeStyle='rgba(140,220,255,'+Math.min(1,a)+')'; ctx.lineWidth=w*cam.zoom;
    ctx.beginPath(); ctx.moveTo(ax,ay-30*cam.zoom);
    for(let i=1;i<4;i++){ const t=i/4;
      ctx.lineTo(lerp(ax,bx,t)+(Math.random()*12-6)*cam.zoom, lerp(ay-30*cam.zoom,by-8*cam.zoom,t)+(Math.random()*9-4)*cam.zoom); }
    ctx.lineTo(bx,by-8*cam.zoom); ctx.stroke();
  }
  ctx.restore();
}
function drawParticles(parts){
  for(const p of parts){ const [sx,sy]=w2s(p.x,p.y); const z=cam.zoom;
    if(sx<-40||sy<-60||sx>VW+40||sy>VH+40)continue;
    const lf=clamp(p.life/p.maxLife,0,1);
    if(p.kind==='ring'){
      ctx.save(); ctx.globalAlpha=lf*.7; ctx.strokeStyle=p.color; ctx.lineWidth=2.4*z*lf;
      const r=(1-lf)*p.size*z;
      ctx.beginPath(); ctx.ellipse(sx,sy,r,r*.5,0,0,7); ctx.stroke(); ctx.restore();
    } else if(p.kind==='flash'){
      ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=lf;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*lf,0,7); ctx.fill(); ctx.restore();
    } else if(p.kind==='puff'){
      ctx.save(); ctx.globalAlpha=clamp(p.life/p.maxLife,0,1)*.9;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*(.7+(1-p.life/p.maxLife)*.8),0,7); ctx.fill();
      ctx.strokeStyle='rgba(44,36,29,.45)'; ctx.lineWidth=1;
      ctx.stroke(); ctx.restore();
    } else if(p.kind==='slash'){
      const tt=1-lf;
      ctx.save(); ctx.translate(sx,sy-(p.h||0)*10*z);
      ctx.rotate(p.ang||0); ctx.scale(z,z*.6);
      ctx.strokeStyle='rgba(255,255,255,'+(.9*lf)+')'; ctx.lineWidth=2.4; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(0,0,p.size||7,-1.2+tt*1.7,.5+tt*1.7); ctx.stroke();
      ctx.strokeStyle='rgba(255,238,190,'+(.55*lf)+')'; ctx.lineWidth=1.1;
      ctx.beginPath(); ctx.arc(0,0,(p.size||7)-2.4,-1.1+tt*1.7,.4+tt*1.7); ctx.stroke();
      ctx.lineCap='butt'; ctx.restore();
    } else if(p.kind==='smoke'){
      ctx.save(); ctx.globalAlpha=lf*.4; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*(1.6-lf*.9),0,7); ctx.fill(); ctx.restore();
    } else if(p.kind==='fire'){
      ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=lf;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*lf,0,7); ctx.fill(); ctx.restore();
    } else if(p.kind==='ragdoll'){
      // airborne tumbling body
      ctx.fillStyle='rgba(10,15,20,.25)';
      ctx.beginPath(); ctx.ellipse(sx,sy,4.2*z,1.9*z,0,0,7); ctx.fill();
      ctx.save(); ctx.translate(sx,sy-(p.h||0)*10*z); ctx.scale(z*1.15,z*1.15);
      ctx.rotate((p.maxLife-p.life)*p.spin);
      ctx.globalAlpha=clamp(p.life/.35,0,1);
      ctx.fillStyle=p.color; ctx.beginPath(); // 팀색 튜닉 몸통
      ctx.moveTo(-3.2,3); ctx.lineTo(-3.2,-2.6); ctx.arc(0,-2.6,3.2,Math.PI,0); ctx.lineTo(3.2,3); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=BEAR.out; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle=BEAR.fur; // 곰 머리 + 귀
      ctx.beginPath(); ctx.arc(-2.6,-7.6,1.5,0,7); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(2.6,-7.6,1.5,0,7); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,-5.8,3.6,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle=BEAR.muz; ctx.beginPath(); ctx.ellipse(0,-4.8,1.8,1.3,0,0,7); ctx.fill();
      ctx.fillStyle=BEAR.out;
      ctx.beginPath(); ctx.arc(-1.3,-6.2,.4,0,7); ctx.arc(1.3,-6.2,.4,0,7); ctx.fill();
      ctx.strokeStyle=BEAR.fur; ctx.lineWidth=1.8; // 허우적대는 팔다리
      ctx.beginPath(); ctx.moveTo(-2.6,1.5); ctx.lineTo(-5.4,5.4); ctx.moveTo(2.6,1.5); ctx.lineTo(5.8,4.6);
      ctx.moveTo(-2.2,-1); ctx.lineTo(-6,-3); ctx.moveTo(2.2,-1); ctx.lineTo(6,-2); ctx.stroke();
      ctx.restore();
    } else if(p.kind==='chunk'){
      // tumbling masonry block
      ctx.fillStyle='rgba(10,15,20,.22)';
      ctx.beginPath(); ctx.ellipse(sx,sy,3.4*z,1.6*z,0,0,7); ctx.fill();
      ctx.save(); ctx.translate(sx,sy-(p.h||0)*10*z); ctx.scale(z,z);
      ctx.rotate((p.maxLife-p.life)*p.spin);
      ctx.globalAlpha=clamp(p.life/.5,0,1);
      const s2=p.size;
      ctx.fillStyle=p.cSide||'#8a8f98'; ctx.fillRect(-s2/2,-s2/2,s2,s2);
      ctx.fillStyle=p.cTop||'#a6abb4'; ctx.fillRect(-s2/2,-s2/2,s2,s2*.45);
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.6; ctx.strokeRect(-s2/2,-s2/2,s2,s2);
      ctx.restore();
    } else if(p.kind==='float'){
      ctx.save();
      ctx.globalAlpha=lf;
      ctx.font='700 '+Math.max(10,12*z)+'px system-ui, sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.lineWidth=3*z; ctx.strokeStyle='rgba(10,14,18,.75)';
      ctx.strokeText(p.text,sx,sy-(p.h||0)*10*z);
      ctx.fillStyle=p.color; ctx.fillText(p.text,sx,sy-(p.h||0)*10*z);
      ctx.restore();
    } else {
      ctx.globalAlpha=lf; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(sx,sy-(p.h||0)*10*z,p.size*z*(0.5+0.5*lf),0,7); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  ctx.globalAlpha=1;
}

/* ---------- overlays ---------- */
function drawTileHighlight(x,y,color,alpha){
  const [sx,sy]=w2s(x+0.5,y+0.5); const z=cam.zoom;
  const G=curG(); const rz=G?tileRaise(G,x,y):0;
  ctx.save(); ctx.globalAlpha=alpha??.4; ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(sx,sy-rz*z-TH/2*z); ctx.lineTo(sx+TW/2*z,sy-rz*z);
  ctx.lineTo(sx,sy-rz*z+TH/2*z); ctx.lineTo(sx-TW/2*z,sy-rz*z); ctx.closePath(); ctx.fill();
  ctx.restore();
}

/* ================= TURRET MACHINERY (detailed, aimed, animated) ================= */
function drawTurret(era,ti,ang,rec,flash,time,c1){
  const bx=Math.cos(ang), by=Math.sin(ang);
  const dark=PAL.eraDark[era], body=PAL.eraBody[era];
  if(era===0){
    if(ti===0){ // archer on the crown
      ctx.fillStyle='#6d5334'; ctx.beginPath(); ctx.ellipse(0,1,7.5,3.6,0,0,7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      ctx.fillStyle=c1; ctx.beginPath(); // tunic
      ctx.moveTo(-2.8,0); ctx.lineTo(-2.8,-7); ctx.arc(0,-7,2.8,Math.PI,0); ctx.lineTo(2.8,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      bearHeadC(ctx,0,-10.8,3.4); // 곰 궁수!
      bearHelm(ctx,'hood',0,-10.8,3.4);
      ctx.fillStyle='#5c452e'; ctx.fillRect(-4.4,-8.5,1.6,6); // quiver
      ctx.strokeStyle='#8a6a44'; ctx.lineWidth=1.5; // drawn bow aimed at target
      ctx.beginPath(); ctx.arc(bx*5,-6+by*2.5,4.5,ang-1.15,ang+1.15); ctx.stroke();
      ctx.strokeStyle='#e8e4d8'; ctx.lineWidth=.6;
      const sx1=bx*5+Math.cos(ang-1.15)*4.5, sy1=-6+by*2.5+Math.sin(ang-1.15)*4.5;

      ctx.beginPath(); ctx.moveTo(bx*8-by*8,-2+by*4+bx*2);
      ctx.lineTo(bx*(4-rec*.5),-2+by*2); ctx.lineTo(bx*8+by*8,-2+by*4-bx*2); ctx.stroke();
      ctx.strokeStyle='#d8c8a8'; ctx.lineWidth=1.4;

    } else if(ti===2){ // catapult with swinging arm

      ctx.beginPath(); ctx.moveTo(6,2); ctx.lineTo(2,-8); ctx.stroke();
      ctx.fillStyle='#5c452e'; ctx.fillRect(-8,1,16,2.6); // base beam
      const swing=flash>0?flash/0.15:0; // 1 right after firing
      const armA=lerp(-2.4,-0.6,swing); // cocked back -> thrown forward
      const ax=Math.cos(armA)*11*bx- Math.sin(armA)*0, ay2=-8+Math.sin(armA)*11;
      ctx.strokeStyle='#6d5334'; ctx.lineWidth=2.4; // throwing arm
      ctx.beginPath(); ctx.moveTo(-bx*4,-6); ctx.lineTo(bx*Math.cos(armA)*12,-8+Math.sin(armA)*10); ctx.stroke();
      ctx.fillStyle='#3d454e'; // counterweight
      ctx.fillRect(-bx*6-2.4,-5,4.8,4.4);
      ctx.fillStyle='#5c452e'; ctx.beginPath(); // spoon cup
      ctx.arc(bx*Math.cos(armA)*12,-8+Math.sin(armA)*10,2.6,0,7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.6; ctx.stroke();
    } else { // oil cauldron + crane
      ctx.strokeStyle='#4a3722'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-7,2); ctx.lineTo(-7,-9); ctx.lineTo(2,-11); ctx.stroke();
      ctx.fillStyle='#3a3f45'; ctx.beginPath(); ctx.ellipse(0,0,9,5.5,0,0,7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
      const gl=.6+Math.sin(time*5)*.25;
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(232,160,60,'+gl+')'; ctx.beginPath(); ctx.ellipse(0,-1,6,3.4,0,0,7); ctx.fill();
      ctx.fillStyle='rgba(255,220,140,'+gl*.7+')'; ctx.beginPath(); ctx.ellipse(0,-1.5,3,1.7,0,0,7); ctx.fill();
      ctx.restore();
      ctx.strokeStyle='#2a3038'; ctx.lineWidth=.8; // chain
      ctx.beginPath(); ctx.moveTo(2,-11); ctx.lineTo(0,-5); ctx.stroke();
    }
  } else if(era===1){
    if(ti===0){ // musketeer at post
      ctx.fillStyle=dark; ctx.beginPath(); ctx.ellipse(0,1,7,3.4,0,0,7); ctx.fill();
      ctx.fillStyle=c1; ctx.beginPath();
      ctx.moveTo(-2.8,0); ctx.lineTo(-2.8,-7); ctx.arc(0,-7,2.8,Math.PI,0); ctx.lineTo(2.8,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      bearHeadC(ctx,0,-10.8,3.4); // 곰 머스킷수!
      bearHelm(ctx,'tricorne',0,-10.8,3.4);
      ctx.strokeStyle='#2a3038'; ctx.lineWidth=1.6; // long musket
      ctx.beginPath(); ctx.moveTo(-bx*2,-7); ctx.lineTo(bx*(13-rec),-7+by*6); ctx.stroke();
      ctx.strokeStyle='#6b5334'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(-bx*2,-7); ctx.lineTo(bx*3,-7+by*1.5); ctx.stroke();
      ctx.strokeStyle='#8a949c'; ctx.lineWidth=.9; // fork rest
      ctx.beginPath(); ctx.moveTo(bx*6,-7+by*3); ctx.lineTo(bx*6,1); ctx.stroke();
    } else if(ti===1){ // cannon on carriage
      ctx.fillStyle='#5c452e'; ctx.beginPath(); // carriage cheek
      ctx.moveTo(-bx*7-3,1); ctx.lineTo(bx*3,-4+by*1.5); ctx.lineTo(bx*3+3,1); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      const wx2=-bx*3; // spoked wheel
      ctx.strokeStyle='#4a3722'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.ellipse(wx2,-1,4.4,4.4,0,0,7); ctx.stroke();
      for(let s2=0;s2<3;s2++){ const wa=s2*Math.PI/3+time*(flash>0?4:0);
