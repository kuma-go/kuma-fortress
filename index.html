        ctx.lineTo(wx2+Math.cos(wa)*4,-1+Math.sin(wa)*4); ctx.stroke(); }
      ctx.strokeStyle='#23292f'; ctx.lineWidth=5; // barrel
      ctx.beginPath(); ctx.moveTo(-bx*(3+rec*.5),-4-by*1); ctx.lineTo(bx*(15-rec),-4+by*7); ctx.stroke();
      ctx.strokeStyle='#3d454e'; ctx.lineWidth=1; // reinforcement rings
      for(const t2 of [.35,.6,.85]){ const rx2=lerp(-bx*3,bx*15,t2), ry2=lerp(-4-by*1,-4+by*7,t2);
        ctx.beginPath(); ctx.moveTo(rx2-by*3,ry2-2); ctx.lineTo(rx2+by*3,ry2+2); ctx.stroke(); }
    } else if(ti===2){ // mortar
      ctx.fillStyle='#3d454e'; ctx.beginPath(); ctx.ellipse(0,1.5,8.5,4,0,0,7); ctx.fill(); // base plate
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=6.4; ctx.lineCap='round'; // stubby tube at high angle
      ctx.beginPath(); ctx.moveTo(-bx*2,1); ctx.lineTo(bx*7,-11+by*2); ctx.stroke(); ctx.lineCap='butt';
      ctx.strokeStyle='#454b52'; ctx.lineWidth=1.2; // muzzle ring
      ctx.beginPath(); ctx.ellipse(bx*7,-11+by*2,3,1.6,ang,0,7); ctx.stroke();
      ctx.strokeStyle='#8a949c'; ctx.lineWidth=1; // bipod
      ctx.beginPath(); ctx.moveTo(bx*3,-5); ctx.lineTo(bx*3-3,2); ctx.moveTo(bx*3,-5); ctx.lineTo(bx*3+3,2); ctx.stroke();
      ctx.fillStyle='#5c452e'; ctx.fillRect(-8.5,-3,3.6,4); // shell crate
      ctx.fillStyle='#2e3238'; ctx.beginPath(); ctx.arc(-6.7,-3.6,1.1,0,7); ctx.arc(-7.8,-3.2,1.1,0,7); ctx.fill();
    } else { // gatling
      ctx.strokeStyle='#4a3722'; ctx.lineWidth=1.6; // tripod
      ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(-4,2); ctx.moveTo(0,-4); ctx.lineTo(4,2); ctx.moveTo(0,-4); ctx.lineTo(-1,2.5); ctx.stroke();
      const spin=time*14;
      ctx.strokeStyle='#23292f'; ctx.lineWidth=1.6; // rotating barrel cluster
      for(let i=0;i<3;i++){ const off=Math.sin(spin+i*2.1)*1.6;
        ctx.beginPath(); ctx.moveTo(-bx*1,-5+off*.4); ctx.lineTo(bx*(13-rec),-5+by*6+off); ctx.stroke(); }
      ctx.strokeStyle='#3d454e'; ctx.lineWidth=1; // hoops
      for(const t2 of [.4,.75]){ ctx.beginPath();
        ctx.ellipse(lerp(0,bx*13,t2),lerp(-5,-5+by*6,t2),1.8,2.6,ang,0,7); ctx.stroke(); }
      ctx.fillStyle='#5c452e'; ctx.fillRect(-bx*4-2,-9,4,4.4); // hopper
      ctx.strokeStyle='#8a949c'; ctx.lineWidth=1.1; // crank spinning
      ctx.beginPath(); ctx.arc(-bx*3,-4,2.2,spin,spin+4.6); ctx.stroke();
    }
  } else {
    if(ti===0){ // MG nest
      ctx.fillStyle='#565c64'; ctx.beginPath(); // gun shield
      ctx.moveTo(bx*3-by*5,-3+by*1.5+bx*2.5); ctx.lineTo(bx*3+by*5,-3+by*1.5-bx*2.5);
      ctx.lineTo(bx*3+by*5,-10+by*1.5-bx*2.5); ctx.lineTo(bx*3-by*5,-10+by*1.5+bx*2.5); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=2.2;
      ctx.beginPath(); ctx.moveTo(bx*2,-6.5+by*1); ctx.lineTo(bx*(14-rec),-6.5+by*6.5); ctx.stroke();
      ctx.strokeStyle='#454b52'; ctx.lineWidth=3.4; // cooling jacket
      ctx.beginPath(); ctx.moveTo(bx*3,-6.5+by*1.5); ctx.lineTo(bx*8,-6.5+by*4); ctx.stroke();
      ctx.fillStyle='#3d454e'; ctx.fillRect(-by*4-1.6,-8+bx*2,3.2,4); // ammo box
      ctx.strokeStyle='#d8b23c'; ctx.lineWidth=.8; // belt
      ctx.beginPath(); ctx.moveTo(-by*4,-5.5+bx*2); ctx.quadraticCurveTo(bx*1-by*2,-3, bx*3,-6); ctx.stroke();
    } else if(ti===1){ // sniper platform
      ctx.fillStyle='#565c64'; ctx.beginPath(); ctx.ellipse(0,0,6.5,3.2,0,0,7); ctx.fill();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=1.8; // long barrel
      ctx.beginPath(); ctx.moveTo(-bx*4,-5-by*2); ctx.lineTo(bx*(19-rec),-5+by*9.5); ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=1; // muzzle brake
      ctx.beginPath(); ctx.moveTo(bx*17-by*2,-5+by*8.5-bx*1); ctx.lineTo(bx*17+by*2,-5+by*8.5+bx*1); ctx.stroke();
      ctx.fillStyle='#2e3238'; ctx.fillRect(-bx*2-2,-9.5,4,2.6); // scope
      ctx.save(); ctx.globalCompositeOperation='lighter'; // lens glint
      ctx.fillStyle='rgba(140,220,255,'+(.4+.3*Math.sin(time*3))+')';
      ctx.beginPath(); ctx.arc(-bx*2+1.4,-8.2,.9,0,7); ctx.fill(); ctx.restore();
      ctx.strokeStyle='#8a949c'; ctx.lineWidth=.9; // bipod
      ctx.beginPath(); ctx.moveTo(bx*8,-5+by*4); ctx.lineTo(bx*8-2.5,1); ctx.moveTo(bx*8,-5+by*4); ctx.lineTo(bx*8+2.5,1); ctx.stroke();
    } else if(ti===2){ // heavy artillery
      ctx.fillStyle='#4a5058'; ctx.beginPath(); ctx.ellipse(0,1,8,4,0,0,7); ctx.fill(); // mount
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
      ctx.strokeStyle='#3d454e'; ctx.lineWidth=2.2; // split trails
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-bx*8-by*3,3-by*4);
      ctx.moveTo(0,0); ctx.lineTo(-bx*8+by*3,3+by*4); ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=4.6; // long barrel elevated
      ctx.beginPath(); ctx.moveTo(-bx*(2+rec*.6),-3); ctx.lineTo(bx*16,-12+by*6); ctx.stroke();
      ctx.strokeStyle='#454b52'; ctx.lineWidth=2; // recoil cylinder
      ctx.beginPath(); ctx.moveTo(-bx*1,-1); ctx.lineTo(bx*9,-7+by*3.5); ctx.stroke();
      ctx.strokeStyle='#23292f'; ctx.lineWidth=1.2; // muzzle brake slots
      ctx.beginPath(); ctx.moveTo(bx*14-by*3,-11+by*5.5-bx*1.5); ctx.lineTo(bx*14+by*3,-11+by*5.5+bx*1.5);
      ctx.moveTo(bx*15.5-by*3,-11.7+by*5.8-bx*1.5); ctx.lineTo(bx*15.5+by*3,-11.7+by*5.8+bx*1.5); ctx.stroke();
    } else { // tesla coil
      ctx.strokeStyle='#7ec8e8'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(-6,2); ctx.lineTo(0,-10); ctx.lineTo(6,2); ctx.stroke();
      ctx.strokeStyle='#5a8ba0'; ctx.lineWidth=.9;
      for(let i=0;i<3;i++){ const y2=-2-i*2.6;
        ctx.beginPath(); ctx.moveTo(-4+i*1.1,y2); ctx.lineTo(4-i*1.1,y2); ctx.stroke(); }
      const pulse=(time*2)%1;
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(120,200,240,'+(0.8-pulse*.6)+')';
      ctx.beginPath(); ctx.arc(0,-12,3.5+pulse*3,0,7); ctx.fill();
      for(let i=0;i<2;i++){ const sa=time*7+i*3.1; // crawling sparks
        ctx.strokeStyle='rgba(160,230,255,.8)'; ctx.lineWidth=.9;
        ctx.beginPath(); ctx.moveTo(Math.cos(sa)*3,-12+Math.sin(sa)*2);
        ctx.lineTo(Math.cos(sa)*5+1,-12+Math.sin(sa)*3.4-1); ctx.stroke(); }
      ctx.restore();
      ctx.fillStyle='#a8e4ff'; ctx.beginPath(); ctx.arc(0,-12,3.2,0,7); ctx.fill();
    }
  }
  // muzzle flash (gunpowder & modern only; tesla excluded)
  if(flash>0&&era>0&&!(era===2&&ti===3)){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,220,120,'+flash*6+')';
    const fx=bx*16, fy=by*8-4;
    ctx.beginPath();
    for(let i=0;i<5;i++){ const a2=i/5*Math.PI*2;
      const rr=i%2?3:7; ctx.lineTo(fx+Math.cos(a2)*rr,fy+Math.sin(a2)*rr); }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}

/* ================= UNITS v3 (detailed silhouettes; supersedes earlier drawUnit) ================= */
function drawUnit(u,time){
  const G=curG(); if(!G)return;
  const [sx,sy]=w2s(u.x,u.y);
  if(sx<-60||sy<-80||sx>VW+60||sy>VH+60)return;
  const rz=tileRaise(G,u.x,u.y);
  ctx.save(); ctx.translate(sx,sy-rz*cam.zoom); ctx.scale(cam.zoom*1.26,cam.zoom*1.26);
  const col=u.color, dark=shade(col,.68), lite=shade(col,1.28);
  const ph=time*11+u.seed*9;
  const bob=u.moving?Math.sin(ph)*1.2:0;
  const leg=u.moving?Math.sin(ph)*3.4:0;
  const id=u.def.id, flash=u.flash||0;
  const fa=u.faceAng??-.5, dirX=Math.cos(fa)>=0?1:-1;
  ctx.fillStyle='rgba(10,15,20,.32)'; ctx.beginPath(); ctx.ellipse(0,1,7.5,3.1,0,0,7); ctx.fill();
  // melee strike lunge (body darts toward the target on each hit)
  if(u.atkT>0){ const lg=Math.sin((1-(u.atkT/.22))*Math.PI)*2.4;
    ctx.translate(Math.cos(fa)*lg*1.5, Math.sin(fa)*lg*.9); }
  const head=(hx,hy,helm)=>{
    const fur='#976231', furHi='#b27541', muzzle='#eed6b1', black='#1d1d1d';
    ctx.fillStyle=furHi;
    ctx.beginPath(); ctx.arc(hx-3.1,hy-3.2,1.55,0,7); ctx.arc(hx+3.1,hy-3.2,1.55,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.55;
    ctx.beginPath(); ctx.arc(hx-3.1,hy-3.2,1.55,0,7); ctx.arc(hx+3.1,hy-3.2,1.55,0,7); ctx.stroke();
    ctx.fillStyle='#c58a55';
    ctx.beginPath(); ctx.arc(hx-3.1,hy-3.2,.7,0,7); ctx.arc(hx+3.1,hy-3.2,.7,0,7); ctx.fill();
    ctx.fillStyle=fur; ctx.beginPath(); ctx.ellipse(hx,hy,4.15,3.75,0,0,7); ctx.fill();
    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.7; ctx.stroke();
    ctx.fillStyle=muzzle; ctx.beginPath(); ctx.ellipse(hx,hy+1.7,2.45,1.55,0,0,7); ctx.fill();
    ctx.strokeStyle='rgba(80,52,30,.7)'; ctx.lineWidth=.35; ctx.stroke();
    ctx.fillStyle=black;
    ctx.beginPath(); ctx.ellipse(hx-1.35,hy-.6,.42,.7,0,0,7); ctx.ellipse(hx+1.35,hy-.6,.42,.7,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx,hy+1,.7,.42,0,0,7); ctx.fill();
    if(helm===0){ // medieval kettle helmet with nose guard
      ctx.fillStyle='#c8ccd4'; ctx.beginPath();
      ctx.moveTo(hx-4.1,hy-1.6); ctx.quadraticCurveTo(hx-2.4,hy-5.4,hx,hy-5.8);
      ctx.quadraticCurveTo(hx+2.4,hy-5.4,hx+4.1,hy-1.6);
      ctx.quadraticCurveTo(hx,hy-.8,hx-4.1,hy-1.6); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.55; ctx.stroke();
      ctx.fillStyle='#8f98a4'; ctx.fillRect(hx-.45,hy-2.2,.9,3.1);
      ctx.fillStyle=col; ctx.fillRect(hx-2.6,hy-2.1,5.2,.8);
    }
    else if(helm===1){ // gunpowder tricorne
      ctx.fillStyle='#232a31'; ctx.beginPath();
      ctx.moveTo(hx-4.7,hy-2.4); ctx.quadraticCurveTo(hx-2,hy-5.2,hx,hy-3.8);
      ctx.quadraticCurveTo(hx+2,hy-5.2,hx+4.7,hy-2.4);
      ctx.quadraticCurveTo(hx+1.5,hy-1.2,hx,hy-1.6);
      ctx.quadraticCurveTo(hx-1.5,hy-1.2,hx-4.7,hy-2.4); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.55; ctx.stroke();
      ctx.strokeStyle='#e0b342'; ctx.lineWidth=.55; ctx.beginPath(); ctx.moveTo(hx-3.2,hy-2.5); ctx.lineTo(hx+3.2,hy-2.5); ctx.stroke();
    }
    else if(helm===2){ // modern helmet + goggles
      ctx.fillStyle='#46545d'; ctx.beginPath();
      ctx.moveTo(hx-3.9,hy-1.7); ctx.quadraticCurveTo(hx-3,hy-5.1,hx,hy-5.5);
      ctx.quadraticCurveTo(hx+3,hy-5.1,hx+3.9,hy-1.7);
      ctx.quadraticCurveTo(hx+2.4,hy-.5,hx,hy-.9);
      ctx.quadraticCurveTo(hx-2.4,hy-.5,hx-3.9,hy-1.7); ctx.fill();
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.55; ctx.stroke();
      ctx.fillStyle='rgba(145,164,185,.9)'; ctx.fillRect(hx-2.4,hy-3.1,4.8,.8);
      ctx.fillStyle=dark; ctx.fillRect(hx-3.2,hy-2,6.4,.8);
    }
    else if(helm===3){ ctx.fillStyle='#20262b'; ctx.beginPath(); // commando beret
      ctx.ellipse(hx-1,hy-3.2,3.3,1.35,-.18,0,7); ctx.fill();

    else if(helm===4){ ctx.fillStyle='#1e2126'; ctx.fillRect(hx-2.7,hy-6.7,5.4,4.9); // grenadier cap
      ctx.strokeStyle=PAL.outline; ctx.lineWidth=.55; ctx.strokeRect(hx-2.7,hy-6.7,5.4,4.9);
      ctx.fillStyle=col; ctx.fillRect(hx-1.8,hy-4.8,3.6,1.4);

  };
  const legs=()=>{
    ctx.strokeStyle='#2e2a24'; ctx.lineWidth=1.9;

  const torso=(unitId)=>{

    const heavy=unitId==='shield';
    ctx.fillStyle=heavy?'#bfc5cc':col; ctx.beginPath();
    ctx.moveTo(-4.4,-2.6+bob); ctx.lineTo(-4.1,-10.4+bob); ctx.quadraticCurveTo(0,-13.4+bob,4.1,-10.4+bob); ctx.lineTo(4.4,-2.6+bob);

    ctx.strokeStyle=PAL.outline; ctx.lineWidth=.8; ctx.stroke();
    ctx.fillStyle=dark; ctx.fillRect(-3.6,-6+bob,7.2,1.5); // belt
    ctx.fillStyle='#d8b23c'; ctx.fillRect(-.9,-6.4+bob,1.8,1.9); // buckle
    if(u.era===1){
      ctx.strokeStyle='#efe6d8'; ctx.lineWidth=.85;
      ctx.beginPath(); ctx.moveTo(-3.8,-11.6+bob); ctx.lineTo(3.4,-5+bob);
      ctx.moveTo(3.8,-11.6+bob); ctx.lineTo(-3.4,-5+bob); ctx.stroke();
      ctx.fillStyle='#d8b23c'; ctx.beginPath(); ctx.arc(0,-9.2+bob,.55,0,7); ctx.arc(0,-7.5+bob,.48,0,7); ctx.fill();

/* ---------- ambient birds ---------- */
function drawBirds(time){
  ctx.strokeStyle='rgba(20,28,36,.45)';
  for(let f=0;f<2;f++){
    const span=MAPW*TW*1.5;
    const wx=((time*26+f*820)%span)-span/2;
    const wy=((f*430+time*4)% (MAPW*TH*.8))+MAPW*TH*.1;
    const sx=(wx-cam.x)*cam.zoom+VW/2, sy=(wy-cam.y)*cam.zoom+VH/2-150*cam.zoom;
    if(sx<-80||sy<-80||sx>VW+80||sy>VH+80)continue;
    ctx.lineWidth=1.3*cam.zoom;
    for(let i=0;i<4;i++){
      const bx2=sx+(i*16-(i%2)*6)*cam.zoom, by2=sy+((i*9)%15)*cam.zoom;
      const wflap=Math.sin(time*8+i*1.7)*2.6;
      ctx.beginPath();
      ctx.moveTo(bx2-4.5*cam.zoom,by2-wflap*cam.zoom*.5);
      ctx.quadraticCurveTo(bx2,by2+2*cam.zoom,bx2+0.2,by2);
      ctx.quadraticCurveTo(bx2,by2+2*cam.zoom,bx2+4.5*cam.zoom,by2-wflap*cam.zoom*.5);
      ctx.stroke();
    }
  }
}

const BuildState={ G:null, sel:null };
const Battle={ active:false, mode:null, G:null, attackers:[], defenders:[], projs:[], zaps:[], parts:[],
  time:0, speed:1, paused:false, waves:null, tray:null, deployTotal:{}, result:null,

// building kind codes for serialization
const KIND_CODE={wall:0,tower:1,hq:2,trap:3,gate:4,palisade:5,moat:6,flag:7,bridgeB:8,block:9};
const CODE_KIND=['wall','tower','hq','trap','gate','palisade','moat','flag','bridgeB','block'];

function bDef(era,kind){ const E=ERAS[era];
  return kind==='wall'?E.wall:kind==='gate'?E.gate:kind==='palisade'?E.palisade:
         kind==='moat'?E.moat:kind==='flag'?E.flag:null; }

function makeG(fort){
  fort=fort||{};
  const era=clamp(fort.era|0,0,ERAS.length-1), tier=clamp(fort.tier|0,0,TIERS.length-1);
  const map=clamp(fort.map|0,0,STR.terrainNames.length-1), seed=clamp(fort.seed|0,1,999999);
  const fc=fort.cust||{};
  const cust={c1:cleanColor(fc.c1,'#4fa3e0'),c2:cleanColor(fc.c2,'#f0d060'),em:cleanText(fc.em,2,'🐻')};
  const G={ name:cleanText(fort.name,28,STR.myFort), era, tier, map,
    seed, sb:!!fort.sb, cust,
    terrain:genMap(map, seed),
    bgrid:new Array(MAPW*MAPW).fill(null), buildings:[], garrison:[] };
  for(const b of (Array.isArray(fort.b)?fort.b:[])) if(Array.isArray(b)){
    const nb=placeBuilding(G, b[0]|0, b[1]|0, b[2]|0, b[3]|0, true);
    if(nb&&nb.kind==='wall'){
      const lvl=clamp((b[4]|0)||1,1,BLOCK.lvlMax);
      if(lvl>1){ nb.lvl=lvl; nb.maxHp=nb.lvlHp*lvl; nb.hp=nb.maxHp; nb.cost=nb.cost*lvl; }
      if(b[1]|0) nb.flagTop=1;
    } else if(nb&&nb.kind==='block'){
      let layers=Array.isArray(b[4])?b[4].map(v=>clamp(v|0,0,BLOCK.mats.length-1)):null;
      if(!layers){ const lvl=clamp((b[4]|0)||1,1,BLOCK.maxH); layers=Array(lvl).fill(clamp(b[1]|0,0,5)); }
      layers=layers.slice(0,BLOCK.hqMaxH);
      const cut=layers.findIndex(mi=>MAT_TERMINAL[BLOCK.mats[mi].kind]); // nothing above a roof
      if(cut>=0) layers=layers.slice(0,cut+1);
      if(!layers.length) layers=[0];
      nb.layers=layers; nb.lvl=layers.length;
      nb.maxHp=BLOCK.hp*nb.lvl; nb.hp=nb.maxHp; nb.cost=BLOCK.cost*nb.lvl;
      if(Array.isArray(b[4])&&(b[1]|0)) nb.flagTop=1;
    } else if(nb&&nb.kind==='tower'){
      if(b[4]|0) nb.elev=clamp(b[4]|0,0,3);
      if(b[5]|0) nb.flagTop=1;
    }
    else if(nb&&nb.kind==='hq'&&Array.isArray(b[4])&&b[4].length===4){
      const cols=b[4].map(col=>(Array.isArray(col)&&col.length?col:[0])
        .map(v=>clamp(v|0,0,BLOCK.mats.length-1)));
      let H=Math.min(BLOCK.maxH,Math.max(1,Math.min(...cols.map(c2=>c2.length))));
      nb.baseCols=cols.map(c2=>c2.slice(0,H)
        .map(mi=>MAT_TERMINAL[BLOCK.mats[mi].kind]?0:mi));
      nb.elev=H;
    }
  }
  for(const g of (Array.isArray(fort.g)?fort.g:[])) if(Array.isArray(g)) placeGarrison(G, g[0]|0, g[1]|0, g[2]|0);
  return G;
}
function serializeFort(G){
  const b=[], g=[];
  for(const bd of G.buildings){
    const k=KIND_CODE[bd.kind]; if(k===undefined)continue;
    if(bd.kind==='wall') b.push([0, bd.flagTop?1:0, bd.x, bd.y, bd.lvl||1]);
    else if(bd.kind==='block') b.push([9, bd.flagTop?1:0, bd.x, bd.y, (bd.layers||[0]).slice()]);
    else if(bd.kind==='hq'&&bd.baseCols) b.push([2, 0, bd.x, bd.y, bd.baseCols.map(l=>l.slice())]);
    else if(bd.kind==='tower') b.push([1, bd.tIdx||0, bd.x, bd.y, bd.elev||0, bd.flagTop?1:0]);
    else b.push([k, bd.tIdx||0, bd.x, bd.y]);
  }
  for(const gd of G.garrison) g.push([gd.uIdx,gd.x,gd.y]);
  return {v:2,name:G.name,era:G.era,tier:G.tier,map:G.map,seed:G.seed,sb:G.sb?1:0,cust:G.cust,b:b,g:g};
}
function canPlace(G,x,y,size){
  for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++){
    const nx=x+dx,ny=y+dy;
    if(nx<0||ny<0||nx>=MAPW||ny>=MAPW) return false;
    if(!BUILDABLE[G.terrain[ny*MAPW+nx]]) return false;
    if(G.bgrid[ny*MAPW+nx]) return false;
    for(const gu of G.garrison) if((gu.x|0)===nx&&(gu.y|0)===ny) return false;
  }
  return true;
}
function canPlaceBridge(G,x,y){
  if(x<0||y<0||x>=MAPW||y>=MAPW) return false;
  const here=G.bgrid[y*MAPW+x];
  if(here&&here.kind!=='moat') return false;
  for(const gu of G.garrison) if((gu.x|0)===x&&(gu.y|0)===y) return false;
  if(here&&here.kind==='moat') return true;
  if(G.terrain[y*MAPW+x]===T.WATER) return true;
  for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
    const nx=x+dx,ny=y+dy; if(nx<0||ny<0||nx>=MAPW||ny>=MAPW)continue;
    const nb=G.bgrid[ny*MAPW+nx];
    if(G.terrain[ny*MAPW+nx]===T.WATER||(nb&&nb.kind==='moat')) return true;
  }
  return false;
}
function placeBuilding(G,k,tIdx,x,y,force){
  const era=G.era, E=ERAS[era];
  const kind=CODE_KIND[k]; if(!kind) return null;
  const size=(kind==='hq')?2:1;
  if(kind==='bridgeB'){
    if(force){ // fort-code reload: the moat was already consumed at build time
      if(x<0||y<0||x>=MAPW||y>=MAPW||G.bgrid[y*MAPW+x]) return null;
    } else {
      if(!canPlaceBridge(G,x,y)) return null;
      const here=G.bgrid[y*MAPW+x];
      if(here&&here.kind==='moat') removeAt(G,x,y); // the bridge spans the moat beneath it
    }
    const b={kind,era,x,y,hp:1,maxHp:1,cost:E.bridge.cost};
    G.bgrid[y*MAPW+x]=b; G.buildings.push(b); return b;
  }
  if(!canPlace(G,x,y,size)) return null;
  let b;
  if(kind==='wall') b={kind,era,x,y,hp:E.wall.hp,maxHp:E.wall.hp,cost:E.wall.cost,lvl:1,lvlHp:E.wall.hp};
  else if(kind==='block'){ const ci=clamp(tIdx|0,0,BLOCK.mats.length-1);
    b={kind,era,tIdx:ci,x,y,layers:[ci],hp:BLOCK.hp,maxHp:BLOCK.hp,cost:BLOCK.cost,lvl:1,lvlHp:BLOCK.hp}; }
  else if(kind==='gate') b={kind,era,x,y,hp:E.gate.hp,maxHp:E.gate.hp,cost:E.gate.cost};
  else if(kind==='palisade') b={kind,era,x,y,hp:E.palisade.hp,maxHp:E.palisade.hp,cost:E.palisade.cost};
  else if(kind==='moat') b={kind,era,x,y,hp:1,maxHp:1,cost:E.moat.cost};
  else if(kind==='flag') b={kind,era,x,y,hp:1,maxHp:1,cost:E.flag.cost};
  else if(kind==='tower'){ const td=E.towers[tIdx]; if(!td)return null;
    b={kind,era,tIdx,x,y,hp:td.hp,maxHp:td.hp,cost:td.cost,def:td,cd:0,angle:Math.PI/4,target:null,flash:0,fireT:0}; }
  else if(kind==='hq'){
    if(G.buildings.some(o=>o.kind==='hq')) return null;
    b={kind,era,x,y,hp:E.hq.hp,maxHp:E.hq.hp,cost:250}; }
  else if(kind==='trap') b={kind,era,x,y,hp:1,maxHp:1,cost:E.trap.cost,def:E.trap};
  else return null;
  for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++) G.bgrid[(y+dy)*MAPW+(x+dx)]=b;
  if(typeof performance!=='undefined'&&MODE==='build') b.born=performance.now()/1000;
  G.buildings.push(b);
  return b;
}
function placeGarrison(G,uIdx,x,y){
  const def=ERAS[G.era].units[uIdx]; if(!def) return null;
  x=Math.floor(x); y=Math.floor(y);
  if(!canPlace(G,x,y,1)) return null;
  if(WALK_COST[G.terrain[y*MAPW+x]]===0) return null;
  const gu={uIdx,def,x:x,y:y,cost:def.cost};
  G.garrison.push(gu); return gu;
}
function removeAt(G,x,y){
  const b=G.bgrid[y*MAPW+x];
  if(b){ const size=b.kind==='hq'?2:1;
    for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++) G.bgrid[(b.y+dy)*MAPW+(b.x+dx)]=null;
    G.buildings.splice(G.buildings.indexOf(b),1); return b; }
  const gi=G.garrison.findIndex(g=>(g.x|0)===x&&(g.y|0)===y);
  if(gi>=0) return {garrison:true, ...G.garrison.splice(gi,1)[0]};
  return null;
}
function fortSpent(G){
  let bg=0, gg=0;
  for(const b of G.buildings) bg+=b.cost;
  for(const g of G.garrison) gg+=g.cost;
  return {build:bg, gar:gg};
}
function attackBudgetFor(fort){
  if(fort.sb){ // value-based for sandbox forts
    let v=0; const G=makeG(fort); const sp=fortSpent(G);
    v=sp.build+sp.gar;
    return Math.max(1200, Math.round(v*0.62/10)*10);
  }
  return TIERS[fort.tier|0].attack;
}

function makeWaves(era, budget, custom){
  const E=ERAS[era], comp={};
  if(custom){ for(const k in custom) if(custom[k]>0) comp[k]=custom[k]; }
  else { let money=budget, guard=0;
    while(money>50&&guard++<900){ const i=(Math.random()*E.units.length)|0;
      const u=E.units[i]; if(u.cost<=money){ comp[i]=(comp[i]||0)+1; money-=u.cost; } } }
  const total=Object.entries(comp).flatMap(([i,n])=>Array(n).fill(+i));
  for(let i=total.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [total[i],total[j]]=[total[j],total[i]]; }
  const w1=total.slice(0,Math.ceil(total.length*.4));
  const w2=total.slice(w1.length,w1.length+Math.ceil(total.length*.3));
  const w3=total.slice(w1.length+w2.length);
  const waves=[[2,w1],[32,w2],[62,w3]].filter(w=>w[1].length);
  return {era, waves, spawned:0, totalCount:total.length, nextWave:0};
}
function edgeSpawnPoint(G, side, off){
  for(let d=0;d<MAPW;d++){
    let x,y;
    if(side===0){x=off;y=d;} else if(side===1){x=off;y=MAPW-1-d;}
    else if(side===2){x=d;y=off;} else {x=MAPW-1-d;y=off;}
    const b=G.bgrid[y*MAPW+x];
    if(WALK_COST[G.terrain[y*MAPW+x]]>0 && (!b||PASSIVE[b.kind])) return [x+0.5,y+0.5];
  }
  return [0.5,0.5];
}
function makeDeployMask(G){
  const m=new Uint8Array(MAPW*MAPW);
  for(let y=0;y<MAPW;y++)for(let x=0;x<MAPW;x++){
    if(WALK_COST[G.terrain[y*MAPW+x]]===0) continue;
    const ob=G.bgrid[y*MAPW+x];
    if(ob&&(!PASSIVE[ob.kind]||ob.kind==='trap'||ob.kind==='moat')) continue;
    let ok=true;
    for(const b of G.buildings){ if(PASSIVE[b.kind])continue;
      const s=b.kind==='hq'?2:1;
      const ddx=Math.max(b.x-x, x-(b.x+s-1), 0), ddy=Math.max(b.y-y, y-(b.y+s-1), 0);
      if(Math.max(ddx,ddy)<3){ ok=false; break; } }
    if(ok) m[y*MAPW+x]=1;
  }
  return m;
}

function buildingCenter(b){ const s=b.kind==='hq'?2:1; return [b.x+s/2, b.y+s/2]; }
function pickTarget(u,G){
  const pref=u.def.pref;
  let best=null, bestD=1e9;
  const consider=(b)=>{ if(PASSIVE[b.kind]||b.dead)return;
    const [cx,cy]=buildingCenter(b);
    const d=dist(u.x,u.y,cx,cy);
    if(d<bestD){bestD=d;best=b;} };
  if(pref==='wall'){
    for(const b of G.buildings) if(WALLISH[b.kind]) consider(b);
    if(!best) for(const b of G.buildings) consider(b);
  } else if(pref==='def'){
    for(const b of G.buildings) if(b.kind==='tower') consider(b);
    if(!best) for(const b of G.buildings) consider(b);
  } else {
    for(const b of G.buildings) if(!WALLISH[b.kind]) consider(b);
    if(!best) for(const b of G.buildings) consider(b);
  }
  return best;
}
function nearestDefender(u,rad){

    const dd=dist(u.x,u.y,d.x,d.y); if(dd<bd){bd=dd;best=d;} }

}
function nearestAttacker(x,y,minR,maxR){
  let best=null,bd=maxR;
  for(const a of Battle.attackers){ if(a.hp<=0)continue;
    const dd=dist(x,y,a.x,a.y); if(dd<bd&&dd>=(minR||0)){bd=dd;best=a;} }
  return best;
}
/* Utility-based target picker — scores foes by proximity, counter-matchup,
   woundedness (focus fire) and melee threat, with hysteresis on the current
   target so units commit instead of flip-flopping. Used by both sides. */
function bestEnemyUnit(u, arr, rad, current){
  let best=null, bestS=-1e9;
  for(const e of arr){ if(e.hp<=0) continue;
    const d=dist(u.x,u.y,e.x,e.y); if(d>rad) continue;
    const my=typeMult(u.def.atk, e.def.arm);     // how hard I hit them
    const their=typeMult(e.def.atk, u.def.arm);   // how hard they hit me
    let s = 4.0/(0.8+d);                          // proximity — a closer foe is decisively better
    s += (my-1)*1.0;                              // 상성: favour targets I counter
    s -= (their-1)*0.8;                           // 상성: avoid targets that counter me
    s += (1-(e.hp/(e.maxHp||e.hp)))*1.3;          // 집중사격: strongly prefer the wounded
    if(e.def.rng<1.6 && d<2.2) s += 0.7;          // 위협: a melee foe pressing me
    if(e===current) s += 0.3;                     // light hysteresis: block jitter, still switch on real gains
    if(s>bestS){ bestS=s; best=e; }
  }
  return best;
}
function applySeparation(dt){
  // gentle crowd separation so armies hold formation instead of stacking
  const all=[];
  for(const u of Battle.attackers) if(u.hp>0) all.push(u);
  for(const d of Battle.defenders) if(d.hp>0) all.push(d);
  if(all.length<2)return;
  const cell=new Map(), key=(x,y)=>x+y*MAPW;
  for(const u of all){ const k=key(u.x|0,u.y|0);
    let arr=cell.get(k); if(!arr){arr=[];cell.set(k,arr);} arr.push(u); }
  const G=Battle.G;
  for(const u of all){
    const big=['tank','apc','howitzer','knight','cuirassier','dragoon','ram','siegegun','ballista','catapult','trebuchet','fieldcannon','mortarUnit','bombard','gatlingGun'].includes(u.def.id);
    const R=big?0.64:0.34;
    let px=0,py=0;
    const cx=u.x|0, cy=u.y|0;
    for(let oy=-1;oy<=1;oy++)for(let ox=-1;ox<=1;ox++){
      const arr=cell.get(key(cx+ox,cy+oy)); if(!arr)continue;
      for(const v of arr){ if(v===u)continue;
        const dx=u.x-v.x, dy=u.y-v.y; const dd2=Math.hypot(dx,dy);
        if(dd2>=R)continue;
        if(dd2<1e-4){ const ja=(u.seed||Math.random())*6.28; px+=Math.cos(ja); py+=Math.sin(ja); }
        else { const f=(R-dd2)/R; px+=dx/dd2*f; py+=dy/dd2*f; } } }
    if(px||py){
      const nx=clamp(u.x+px*dt*1.7,0.2,MAPW-0.2), ny=clamp(u.y+py*dt*1.7,0.2,MAPW-0.2);
      const nb=G.bgrid[(ny|0)*MAPW+(nx|0)];
      if((!nb||PASSIVE[nb.kind])&&WALK_COST[G.terrain[(ny|0)*MAPW+(nx|0)]]>0){ u.x=nx; u.y=ny; } }
  }
}

function chunkCols(b,matIdx){

function stackHeightAt(G,x,y){
  if(x<0||y<0||x>=MAPW||y>=MAPW)return 0;
  const o=G.bgrid[y*MAPW+x]; if(!o)return 0;
  if(o.kind==='wall'||o.kind==='block')return o.lvl||1;
  if(o.kind==='gate'||o.kind==='tower'||o.kind==='hq')return 2;
  return 0;
}
function collapseCheck(G,sx,sy){
  // gravity ripple: tall stacks that lost their support topple storey by storey
  const q=[[sx,sy]]; let guard=0;
  while(q.length&&guard++<220){
    const [cx,cy]=q.shift();
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=cx+dx, ny=cy+dy;
      const w=(nx<0||ny<0||nx>=MAPW||ny>=MAPW)?null:G.bgrid[ny*MAPW+nx];
      if(!w||(w.kind!=='wall'&&w.kind!=='block')||(w.lvl||1)<2)continue;
      let sup=false;
      for(const [ex,ey] of [[1,0],[-1,0],[0,1],[0,-1]])
        if(stackHeightAt(G,nx+ex,ny+ey)>=(w.lvl-1)){sup=true;break;}
      if(!sup){
        const lost=(w.lvl||1)-1;
        const cc=chunkCols(w);
        spawnChunks(nx+.5,ny+.5, 2+lost*2, .35+w.lvl*.38, cc[0], cc[1]);
        w.lvl=1; if(w.layers) w.layers.length=1;
        w.hp=Math.min(w.hp,w.lvlHp||w.maxHp);
        addShake(6); AudioSys.play('boom');
        q.push([nx,ny]); // the domino travels on
      }
    }
  }
}
function damageBuilding(b,amt){
  if(b.dead||b.kind==='moat'||b.kind==='flag')return;
  raiseAlarm(b.x+0.5,b.y+0.5); // garrison responds to attacks anywhere
  if(amt>=35) floatText(b.x+(b.kind==='hq'?1:.5),b.y+(b.kind==='hq'?1:.5),'-'+Math.round(amt),'#ffd070');
  b.hp-=amt; b.hitT=.18;
  // stacked storeys crumble one at a time as the structure weakens
  if((b.kind==='wall'||b.kind==='block')&&(b.lvl||1)>1){
    while(b.lvl>1&&b.hp<=(b.lvlHp||b.maxHp)*(b.lvl-1)){
      const cc=chunkCols(b); // color of the storey about to break off
      b.lvl--;
      if(b.layers) b.layers.pop();
      spawnChunks(b.x+.5,b.y+.5, 3, .4+b.lvl*.38, cc[0], cc[1]);
      addShake(4);
    }
  }
  if(b.hp<=0){ b.hp=0; b.dead=true;
    const size=b.kind==='hq'?2:1;
    for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++) Battle.G.bgrid[(b.y+dy)*MAPW+(b.x+dx)]=null;
    Battle.G.buildings.splice(Battle.G.buildings.indexOf(b),1);
    if(!PASSIVE[b.kind]){ Battle.destrDone+=b.maxHp; Battle.pathVersion++; }
    if(b.kind==='hq'){ Battle.hqDown=true; toast(STR.hqDown); addShake(13); }
    // permanent rubble on the battlefield
    stampDecal('rubble', b.x+size/2, b.y+size/2, 1, PAL.eraBody[b.era]);
    if(b.kind==='hq'||b.kind==='tower') stampDecal('scorch', b.x+size/2, b.y+size/2, b.kind==='hq'?2.2:1.4);
    boom(b.x+size/2,b.y+size/2, b.kind==='hq'?26:10, '#c8a060', b.kind==='hq'?2.2:1);
    // masonry chunks fly; elevated towers rain debris from height
    if(b.kind==='wall'||b.kind==='block'||b.kind==='tower'||b.kind==='gate'||(b.kind==='hq'&&b.elev)){
      const cc=chunkCols(b);
      const hgt=(b.kind==='tower'||b.kind==='hq')?(.5+(b.elev||0)*.42):(.3+((b.lvl||1)-1)*.38);
      spawnChunks(b.x+size/2, b.y+size/2, 3+((b.lvl||1)+(b.elev||0))*2, hgt, cc[0], cc[1]);
    }
    AudioSys.play('boom');
    // support check: neighbors above the breach come tumbling down
    if(b.kind==='wall'||b.kind==='block'||b.kind==='gate'||b.kind==='tower') collapseCheck(Battle.G,b.x,b.y);
  }
}

function groundFxAt(x,y,rad){
  // battlefield transformation: craters, scorch, burning forests
  const ti=(y|0)*MAPW+(x|0);
  if(ti<0||ti>=MAPW*MAPW)return;
  const G=Battle.G;
  if(G.terrain[ti]===T.WATER){ // water plume instead of crater
    for(let i=0;i<6;i++) Battle.parts.push({x:x+(Math.random()-.5)*.4,y:y+(Math.random()-.5)*.4,
      h:.1,vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*.7,vh:1.6+Math.random(),
      color:'#9ec8de',life:.5,maxLife:.5,size:2.2});

  stampDecal('crater',x,y,Math.max(.8,rad*.8));
  stampDecal('scorch',x,y,Math.max(1,rad*1.1));
  // burn forests within blast radius -> terrain becomes dirt (faster to cross!)

  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    const tx=(x|0)+dx, ty=(y|0)+dy;
    if(tx<0||ty<0||tx>=MAPW||ty>=MAPW)continue;
    if(G.terrain[ty*MAPW+tx]===T.FOREST&&dist(x,y,tx+0.5,ty+0.5)<=rad+0.3){

        vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.3,vh:.9,
        kind:'fire',color:'rgba(240,140,50,.9)',life:.5,maxLife:.5,size:3});
    }
  }
}
function knockback(u,x,y,rad,d){

function splashAt(x,y,rad,dmg,vsAttackers,srcDef){

        damageUnit(dfn, dmg*(1-d/rad*.5), x, y, true, srcDef&&srcDef.atk); knockback(dfn,x,y,rad,d); } }
    const seen=new Set();
    const r=Math.ceil(rad);

    }
  }
  boom(x,y,Math.min(16,rad*5),'#e8b23c',rad*.7);
  addShake(Math.min(9,2+rad*2.4));
  if(rad>=0.7) groundFxAt(x,y,rad);
}
function boom(x,y,n,color,scale){
  scale=scale||1;
  if(Battle.parts.length>900) n=Math.min(n,3);
  // debris
  for(let i=0;i<n;i++){
    Battle.parts.push({x,y,h:.2+Math.random()*.4,
      vx:(Math.random()-.5)*3.4,vy:(Math.random()-.5)*1.8,vh:Math.random()*.9,
      life:.4+Math.random()*.5,maxLife:.9,color:Math.random()<.4?'#5a5f66':color,size:2+Math.random()*2.5});
  }
  // flash + ring + smoke
  Battle.parts.push({x,y,h:.3,vx:0,vy:0,vh:0,kind:'flash',color:'rgba(255,225,150,1)',
    life:.22,maxLife:.22,size:9*scale});
  Battle.parts.push({x,y,h:0,vx:0,vy:0,vh:0,kind:'ring',color:'#f0d090',
    life:.4,maxLife:.4,size:34*scale});
  for(let i=0;i<Math.min(4,1+n/4|0);i++)
    Battle.parts.push({x:x+(Math.random()-.5)*.5,y:y+(Math.random()-.5)*.5,h:.3,
      vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.3,vh:.8+Math.random()*.5,
      kind:'smoke',color:'#4a4f57',life:.8+Math.random()*.6,maxLife:1.4,size:4+Math.random()*3});
}
function fireProjectile(fromX,fromY,fromH,target,def,vsAttackers,type){
  const isLob=(type==='lob'||type==='oil');
  const [tx,ty]=target.kind?buildingCenter(target):[target.x,target.y];
  if(type==='zap'){
    let victims=[target];
    if(def.chain){ let last=target;
      for(let i=1;i<def.chain;i++){ let nb=null,bd=2.4;
        for(const a of Battle.attackers){ if(a.hp<=0||victims.includes(a))continue;
          const dd=dist(last.x,last.y,a.x,a.y); if(dd<bd){bd=dd;nb=a;} }
        if(!nb)break; victims.push(nb); last=nb; } }
    let px=fromX, py=fromY;
    for(const v of victims){ damageUnit(v, def.dmg, undefined,undefined,false, def.atk);
      Battle.zaps.push({x1:px,y1:py,x2:v.x,y2:v.y,life:.4}); px=v.x; py=v.y; }
    AudioSys.play('zap'); return;
  }
  const speed=def.projSpeed||(isLob?7:(type==='arrow'?11:type==='bolt'?12:type==='rocket'?9:14));
  const isBall=(type==='ball'||type==='bigball');
  let aimX=tx, aimY=ty;
  if(isLob||isBall){ // true ballistics: lead the target, then dispersion
    if(!target.kind){
      const ft=dist(fromX,fromY,tx,ty)/speed;
      aimX=tx+(target.vx||0)*ft; aimY=ty+(target.vy||0)*ft;
    }
    const g2=()=>(Math.random()+Math.random()+Math.random())/1.5-1;
    const sc=((isBall?0.035:0.055)*dist(fromX,fromY,aimX,aimY)+0.12)*(def.spread||1);
    aimX=clamp(aimX+g2()*sc,0.2,MAPW-0.2); aimY=clamp(aimY+g2()*sc,0.2,MAPW-0.2);
  }
  const d=dist(fromX,fromY,aimX,aimY);
  const p={type, x:fromX, y:fromY, h:fromH||.12, def, vsAttackers,
    target, tx:aimX, ty:aimY, speed, spl:def.spl||0, dmg:def.dmg,
    lob:isLob, ball:isBall, guided:!isLob&&!isBall, bounced:false,
    t:0, dur:d/speed, sx:fromX, sy:fromY, vx:0, vy:0, dh:0, screenAngle:0};
  const windSeed=((thash((fromX*10)|0,(fromY*10)|0)%1000)/1000-.5);
  if(isLob||type==='arrow'||type==='bolt'||isBall){
    p.wind=[windSeed*Math.min(.42,d*.026), (windSeed*.45+0.08)*Math.min(.24,d*.018)];
    p.peak=isLob?(.35+p.dur*.24):isBall?Math.min(1.35,.18+d*.12):0;
  }
  if(type==='arrow'||type==='bolt'){ // arcing flight
    p.arrowArc=true; p.arc=Math.min(2.2, .18+d*(type==='bolt'?0.075:0.17)); p.peak=p.arc; p.dh=0;
  } else if(isBall){
    p.ballArc=true; p.guided=false;
  } else if(type==='rocket'){
    p.guided=true; p.wind=[windSeed*.05, -0.02];
  }
  Battle.projs.push(p); AudioSys.play('shoot');
}
function resolveBallImpact(p){
  const G=Battle.G;
  let victim=null;
  if(p.vsAttackers){ victim=nearestAttacker(p.tx,p.ty,0,0.6); }
  else {
    const b=G.bgrid[(p.ty|0)*MAPW+(p.tx|0)];
    if(b&&!PASSIVE[b.kind]) victim=b;
    if(!victim){ let bd=0.6; for(const dfn of Battle.defenders){ if(dfn.hp<=0)continue;
      const dd=dist(p.tx,p.ty,dfn.x,dfn.y); if(dd<bd){bd=dd;victim=dfn;} } }
  }
  const dmg=p.bounced?p.dmg*.5:p.dmg;
  if(victim&&victim.kind){ // structure stops the ball
    damageBuilding(victim, dmg*(WALLISH[victim.kind]?(p.def.mw||1):(p.def.mb||1)));
    if(p.spl>0) splashAt(p.tx,p.ty,p.spl,dmg*.6,p.vsAttackers,p.def);
    boom(p.tx,p.ty,5,'#c8b090',.6); AudioSys.play('hit');
    return true;
  }
  if(victim){ // plows through infantry
    damageUnit(victim,dmg,p.sx,p.sy,true, p.def&&p.def.atk);
    Battle.parts.push({x:p.tx,y:p.ty,h:.15,vx:0,vy:0,vh:0,kind:'flash',color:'rgba(255,230,160,.9)',life:.12,maxLife:.12,size:4});
    if(p.spl>0) splashAt(p.tx,p.ty,Math.max(p.spl,.5),dmg*.5,p.vsAttackers,p.def);
    AudioSys.play('hit');
  } else { // ground strike: dust + scar
    stampDecal('scar',p.tx,p.ty,1);
    for(let i=0;i<4;i++) Battle.parts.push({x:p.tx,y:p.ty,h:.1,
      vx:(Math.random()-.5)*1.4,vy:(Math.random()-.5)*.8,vh:.9+Math.random()*.6,
      kind:'smoke',color:'#8a7a5c',life:.45,maxLife:.45,size:2.6});
  }
  if(!p.bounced){ // ricochet: skip onward once
    p.bounced=true;
    const dx=p.tx-p.sx, dy=p.ty-p.sy, dd=Math.hypot(dx,dy)||1;
    const ext=1.4+Math.random()*.8;
    p.sx=p.tx; p.sy=p.ty;
    p.tx=clamp(p.tx+dx/dd*ext,0.2,MAPW-0.2); p.ty=clamp(p.ty+dy/dd*ext,0.2,MAPW-0.2);
    p.dur=ext/p.speed; p.t=0; p.speed*=.85;
    return false;
  }
  return true;
}

/* ===================== SIM UPDATE ===================== */
function simStep(dt){
  const G=Battle.G;
  Battle.time+=dt;
  Battle.repathBudget=14;
  // --- waves spawn (defend) ---
  if(Battle.mode==='defend'&&Battle.waves){
    const wv=Battle.waves;
    if(wv.nextWave<wv.waves.length && Battle.time>=wv.waves[wv.nextWave][0]){
      const group=wv.waves[wv.nextWave][1];
      const sides=[(Math.random()*4)|0,(Math.random()*4)|0];
      group.forEach((uIdx,i)=>{
        const side=sides[i%sides.length];
        const off=2+((Math.random()*(MAPW-4))|0);
        const [x,y]=edgeSpawnPoint(G,side,off);
        spawnAttacker(wv.era,uIdx,x+(Math.random()-.5)*.6,y+(Math.random()-.5)*.6);
        wv.spawned++;
      });
      wv.nextWave++; toast(STR.wave+' '+wv.nextWave+'/'+wv.waves.length); AudioSys.play('deploy');
      updateHud();
    }
  }
  // --- attackers ---
  for(const u of Battle.attackers){
    if(u.hp<=0)continue;
    u.slow=Math.max(0,u.slow-dt);
    u.suppression=Math.max(0,(u.suppression||0)-dt);
    u.flash=Math.max(0,u.flash-dt*3); u.hitT=Math.max(0,(u.hitT||0)-dt);
    u.atkT=Math.max(0,(u.atkT||0)-dt);
    u.repathCd=Math.max(0,u.repathCd-dt);
    const lab=Battle.mode==='lab';
    u.aggroCd=Math.max(0,(u.aggroCd||0)-dt);
    if(u.interim&&u.interim.unit&&u.interim.unit.hp<=0) u.interim=null;
    // 헛된 추격 포기: locked foe has fled past our engage leash → let go, return to objective
    const chaseLeash=lab?1e9:Math.max(u.def.rng,0.6)+3.2;
    if(u.interim&&u.interim.unit&&dist(u.x,u.y,u.interim.unit.x,u.interim.unit.y)>chaseLeash)
      u.interim=null;
    if(u.aggroCd<=0&&(!u.def.suicide||lab)){
      u.aggroCd=.22+Math.random()*.14; // throttled aggro scan (perf: O(n²) -> O(n²/13))
      if(lab||u.def.pref!=='wall'){
        const scanR=lab?1e9:Math.max(3.2,(u.def.rng||0)+1.0);
        const cur=u.interim&&u.interim.unit&&u.interim.unit.hp>0?u.interim.unit:null;
        const foe=bestEnemyUnit(u, Battle.defenders, scanR, cur); // smart pick (상성·집중사격·위협)
        if(foe) u.interim={unit:foe};
        else if(!(cur&&dist(u.x,u.y,cur.x,cur.y)<=chaseLeash)) u.interim=u.interim&&u.interim.unit?null:u.interim;
      }
    }
    if(u.def.heal){
      const ally=nearestWoundedAlly(u,Battle.attackers,u.def.healRng||2.5);
      if(ally){
        u.moving=false; u.vx=0; u.vy=0; u.faceAng=Math.atan2((ally.y-u.y),(ally.x-u.x)*1.6);
        u.cd-=dt;
        if(u.cd<=0){ u.cd=Math.max(u.def.rate,.5); healUnit(ally,u.def.heal); AudioSys.play('click'); }
        continue;
      }
    }
    if(!u.target||u.target.dead){ u.target=pickTarget(u,G); u.path=null; u.interim=u.interim&&u.interim.unit?u.interim:null; }
    if(!u.target&&!(u.interim&&u.interim.unit&&u.interim.unit.hp>0)){ u.moving=false; continue; }
    if(u.pv!==Battle.pathVersion&&u.repathCd<=0&&Battle.repathBudget>0){ u.path=null; }
    const tgt=u.interim&&u.interim.unit&&u.interim.unit.hp>0?u.interim.unit:
              u.interim&&u.interim.b&&!u.interim.b.dead?u.interim.b:u.target;
    const isB=!!tgt.kind;
    const [tx,ty]=isB?buildingCenter(tgt):[tgt.x,tgt.y];
    // --- KITING: ranged units backpedal from a closing melee threat, firing as they go ---
    if(u.def.proj && u.def.rng>1.6 && !u.def.suicide){
      const threat=nearestDefender(u, u.def.rng);
      if(threat && threat.def.rng<1.6 && dist(u.x,u.y,threat.x,threat.y) < Math.min(u.def.rng-0.3, 3.0)){
        const thd=dist(u.x,u.y,threat.x,threat.y);
        u.faceAng=Math.atan2((threat.y-u.y),(threat.x-u.x)*1.6);
        u.cd-=dt; // keep firing at the chaser
        if(u.cd<=0 && thd<=u.def.rng){ u.cd=u.def.rate; if(u.suppression>0)u.cd*=SUPPRESS.reload; u.flash=.12;
          fireProjectile(u.x,u.y,.14,threat,{dmg:u.def.dmg,spl:u.def.spl,mw:u.def.mw,mb:u.def.mb,projSpeed:u.def.projSpeed,spread:u.def.spread,atk:u.def.atk},false,u.def.proj); }
        const ka=Math.atan2(u.y-threat.y,u.x-threat.x); // step directly away
        const hb=G.bgrid[(u.y|0)*MAPW+(u.x|0)];
        let ktc=(hb&&hb.kind==='bridgeB')?1:(WALK_COST[G.terrain[(u.y|0)*MAPW+(u.x|0)]]||1);
        if(hb&&hb.kind==='moat') ktc+=2.2;
        const ksp=u.def.spd/ktc*(u.slow>0?.5:1)*(u.suppression>0?SUPPRESS.speed:1)*KITE_SPD;
        const knx=clamp(u.x+Math.cos(ka)*ksp*dt,0.2,MAPW-0.2), kny=clamp(u.y+Math.sin(ka)*ksp*dt,0.2,MAPW-0.2);
        const kb=G.bgrid[(kny|0)*MAPW+(knx|0)];
        if(WALK_COST[G.terrain[(kny|0)*MAPW+(knx|0)]]>0 && (!kb||PASSIVE[kb.kind])){
          u.vx=Math.cos(ka)*ksp; u.vy=Math.sin(ka)*ksp; u.x=knx; u.y=kny; u.moving=true;
        } else { u.moving=false; u.vx=0; u.vy=0; } // cornered: hold ground and keep firing
        continue;
      }
    }
    const reach=(isB?(tgt.kind==='hq'?1.15:0.75):0.45)+Math.max(u.def.rng,0.55);
    const dd=dist(u.x,u.y,tx,ty);
    if(dd<=reach){
      u.moving=false; u.vx=0; u.vy=0;
      u.faceAng=Math.atan2((ty-u.y),(tx-u.x)*1.6);
      if(u.def.suicide){
        splashAt(u.x+(tx-u.x)*.4, u.y+(ty-u.y)*.4, u.def.spl, u.def.dmg, false, u.def);
        u.hp=0; continue;
      }
      u.cd-=dt;
      if(u.cd<=0){ u.cd=u.def.rate;
        if(u.suppression>0) u.cd*=SUPPRESS.reload;
        if(u.def.proj&&u.def.rng>1.2){ u.flash=.12;
          fireProjectile(u.x,u.y,.14,tgt,{dmg:u.def.dmg, spl:u.def.spl, mw:u.def.mw, mb:u.def.mb, projSpeed:u.def.projSpeed, spread:u.def.spread, atk:u.def.atk}, false, u.def.proj); }
        else {
          u.atkT=.22; // melee swing
          if(Battle.parts.length<880) Battle.parts.push({kind:'slash',x:tx,y:ty,h:.5,
            ang:Math.atan2(ty-u.y,(tx-u.x)*1.6),vx:0,vy:0,vh:0,life:.17,maxLife:.17,size:7});
          if(isB) damageBuilding(tgt, u.def.dmg*(WALLISH[tgt.kind]?u.def.mw:u.def.mb));
          else damageUnit(tgt, u.def.dmg, undefined,undefined,false, u.def.atk);
          if(u.def.spl>0) splashAt(tx,ty,u.def.spl,u.def.dmg*.5,false,u.def);
          AudioSys.play('hit');
        }
      }
      continue;
    }
    if(isB&&!u.path){
      if(Battle.repathBudget>0){
        Battle.repathBudget--;
        u.path=findPath(u.x,u.y,tx|0,ty|0,G)||[];
        u.pathI=0; u.pv=Battle.pathVersion; u.repathCd=.5+Math.random()*.4;
      }
    }
    let mx,my;
    if(isB&&u.path&&u.path.length){
      while(u.pathI<u.path.length-1 && dist(u.x,u.y,u.path[u.pathI][0],u.path[u.pathI][1])<0.3) u.pathI++;
      const wp=u.path[Math.min(u.pathI,u.path.length-1)];
      const wb=G.bgrid[(wp[1]|0)*MAPW+(wp[0]|0)];
      if(wb&&wb!==tgt&&!PASSIVE[wb.kind]&&dist(u.x,u.y,wp[0],wp[1])<0.95+u.def.rng*0.5){
        u.interim={b:wb}; continue;
      }
      mx=wp[0]; my=wp[1];
    } else { mx=tx; my=ty; }
    const ang=Math.atan2(my-u.y,mx-u.x);
    const hereB=G.bgrid[(u.y|0)*MAPW+(u.x|0)];
    let tc=(hereB&&hereB.kind==='bridgeB')?1:(WALK_COST[G.terrain[(u.y|0)*MAPW+(u.x|0)]]||1);
    if(hereB&&hereB.kind==='moat') tc+=2.2;
    let spd=u.def.spd/tc*(u.slow>0?.5:1)*(u.suppression>0?SUPPRESS.speed:1);
    const nx=clamp(u.x+Math.cos(ang)*spd*dt,0.2,MAPW-0.2);
    const ny=clamp(u.y+Math.sin(ang)*spd*dt,0.2,MAPW-0.2);
    if(WALK_COST[G.terrain[(ny|0)*MAPW+(nx|0)]]===0){ u.moving=false; u.vx=0; u.vy=0; continue; }
    const nb=G.bgrid[(ny|0)*MAPW+(nx|0)];
    if(nb&&!PASSIVE[nb.kind]&&nb!==tgt&&((nx|0)!==(u.x|0)||(ny|0)!==(u.y|0))){
      u.interim={b:nb}; u.moving=false; u.vx=0; u.vy=0; continue; }
    u.vx=Math.cos(ang)*spd; u.vy=Math.sin(ang)*spd;
    u.x=nx; u.y=ny;
    u.moving=true; u.faceAng=Math.atan2(Math.sin(ang),Math.cos(ang)*1.6);
    if(Battle.parts.length<800&&Math.random()<dt*(['tank','apc','howitzer','knight','cuirassier','dragoon'].includes(u.def.id)?4:1.6)){
      Battle.parts.push({x:u.x-Math.cos(ang)*.2,y:u.y-Math.sin(ang)*.2,h:.05,
        vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.2,vh:.5,
        kind:'smoke',color:'#9a8a6a',life:.4,maxLife:.4,size:1.8}); }
    const tb=G.bgrid[(u.y|0)*MAPW+(u.x|0)];
    if(tb&&tb.kind==='trap'){
      const td=tb.def;
      splashAt(u.x,u.y,td.spl||0.8,td.dmg,true,null);
      if(td.slow) for(const a of Battle.attackers){ if(dist(a.x,a.y,u.x,u.y)<1.2) a.slow=td.slow; }
      const size=1;
      Battle.G.bgrid[tb.y*MAPW+tb.x]=null;
      Battle.G.buildings.splice(Battle.G.buildings.indexOf(tb),1);
    }
  }
  Battle.attackers=Battle.attackers.filter(u=>u.hp>0);
  // --- defenders: alarm-driven garrison AI (reinforce, navigate, engage) ---
  for(const d of Battle.defenders){
    if(d.hp<=0)continue;
    d.slow=0; d.suppression=Math.max(0,(d.suppression||0)-dt); d.flash=Math.max(0,(d.flash||0)-dt*3); d.hitT=Math.max(0,(d.hitT||0)-dt);
    d.atkT=Math.max(0,(d.atkT||0)-dt);
    d.repathCd=Math.max(0,(d.repathCd||0)-dt);
    const engageR=Battle.mode==='lab'?1e9:(alarmActive()?15:Math.max(d.def.rng+2.5,4.5));
    d.rtCd=Math.max(0,(d.rtCd||0)-dt);
    if(d.def.heal){
      const ally=nearestWoundedAlly(d,Battle.defenders,d.def.healRng||2.5);
      if(ally){
        d.moving=false; d.vx=0; d.vy=0; d.faceAng=Math.atan2((ally.y-d.y),(ally.x-d.x)*1.6);
        d.cd-=dt;
        if(d.cd<=0){ d.cd=Math.max(d.def.rate,.5); healUnit(ally,d.def.heal); AudioSys.play('click'); }
        continue;
      }
    }
    if(d.rtCd<=0){
      d.rtCd=.22+Math.random()*.14;
      const cur=d.target&&d.target.hp>0?d.target:null;
      const foe=bestEnemyUnit(d, Battle.attackers, engageR, cur); // smart pick + focus fire
      if(foe){ if(foe!==d.target){ d.target=foe; d.path=null; } } // repath only on real switch
      else if(!cur) d.target=null;
    }
    if(d.target&&d.target.hp<=0)d.target=null;
    if(d.target) raiseAlarm(d.target.x,d.target.y);
    let destX=null,destY=null;
    const rng=Math.max(d.def.rng,0.55);
    // --- KITING (defenders): ranged skirmishers fall back from melee, staying near their post ---
    if(d.def.proj && d.def.rng>1.6){
      const leash=(Battle.mode==='lab')?1e9:4.0;
      const threat=nearestAttacker(d.x,d.y,0,d.def.rng);
      if(threat && threat.def.rng<1.6 && dist(d.x,d.y,threat.x,threat.y) < Math.min(d.def.rng-0.3, 3.0)
         && dist(d.x,d.y,d.hx,d.hy) < leash){
        const thd=dist(d.x,d.y,threat.x,threat.y);
        d.faceAng=Math.atan2((threat.y-d.y),(threat.x-d.x)*1.6);
        d.cd-=dt;
        if(d.cd<=0 && thd<=d.def.rng){ d.cd=Math.max(d.def.rate,.3); if(d.suppression>0)d.cd*=SUPPRESS.reload; d.flash=.12;
          fireProjectile(d.x,d.y,.14,threat,{dmg:d.def.dmg,spl:d.def.spl,projSpeed:d.def.projSpeed,spread:d.def.spread,atk:d.def.atk},true,d.def.proj); }
        const ka=Math.atan2(d.y-threat.y,d.x-threat.x);
        const hb=Battle.G.bgrid[(d.y|0)*MAPW+(d.x|0)];
        let ktc=(hb&&hb.kind==='bridgeB')?1:(WALK_COST[Battle.G.terrain[(d.y|0)*MAPW+(d.x|0)]]||1);
        if(hb&&hb.kind==='moat') ktc+=2.2;
        const ksp=d.def.spd/ktc*(d.suppression>0?SUPPRESS.speed:1)*KITE_SPD;
        const knx=clamp(d.x+Math.cos(ka)*ksp*dt,0.2,MAPW-0.2), kny=clamp(d.y+Math.sin(ka)*ksp*dt,0.2,MAPW-0.2);
        const kb=Battle.G.bgrid[(kny|0)*MAPW+(knx|0)];
        if(WALK_COST[Battle.G.terrain[(kny|0)*MAPW+(knx|0)]]>0 && (!kb||PASSIVE[kb.kind]||kb.kind==='gate')){
          d.vx=Math.cos(ka)*ksp; d.vy=Math.sin(ka)*ksp; d.x=knx; d.y=kny; d.moving=true; d.path=null;
        } else { d.moving=false; d.vx=0; d.vy=0; }
        continue;
      }
    }
    if(d.target){
      const dd=dist(d.x,d.y,d.target.x,d.target.y);
      if(dd<=rng+0.3){
        d.moving=false; d.cd-=dt; d.path=null; d.vx=0; d.vy=0;
        d.faceAng=Math.atan2((d.target.y-d.y),(d.target.x-d.x)*1.6);
        if(d.cd<=0){ d.cd=Math.max(d.def.rate,.3);
          if(d.suppression>0) d.cd*=SUPPRESS.reload;
          if(d.def.proj&&d.def.rng>1.2){ d.flash=.12;
            fireProjectile(d.x,d.y,.14,d.target,{dmg:d.def.dmg,spl:d.def.spl,projSpeed:d.def.projSpeed,spread:d.def.spread,atk:d.def.atk},true,d.def.proj); }
          else { d.atkT=.22;
            if(Battle.parts.length<880) Battle.parts.push({kind:'slash',x:d.target.x,y:d.target.y,h:.5,
              ang:Math.atan2(d.target.y-d.y,(d.target.x-d.x)*1.6),vx:0,vy:0,vh:0,life:.17,maxLife:.17,size:7});
            damageUnit(d.target,d.def.dmg, undefined,undefined,false, d.def.atk); AudioSys.play('hit'); } }
        continue;
      }
      destX=d.target.x; destY=d.target.y;
    } else if(alarmActive()&&dist(d.x,d.y,Battle.alarm.x,Battle.alarm.y)>3){
      destX=Battle.alarm.x; destY=Battle.alarm.y; // rush to the breach
    } else {
      if(dist(d.x,d.y,d.hx,d.hy)>0.4){ destX=d.hx; destY=d.hy; }
      else { d.moving=false; d.vx=0; d.vy=0; continue; }
    }
    // navigate through own fortress (gates, gaps, bridges — never through walls)
    if(!d.path||(d.repathCd<=0&&(d.pgx!==(destX|0)||d.pgy!==(destY|0)))){
      if(Battle.repathBudget>0){ Battle.repathBudget--;
        d.path=findPath(d.x,d.y,destX|0,destY|0,Battle.G,true);
        d.pathI=0; d.pgx=destX|0; d.pgy=destY|0; d.repathCd=.7+Math.random()*.5; }
    }
    let mx=destX,my=destY;
    if(d.path&&d.path.length){
      while(d.pathI<d.path.length-1&&dist(d.x,d.y,d.path[d.pathI][0],d.path[d.pathI][1])<0.3) d.pathI++;
      const wp=d.path[Math.min(d.pathI,d.path.length-1)];
      mx=wp[0]; my=wp[1];
    } else if(dist(d.x,d.y,mx,my)>2.5){
      d.moving=false; d.vx=0; d.vy=0; continue; // sealed in — hold position
    }
    const a=Math.atan2(my-d.y,mx-d.x);
    const hereB=Battle.G.bgrid[(d.y|0)*MAPW+(d.x|0)];
    let tc=(hereB&&hereB.kind==='bridgeB')?1:(WALK_COST[Battle.G.terrain[(d.y|0)*MAPW+(d.x|0)]]||1);
    if(hereB&&hereB.kind==='moat') tc+=2.2;
    const spd=d.def.spd/tc*(d.suppression>0?SUPPRESS.speed:1);
    const nx=clamp(d.x+Math.cos(a)*spd*dt,0.2,MAPW-0.2);
    const ny=clamp(d.y+Math.sin(a)*spd*dt,0.2,MAPW-0.2);
    const nb=Battle.G.bgrid[(ny|0)*MAPW+(nx|0)];
    if(WALK_COST[Battle.G.terrain[(ny|0)*MAPW+(nx|0)]]===0){ d.moving=false; d.vx=0; d.vy=0; continue; }
    if(nb&&!PASSIVE[nb.kind]&&nb.kind!=='gate'&&((nx|0)!==(d.x|0)||(ny|0)!==(d.y|0))){ d.moving=false; d.path=null; continue; }
    d.vx=Math.cos(a)*spd; d.vy=Math.sin(a)*spd;
    d.x=nx; d.y=ny; d.moving=true;
    d.faceAng=Math.atan2(Math.sin(a),Math.cos(a)*1.6);
  }
  Battle.defenders=Battle.defenders.filter(d=>d.hp>0);
  applySeparation(dt);
  // --- towers + burning buildings ---
  for(const b of Battle.G.buildings){
    if(b.hp<b.maxHp*.45&&!PASSIVE[b.kind]&&Battle.parts.length<850){
      b.fireT=(b.fireT||0)-dt;
      if(b.fireT<=0){ b.fireT=.25+Math.random()*.3;
        const [cx,cy]=buildingCenter(b);
        Battle.parts.push({x:cx+(Math.random()-.5)*.6,y:cy+(Math.random()-.5)*.6,h:.5,
          vx:0,vy:0,vh:1.2,kind:'fire',color:Math.random()<.5?'rgba(240,140,50,.9)':'rgba(255,200,80,.9)',
          life:.4,maxLife:.4,size:3+Math.random()*2});
        Battle.parts.push({x:cx,y:cy,h:.9,vx:(Math.random()-.5)*.3,vy:0,vh:.9,
          kind:'smoke',color:'#3c4249',life:1.1,maxLife:1.1,size:3.5+Math.random()*2});
      }
    }
    b.hitT=Math.max(0,(b.hitT||0)-dt);
    if(b.kind!=='tower'||b.dead)continue;
    b.flash=Math.max(0,b.flash-dt*3);
    const td=b.def;
    const [cx,cy]=buildingCenter(b);
    const onHill=Battle.G.terrain[b.y*MAPW+b.x]===T.HILL;
    const rng=td.rng*(onHill?1.15:1)*(1+0.05*(b.elev||0)); // ramparts extend sight
    const curD=b.target?dist(cx,cy,b.target.x,b.target.y):1e9;
    if(!b.target||b.target.hp<=0||curD>rng||curD<(td.minRng||0))
      b.target=nearestAttacker(cx,cy,td.minRng||0,rng);
    if(b.target){
      b.angle=Math.atan2((b.target.y-cy),(b.target.x-cx)*1.6);
      b.cd-=dt;
      if(b.cd<=0){ b.cd=td.rate; b.flash=.15;
        fireProjectile(cx,cy,.22,b.target,td,true,td.proj); }
    } else b.cd=Math.max(b.cd-dt,0);
  }
  // --- projectiles ---
  for(const p of Battle.projs){
    if(p.hit)continue;
    if(p.lob){
      p.t+=dt; const k=Math.min(p.t/p.dur,1);
      const ox=p.x, oy=p.y, oh=p.h||0;
      const q=projectileSample(p,k);
      p.x=q.x; p.y=q.y; p.h=q.h;
      p.vx=(p.x-ox)/Math.max(dt,1e-4); p.vy=(p.y-oy)/Math.max(dt,1e-4); p.dh=(p.h-oh)/Math.max(dt,1e-4);
      const [opx,opy]=wpx(ox,oy), [npx,npy]=wpx(p.x,p.y);
      p.screenAngle=Math.atan2((npy-p.h*10)-(opy-oh*10), npx-opx);
      if(k>=1){ p.hit=true;
        splashAt(p.tx,p.ty,Math.max(p.spl,0.5),p.dmg,p.vsAttackers,p.def);
        AudioSys.play('boom'); }
    } else if(p.arrowArc){
      const t=p.target;
      const alive=t&&(t.kind?!t.dead:t.hp>0);
      if(alive){ const [tx2,ty2]=t.kind?buildingCenter(t):[t.x,t.y]; p.tx=tx2; p.ty=ty2; }
      p.t+=dt; const k=Math.min(p.t/p.dur,1);
      const ox=p.x, oy=p.y, oh=p.h||0;
      const q=projectileSample(p,k);
      p.x=q.x; p.y=q.y; p.h=q.h;
      p.dh=(p.h-oh)/Math.max(dt,1e-4);
      p.vx=(p.x-ox)/Math.max(dt,1e-4); p.vy=(p.y-oy)/Math.max(dt,1e-4);
      const [opx,opy]=wpx(ox,oy), [npx,npy]=wpx(p.x,p.y);
      p.screenAngle=Math.atan2((npy-p.h*10)-(opy-oh*10), npx-opx);
      if(k>=1){ p.hit=true;
        if(alive){
          if(t.kind) damageBuilding(t, p.dmg*(WALLISH[t.kind]?(p.def.mw||1):(p.def.mb||1)));
          else damageUnit(t,p.dmg, undefined,undefined,false, p.def&&p.def.atk);
          AudioSys.play('hit'); } }
    } else {
      if(p.ballArc){
        p.t+=dt; const k=Math.min(p.t/Math.max(p.dur,1e-4),1);
        const ox=p.x, oy=p.y, oh=p.h||0;
        const q=projectileSample(p,k);
        p.x=q.x; p.y=q.y; p.h=q.h;
        p.vx=(p.x-ox)/Math.max(dt,1e-4); p.vy=(p.y-oy)/Math.max(dt,1e-4); p.dh=(p.h-oh)/Math.max(dt,1e-4);
        const [opx,opy]=wpx(ox,oy), [npx,npy]=wpx(p.x,p.y);
        p.screenAngle=Math.atan2((npy-p.h*10)-(opy-oh*10), npx-opx);
        if(k>=1){
          if(resolveBallImpact(p)) p.hit=true;
          else { p.peak=Math.max(.18,(p.peak||.4)*.55); p.wind=[(Math.random()-.5)*.08,(Math.random()-.5)*.05]; }
        }
        continue;
      }
      const t=p.target;
      const alive=t&&(t.kind?!t.dead:t.hp>0);
      if(p.guided&&alive){ const [tx,ty]=t.kind?buildingCenter(t):[t.x,t.y]; p.tx=tx; p.ty=ty; }
      const d=dist(p.x,p.y,p.tx,p.ty);
      const step=p.speed*dt;
      if(d<=step+0.15){
        if(p.ball){ if(resolveBallImpact(p)) p.hit=true; }
        else { p.hit=true;
        if(p.spl>0){ splashAt(p.tx,p.ty,p.spl,p.dmg,p.vsAttackers,p.def); AudioSys.play('boom'); }
        else if(alive){
          if(t.kind) damageBuilding(t, p.dmg*(WALLISH[t.kind]?(p.def.mw||1):(p.def.mb||1)));
          else damageUnit(t,p.dmg, undefined,undefined,false, p.def&&p.def.atk);
          Battle.parts.push({x:p.tx,y:p.ty,h:.2,vx:0,vy:0,vh:0,kind:'flash',
            color:'rgba(255,230,160,.9)',life:.12,maxLife:.12,size:4});
          AudioSys.play('hit'); } }
      } else {
        const ox=p.x, oy=p.y, oh=p.h||0;
        p.vx=(p.tx-p.x)/d; p.vy=(p.ty-p.y)/d;
        p.x+=p.vx*step; p.y+=p.vy*step;
        if(p.type==='rocket'){
          const wob=Math.sin((p.t||0)*9+p.sx*3)*0.018;
          p.x+=-p.vy*wob; p.y+=p.vx*wob;
          p.h=Math.max(0.12,(p.h||.12)+Math.sin((p.t||0)*6)*dt*.08);
          if(Battle.parts.length<860&&Math.random()<dt*18) Battle.parts.push({x:p.x-p.vx*.18,y:p.y-p.vy*.18,h:p.h,
            vx:-p.vx*.2+(Math.random()-.5)*.3,vy:-p.vy*.2+(Math.random()-.5)*.2,vh:.4,
            kind:'smoke',color:'#6a625a',life:.35,maxLife:.35,size:1.8});
        } else p.h=Math.max(0.05,p.h-dt*0.08);
        p.t=(p.t||0)+dt;
        const [opx,opy]=wpx(ox,oy), [npx,npy]=wpx(p.x,p.y);
        p.screenAngle=Math.atan2((npy-p.h*10)-(opy-oh*10), npx-opx);
      }
    }
  }
  for(const p of Battle.projs){ if(!p.hit&&p.type==='bigball'&&Battle.parts.length<840&&Math.random()<.5)
    Battle.parts.push({x:p.x,y:p.y,h:p.h,vx:0,vy:0,vh:.12,kind:'smoke',color:'#565b62',life:.45,maxLife:.45,size:3.2}); }
  Battle.projs=Battle.projs.filter(p=>!p.hit);
  for(const z of Battle.zaps) z.life-=dt;
  Battle.zaps=Battle.zaps.filter(z=>z.life>0);
  for(const p of Battle.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.h=(p.h||0)+(p.vh||0)*dt;
    if(p.kind===undefined){ p.vh-=4*dt; if(p.h<0){p.h=0;p.vh*=-0.3;} }
    else if(p.kind==='ragdoll'){ p.vh-=7.5*dt;
      if(p.h<=0&&p.vh<0){
        if(p.bounces<1){ p.bounces++; p.h=0; p.vh*=-0.45; p.vx*=.55; p.vy*=.55; p.spin*=.5; }
        else if(!p.rest){ p.rest=true; p.h=0; p.vx=0; p.vy=0; p.vh=0;
          stampDecal('corpse',p.x,p.y,1,p.color); p.life=Math.min(p.life,.3); } } }
    else if(p.kind==='chunk'){ p.vh-=9*dt;
      if(p.h<=0&&p.vh<0){
        if(p.bounces<1){ p.bounces++; p.h=0; p.vh*=-0.35; p.vx*=.5; p.vy*=.5; p.spin*=.5; }
        else if(!p.rest){ p.rest=true; p.h=0; p.vx=0; p.vy=0; p.vh=0;
          stampDecal('scar',p.x,p.y,1); p.life=Math.min(p.life,.5); } } } }
  Battle.parts=Battle.parts.filter(p=>p.life>0);
  checkEnd();
}
function trayRemaining(){ let n=0; for(const k in Battle.tray) n+=Battle.tray[k]; return n; }
function destructionRatio(){
  if(!Battle.active)return 0;
  let done=Battle.destrDone;
  for(const b of Battle.G.buildings) if(!PASSIVE[b.kind]) done+=Math.max(0,b.maxHp-b.hp);
  return clamp(done/Math.max(1,Battle.destrTotal),0,1);
}
function checkEnd(){
  if(Battle.ended)return;
  if(Battle.mode==='lab'){
    const bTowers=Battle.G.buildings.reduce((n,b)=>n+(b.kind==='tower'?1:0),0);
    if(Battle.time>1&&(Battle.attackers.length===0||(Battle.defenders.length===0&&bTowers===0))){
      const aAlive=Battle.attackers.length, bAlive=Battle.defenders.length;
      Battle.ended=true;
      Battle.result={lab:true, win:aAlive>0, draw:aAlive===0&&bAlive===0&&bTowers===0,
        aAlive, bAlive, bTowers, time:Math.round(Battle.time), destr:0, stars:0, hq:false};
      AudioSys.play(aAlive>0?'win':'lose');
      setTimeout(()=>showResult(),900);
    }
    return;
  }
  const destr=destructionRatio();
  if(Battle.mode==='defend'){
    if(Battle.hqDown){ endBattle(false); return; }
    const wv=Battle.waves;
    if(wv.nextWave>=wv.waves.length&&Battle.attackers.length===0&&Battle.time>4) endBattle(true);
  } else {
    if(destr>=0.9999){ endBattle(true); return; }
    if(Battle.timeLimit&&Battle.time>=Battle.timeLimit){ endBattle(Battle.hqDown||destr>=0.5); return; }
    if(trayRemaining()===0&&Battle.attackers.length===0&&Battle.time>3){
      endBattle(Battle.hqDown||destr>=0.5); }
  }
}
function endBattle(win){
  Battle.ended=true;
  const destr=Math.round(destructionRatio()*100);
  let stars=0;
  if(Battle.mode==='attack'){ stars=(destr>=50?1:0)+(Battle.hqDown?1:0)+(destr>=95?1:0); }
  Battle.result={win, destr, stars, hq:Battle.hqDown, time:Math.round(Battle.time)};
  // 🏅 honor rewards fund the block-module shop
  if(Battle.mode==='attack'){ if(win) addHonor(30+stars*15,'공략 성공'); else if(destr>=50) addHonor(15,'분전'); }
  else if(Battle.mode==='defend'&&win) addHonor(40,'방어 성공');
  AudioSys.play(win?'win':'lose');
  setTimeout(()=>showResult(),900);
}

const UI=$('#ui'), HUD=$('#hud'), PALETTE=$('#palette'), TIP=$('#tip');
let MODE='menu';
function clearUI(){ UI.innerHTML=''; TIP.classList.add('hidden'); }
function screen(inner){ clearUI();
  const s=el('div','screen'), p=el('div','panel'); p.innerHTML=inner;
  s.appendChild(p); UI.appendChild(s); return p; }
function setMode(m){ MODE=m;
  HUD.classList.toggle('hidden', m==='menu');
  PALETTE.classList.toggle('hidden', m==='menu');
  Input.onTap=null; Input.onDragPaint=null; Input.onHover=null;
  if(m==='menu'){ Battle.active=false; clearUI(); showMenu(); }
  else if(m==='battle'){
    clearUI(); battleHudUI();
    if(Battle.mode==='attack'){
      buildDeployOverlay();
      Input.onTap=(sx,sy)=>{
        if(Battle.ended)return;
        const [wx,wy]=s2w(sx,sy); const x=wx|0,y=wy|0;
        if(x<0||y<0||x>=MAPW||y>=MAPW)return;
        const k=Battle.traySel;
        if(Battle.deployMask[y*MAPW+x]&&Battle.tray[k]>0){
          const n=Math.min(Battle.squadSize,Battle.tray[k]);
          for(let i=0;i<n;i++){
            spawnAttacker(Battle.armyEra,+k,
              clamp(wx+(Math.random()-.5)*(n>1?1.6:0),0.3,MAPW-0.3),
              clamp(wy+(Math.random()-.5)*(n>1?1.6:0),0.3,MAPW-0.3));
            Battle.deployTotal[k]=(Battle.deployTotal[k]||0)+1;
            Battle.tray[k]--;
          }
          AudioSys.play('deploy'); updateHud();
        } else if(!Battle.deployMask[y*MAPW+x]) toast(STR.deployHint);
      };
    } else PALETTE.innerHTML='';
  }
}

function statLine(d,isUnit){
  const s=[];
  if(isUnit){ s.push(STR.statHp+' '+d.hp, STR.statDmg+' '+(d.suicide?d.dmg+'💥':d.dmg),
    STR.statSpeed+' '+d.spd); if(d.rng>1.2)s.push(STR.statRange+' '+d.rng);
    if(d.atk)s.push('공격:'+(TYPE_KO[d.atk]||d.atk)); if(d.arm&&d.arm!=='light')s.push('방어:'+(ARM_KO[d.arm]||d.arm));
    if(d.heal)s.push('회복 '+d.heal);
    if(d.spl)s.push(STR.statSplash+' '+d.spl);
    if(d.mw>1.5)s.push(STR.vsWall+' ×'+d.mw); if(d.mb>1.2)s.push(STR.vsBld+' ×'+d.mb);
    if(d.pref==='wall')s.push(STR.prefWall); if(d.pref==='def')s.push(STR.prefDef); }
  else { s.push(STR.statHp+' '+d.hp, STR.statDmg+' '+d.dmg, STR.statRate+' '+d.rate+'s', STR.statRange+' '+d.rng);
    if(d.spl)s.push(STR.statSplash+' '+d.spl); if(d.minRng)s.push('최소사거리 '+d.minRng); if(d.chain)s.push('연쇄 '+d.chain); }
  return s.join(' · ');
}

function startBuild(fort){
  BuildState.G=makeG(fort);
  BuildState.sel={t:'wall'};
  buildTerrainCache(BuildState.G);
  Battle.active=false; Battle.G=null;
  cam.x=0; cam.y=MAPW*TH/2; cam.zoom=Math.min(1.2,Math.max(.55,VH/(MAPW*TH*1.25)));
  clearUI(); MODE='build';
  HUD.classList.remove('hidden'); PALETTE.classList.remove('hidden');
  buildHudUI(); buildPaletteUI();
  Input.onTap=(sx,sy)=>buildTap(sx,sy);
  Input.onDragPaint=(sx,sy,first)=>{
    if(!BuildState.sel)return;
    const t=BuildState.sel.t;
    if(first||t==='wall'||t==='palisade'||t==='moat'||t==='bridgeB'||t==='flag'||t==='block'||t==='sell') buildTap(sx,sy,true);
  };
  Input.onHover=(sx,sy)=>{ BuildState.hover=s2w(sx,sy); };
}
function budgetLeft(){
  const G=BuildState.G;
  if(G.sb) return {gold:Infinity, gar:Infinity};
  const sp=fortSpent(G), t=TIERS[G.tier];
  return {gold:t.build-sp.build, gar:t.garrison-sp.gar};
}
function buildTap(sx,sy,fromDrag){
  const G=BuildState.G, sel=BuildState.sel; if(!G||!sel)return;
  const [wx,wy]=s2w(sx,sy); const x=wx|0, y=wy|0;
  if(x<0||y<0||x>=MAPW||y>=MAPW)return;
  const bl=budgetLeft();
  if(sel.t==='sell'){ const r=removeAt(G,x,y);
    if(r){ AudioSys.play('sell'); updateHud(); } return; }
  if(sel.t==='garrison'){
    const def=ERAS[G.era].units[sel.i];
    if(def.cost>bl.gar){ if(!fromDrag)toast('주둔 예산 부족!'); return; }
    if(placeGarrison(G,sel.i,x,y)){ AudioSys.play('build'); updateHud(); }
    return; }
  const kindMap={wall:0,tower:1,hq:2,trap:3,gate:4,palisade:5,moat:6,flag:7,bridgeB:8,block:9};
  const k=kindMap[sel.t]; if(k===undefined)return;
  let cost;
  const E=ERAS[G.era];
  if(k===0)cost=E.wall.cost; else if(k===1)cost=E.towers[sel.i].cost;
  else if(k===2)cost=250; else if(k===3)cost=E.trap.cost;
  else if(k===4)cost=E.gate.cost; else if(k===5)cost=E.palisade.cost;
  else if(k===6)cost=E.moat.cost; else if(k===8)cost=E.bridge.cost;
  else if(k===9)cost=BLOCK.cost; else cost=E.flag.cost;
  // one action per tile per press-drag gesture (prevents click/drag double-stacking)
  const gk=y*MAPW+x;
  if(Input.gestureTiles.has(gk)) return;
  Input.gestureTiles.add(gk);
  const under=G.bgrid[y*MAPW+x];
  // locked modules must be unlocked with honor first (click the palette button to buy)
  if(k===9&&!matUnlocked(sel.i||0)){ if(!fromDrag)toast(STR.needHonor); return; }
  // ── vertical stacking: walls to 3 storeys, blocks mix ANY materials freely ──
  if(k===0&&under&&under.kind==='wall'){
    if((under.lvl||1)>=BLOCK.lvlMax){ if(!fromDrag)toast(STR.maxHeight); return; }
    if(cost>bl.gold){ if(!fromDrag)toast('금이 부족합니다!'); return; }
    under.lvl=(under.lvl||1)+1; under.maxHp+=under.lvlHp; under.hp+=under.lvlHp; under.cost+=cost;
    if(typeof performance!=='undefined') under.born=performance.now()/1000;
    AudioSys.play('build'); updateHud(); return;
  }
  if(k===9&&under&&under.kind==='block'){
    const layers=under.layers||(under.layers=[under.tIdx||0]);
    const topM=BLOCK.mats[layers[layers.length-1]];
    if(MAT_TERMINAL[topM.kind]){ if(!fromDrag)toast(STR.roofCap); return; }
    if(layers.length>=maxHFor(G,x,y)){ if(!fromDrag)toast(STR.maxHeightHq); return; }
    if(cost>bl.gold){ if(!fromDrag)toast('금이 부족합니다!'); return; }
    layers.push(sel.i||0); under.lvl=layers.length;
    under.maxHp+=under.lvlHp; under.hp+=under.lvlHp; under.cost+=cost;
    if(typeof performance!=='undefined') under.born=performance.now()/1000;
    AudioSys.play('build'); updateHud(); return;
  }
  // flag planted on top of a wall/block becomes a rooftop banner
  if(k===7&&under&&(under.kind==='wall'||under.kind==='block'||under.kind==='tower')&&!under.flagTop){
    if(cost>bl.gold){ if(!fromDrag)toast('금이 부족합니다!'); return; }
    under.flagTop=1; under.cost+=cost;
    AudioSys.play('build'); updateHud(); return;
  }
  // ── the HQ can be enthroned on a flat 2×2 block pedestal (masterpiece base) ──
  if(k===2){
    const tiles=[[x,y],[x+1,y],[x,y+1],[x+1,y+1]];
    const cols=tiles.map(([tx2,ty2])=>{
      if(tx2>=MAPW||ty2>=MAPW)return null;
      const o=G.bgrid[ty2*MAPW+tx2];
      return (o&&o.kind==='block')?o:null; });
    if(cols.every(o=>o)&&new Set(cols).size===4){
      const H=cols[0].layers.length;
      const flat=cols.every(o=>o.layers.length===H
        &&!MAT_TERMINAL[(BLOCK.mats[o.layers[o.layers.length-1]]||BLOCK.mats[0]).kind]);
      if(flat&&H>=1&&H<=BLOCK.maxH){
        if(cost>bl.gold){ if(!fromDrag)toast('금이 부족합니다!'); return; }
        const baseCols=cols.map(o=>o.layers.slice());
        let baseCost=0;
        for(const o of cols){ baseCost+=o.cost; removeAt(G,o.x,o.y); }
        const hq=placeBuilding(G,2,0,x,y);
        if(hq){ hq.elev=H; hq.baseCols=baseCols; hq.cost+=baseCost;
          AudioSys.play('build'); updateHud(); }
        else { tiles.forEach(([tx2,ty2],i2)=>{ // restore pedestal on failure
            const nb2=placeBuilding(G,9,baseCols[i2][0],tx2,ty2);
            if(nb2){ nb2.layers=baseCols[i2].slice(); nb2.lvl=nb2.layers.length;
              nb2.maxHp=BLOCK.hp*nb2.lvl; nb2.hp=nb2.maxHp; nb2.cost=BLOCK.cost*nb2.lvl; } }); }
        return;
      }
    }
  }
  // towers & gates can be built directly onto existing walls (wall refunded, height kept)
  let refund=0, swap=null;
  if(k===1||k===4){
    if(under&&(under.kind==='wall'||under.kind==='palisade')){ refund=under.cost; swap=under; } }
  if(cost>bl.gold+refund){ if(!fromDrag)toast('금이 부족합니다!'); return; }
  if(swap) removeAt(G,x,y);
  const placed=placeBuilding(G,k,sel.i||0,x,y);
  if(placed){
    if(k===1&&swap&&swap.kind==='wall') placed.elev=swap.lvl||1; // tower stands on the rampart
    AudioSys.play('build'); updateHud();
  } else if(swap){ placeBuilding(G,KIND_CODE[swap.kind],0,x,y); } // restore on failure
}

/* ===================== ARMY COMPOSER (shared) ===================== */
function armyComposer(container, era, budget, onChange){
  const comp={}; let left=budget;
  const free=budget>=FREE_BUDGET;
  const render=()=>{ container.innerHTML='';
    const info=el('div','sub',`${STR.armyBudget}: <b style="color:var(--gold)">${free?'∞':'💰'+left}</b>${free?'':' / '+budget}`);
    container.appendChild(info);
    const list=el('div','cardlist');
    ERAS[era].units.forEach((u,i)=>{
      const c=el('div','card');
      const cv=unitIcon(era,i); cv.style.float='left'; cv.style.marginRight='6px';
      c.appendChild(cv);
      c.insertAdjacentHTML('beforeend',`<b>${u.n} <span style="color:var(--gold)">💰${u.cost}</span></b>
        <span>${statLine(u,true)}</span>
        <div class="row" style="margin-top:6px">
          <button class="btn small" data-a="-1" data-i="${i}">−</button>
          <b style="min-width:26px;text-align:center">${comp[i]||0}</b>
          <button class="btn small" data-a="1" data-i="${i}">＋</button>
          <button class="btn small" data-a="5" data-i="${i}">+5</button>
          <button class="btn small" data-a="25" data-i="${i}">+25</button></div>`);
      list.appendChild(c); });
    container.appendChild(list);
    container.querySelectorAll('button[data-i]').forEach(b=>b.onclick=(e)=>{
      e.stopPropagation();
      const i=+b.dataset.i, a=+b.dataset.a, u=ERAS[era].units[i];
      if(a>0){ for(let k=0;k<a;k++){ if(u.cost<=left){ comp[i]=(comp[i]||0)+1; left-=u.cost; } } }
      else if((comp[i]||0)>0){ comp[i]--; left+=u.cost; }
      render(); onChange&&onChange(comp,left); });
  };
  render();
  return ()=>comp;
}

function enterLab(keepUnits){

function labPlace(sx,sy){
  const [wx,wy]=s2w(sx,sy);
  if(wx<0.3||wy<0.3||wx>MAPW-0.3||wy>MAPW-0.3)return;
  const gk=(wy|0)*MAPW+(wx|0);
  if(Input.gestureTiles.has(gk)) return; // once per tile per gesture
  Input.gestureTiles.add(gk);
  if(Lab.sel==='erase'){
    if(removeAt(Lab.G,wx|0,wy|0)){ AudioSys.play('sell'); updateHud(); return; }
    let bi=-1,bd=.8;
    Lab.units.forEach((s,i)=>{ const dd=dist(s.x,s.y,wx,wy); if(dd<bd){bd=dd;bi=i;} });
    if(bi>=0){ Lab.units.splice(bi,1); AudioSys.play('sell'); updateHud(); }
    return;
  }
  // red defensive structures (siege experiments)
  if(typeof Lab.sel==='string'&&Lab.sel.indexOf('b:')===0){
    const parts=Lab.sel.split(':'); const k=+parts[1], tIdx=+parts[2]||0;
    const x=wx|0, y=wy|0;
    Lab.G.era=Lab.eras[1];
    for(const s of Lab.units) if((s.x|0)===x&&(s.y|0)===y) return; // don't bury troops
    if(k===1||k===4){ const under=Lab.G.bgrid[y*MAPW+x];
      if(under&&(under.kind==='wall'||under.kind==='palisade')) removeAt(Lab.G,x,y); }
    if(k===8){ const under=Lab.G.bgrid[y*MAPW+x];
      if(under&&under.kind==='moat') removeAt(Lab.G,x,y); }
    if(placeBuilding(Lab.G,k,tIdx,x,y)){ AudioSys.play('build'); updateHud(); }
    return;
  }
  // formation stamp: brush×brush block of troops in one click
  const n=Lab.brush, sp=.75, off=(n-1)*sp/2;
  let placed=0;
  outer:
  for(let ry=0;ry<n;ry++)for(let rx=0;rx<n;rx++){
    if(Lab.units.length>=1200) break outer; // sanity ceiling, far beyond playable
    const px2=clamp(wx-off+rx*sp,0.3,MAPW-0.3), py2=clamp(wy-off+ry*sp,0.3,MAPW-0.3);
    if(WALK_COST[Lab.G.terrain[(py2|0)*MAPW+(px2|0)]]===0)continue;
    const under=Lab.G.bgrid[(py2|0)*MAPW+(px2|0)];
    if(under&&under.kind!=='bridgeB'&&under.kind!=='moat'&&under.kind!=='trap')continue;
    let blocked=false;
    for(const s of Lab.units) if(dist(s.x,s.y,px2,py2)<.55){ blocked=true; break; }
    if(blocked)continue;
    Lab.units.push({team:Lab.team, era:Lab.eras[Lab.team], uIdx:Lab.sel, x:px2, y:py2});
    placed++;
  }
  if(placed){ AudioSys.play('build'); updateHud(); }
}

/* ===================== DEPLOY OVERLAY CACHE ===================== */
let deployOverlay=null;
function buildDeployOverlay(){
  const c=document.createElement('canvas');
  c.width=MAPW*TW+8; c.height=MAPW*TH+OY+40;
  const g=c.getContext('2d');
  for(let y=0;y<MAPW;y++)for(let x=0;x<MAPW;x++){
    if(!Battle.deployMask[y*MAPW+x])continue;
    const [pxr,pyr]=wpx(x+0.5,y+0.5); const px=pxr+OX, py=pyr+OY;
    g.fillStyle='rgba(94,201,123,.2)'; g.beginPath();
    g.moveTo(px,py-TH/2); g.lineTo(px+TW/2,py); g.lineTo(px,py+TH/2); g.lineTo(px-TW/2,py);
    g.closePath(); g.fill();
  }
  deployOverlay=c;
}

/* ===================== RENDER FRAME ===================== */
function render(time){
  ctx.fillStyle='#101820'; ctx.fillRect(0,0,VW,VH);
  const G=Battle.active?Battle.G:(MODE==='build'?BuildState.G:(MODE==='lab'?Lab.G:null));
  if(!G){
    ctx.save(); ctx.globalAlpha=.05; ctx.strokeStyle='#4fa3e0';
    for(let i=0;i<14;i++){ const x=(i*173)%VW, y=(i*97)%VH, s=30+(i%4)*18;
      ctx.beginPath(); ctx.moveTo(x,y-s/2); ctx.lineTo(x+s,y); ctx.lineTo(x,y+s/2); ctx.lineTo(x-s,y);
      ctx.closePath(); ctx.stroke(); }
    ctx.restore(); return; }
  // screen shake
  const ocx=cam.x, ocy=cam.y;
  if(SHAKE.t>0&&SHAKE.mag>0){
    const k=SHAKE.t/.32;
    cam.x+=(Math.random()-.5)*SHAKE.mag*k/cam.zoom;
    cam.y+=(Math.random()-.5)*SHAKE.mag*k*.7/cam.zoom;
  }
  blitTerrain();
  if(Battle.active) blitDecals();
  renderWater(time);
  if(Battle.active&&Battle.mode==='attack'&&deployOverlay&&trayRemaining()>0&&!Battle.ended){
    const sx=(-OX-cam.x)*cam.zoom+VW/2, sy=(-OY-cam.y)*cam.zoom+VH/2;
    ctx.drawImage(deployOverlay,sx,sy,deployOverlay.width*cam.zoom,deployOverlay.height*cam.zoom);
  }
  // build ghost — drawBuildGhost()로 이전(건축물 위 렌더). 원본 경로는 비활성.
  if(false&&MODE==='build'&&BuildState.hover&&BuildState.sel){
    const x=BuildState.hover[0]|0, y=BuildState.hover[1]|0;
    if(x>=0&&y>=0&&x<MAPW&&y<MAPW){
      const size=BuildState.sel.t==='hq'?2:1;
      let ok;
      if(BuildState.sel.t==='sell') ok=true;
      else if(BuildState.sel.t==='bridgeB'){
        const under=G.bgrid[y*MAPW+x];
        ok=canPlaceBridge(G,x,y)||(under&&under.kind==='moat');
      } else if(BuildState.sel.t==='tower'||BuildState.sel.t==='gate'){
        const under=G.bgrid[y*MAPW+x];
        ok=canPlace(G,x,y,size)||!!(under&&(under.kind==='wall'||under.kind==='palisade'));
      } else if(BuildState.sel.t==='wall'){
        const under=G.bgrid[y*MAPW+x];
        ok=canPlace(G,x,y,size)||!!(under&&under.kind==='wall'&&(under.lvl||1)<BLOCK.lvlMax);
      } else if(BuildState.sel.t==='block'){
        const under=G.bgrid[y*MAPW+x];
        const topOk=under&&under.kind==='block'
          &&!MAT_TERMINAL[(BLOCK.mats[(under.layers||[under.tIdx||0])[(under.layers||[0]).length-1]]||BLOCK.mats[0]).kind];
        ok=canPlace(G,x,y,size)||!!(topOk&&(under.lvl||1)<maxHFor(G,x,y));
      } else if(BuildState.sel.t==='flag'){
        const under=G.bgrid[y*MAPW+x];
        ok=canPlace(G,x,y,size)||!!(under&&(under.kind==='wall'||under.kind==='block'||under.kind==='tower')&&!under.flagTop);
      } else if(BuildState.sel.t==='hq'){
        const tiles=[[x,y],[x+1,y],[x,y+1],[x+1,y+1]];
        const cols=tiles.map(([tx2,ty2])=>(tx2<MAPW&&ty2<MAPW)?G.bgrid[ty2*MAPW+tx2]:null);
        const allB=cols.every(o=>o&&o.kind==='block');
        const platOk=allB&&new Set(cols).size===4
          &&cols.every(o=>o.layers.length===cols[0].layers.length
            &&!MAT_TERMINAL[(BLOCK.mats[o.layers[o.layers.length-1]]||BLOCK.mats[0]).kind]);
        ok=canPlace(G,x,y,size)||platOk;
      } else ok=canPlace(G,x,y,size);
      if(BuildState.sel.t==='garrison') ok=ok&&WALK_COST[G.terrain[y*MAPW+x]]>0;
      for(let dy=0;dy<size;dy++)for(let dx=0;dx<size;dx++)
        drawTileHighlight(x+dx,y+dy, BuildState.sel.t==='sell'?'#e0604f':(ok?'#5ec97b':'#e0604f'), .45);
      // translucent sprite preview of the building about to be placed
      const st=BuildState.sel.t;
      if(ok&&(st==='wall'||st==='gate'||st==='palisade'||st==='hq'||st==='tower'||st==='block')){
        const [gx,gy]=w2s(x+(size===2?1:0.5),y+(size===2?1:0.5));
        const rz2=tileRaise(G,x,y);
        const underG=G.bgrid[y*MAPW+x];
        const lift=(st==='wall'&&underG&&underG.kind==='wall')?13*(underG.lvl||1):
                   (st==='block'&&underG&&underG.kind==='block')?13*((underG.layers||[0]).length):
                   (st==='tower'&&underG&&underG.kind==='wall')?13*(underG.lvl||1):
                   (st==='hq'&&underG&&underG.kind==='block')?13*(underG.layers?underG.layers.length:1):0;
        if(lift>0){ // 스택 유도선
          const [glx,gly]=w2s(x+.5,y+.5);
          ctx.save(); ctx.strokeStyle='rgba(94,201,123,.7)'; ctx.lineWidth=1.4*cam.zoom;
          ctx.setLineDash([4*cam.zoom,3*cam.zoom]);
          ctx.beginPath(); ctx.moveTo(glx,gly); ctx.lineTo(glx,gly-lift*cam.zoom); ctx.stroke();
          ctx.setLineDash([]); ctx.restore(); }
        ctx.save(); ctx.globalAlpha=.55;
        ctx.translate(gx,gy-rz2*cam.zoom-lift*cam.zoom); ctx.scale(cam.zoom,cam.zoom);
        blitSprite(st==='wall'?wallSprite(G.era):st==='gate'?gateSprite(G.era):
          st==='palisade'?palSprite(G.era):st==='hq'?hqSprite(G.era):
          st==='block'?blockSprite(BuildState.sel.i||0,lift<=0):towerSprite(G.era,BuildState.sel.i));
        ctx.restore();
      }
      if(BuildState.sel.t==='tower'&&ok){
        const td=ERAS[G.era].towers[BuildState.sel.i];
        const onHill=G.terrain[y*MAPW+x]===T.HILL;
        const [cx,cy]=w2s(x+0.5,y+0.5);
        ctx.strokeStyle='rgba(240,180,60,.5)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.ellipse(cx,cy,td.rng*(onHill?1.15:1)*TW/2*cam.zoom,td.rng*(onHill?1.15:1)*TH/2*cam.zoom,0,0,7); ctx.stroke();
        if(td.minRng){ ctx.strokeStyle='rgba(224,96,79,.5)';
          ctx.beginPath(); ctx.ellipse(cx,cy,td.minRng*TW/2*cam.zoom,td.minRng*TH/2*cam.zoom,0,0,7); ctx.stroke(); }
      }
    }
  }
  // drawables (flat/ground kinds first via lower sort key)
  const items=[];
  for(const b of G.buildings){
    const flat=(b.kind==='moat')?-31:(b.kind==='bridgeB'||b.kind==='trap')?-30:(b.kind==='flag'?-0.4:0);
    items.push({k:b.x+b.y+(b.kind==='hq'?1:0)+flat, f:()=>{drawBuilding(b,time,G.cust); if(b.hitT>0) drawBHit(b);}});
  }
  if(MODE==='build'){
    for(const gu of G.garrison){
      const u={def:gu.def,era:G.era,uIdx:gu.uIdx,x:gu.x+0.5,y:gu.y+0.5,hp:1,maxHp:1,color:G.cust.c1,seed:gu.x*7+gu.y,moving:false,slow:0,faceAng:-.5};
      items.push({k:gu.x+gu.y, f:()=>drawUnit(u,time)});
    }
  }
  if(MODE==='lab'&&!Battle.active){
    for(const s of Lab.units){
      const u={def:ERAS[s.era].units[s.uIdx],era:s.era,uIdx:s.uIdx,x:s.x,y:s.y,hp:1,maxHp:1,
        color:labTeamColor(s.team),seed:s.x*7+s.y,moving:false,slow:0,faceAng:s.team===0?-.5:Math.PI+.5};
      items.push({k:s.x+s.y, f:()=>drawUnit(u,time)});
    }
    // placement cursor
    if(Lab.hover){
      const hx=Lab.hover[0], hy=Lab.hover[1];
      if(hx>0&&hy>0&&hx<MAPW&&hy<MAPW){
        if(typeof Lab.sel==='string'&&Lab.sel.indexOf('b:')===0){
          const parts=Lab.sel.split(':'); const bk=+parts[1], bti=+parts[2]||0;
          const tx2=hx|0, ty2=hy|0;
          const under=G.bgrid[ty2*MAPW+tx2];
          let ok=bk===8?(canPlaceBridge(G,tx2,ty2)||(under&&under.kind==='moat'))
                :(canPlace(G,tx2,ty2,1)||((bk===1||bk===4)&&under&&(under.kind==='wall'||under.kind==='palisade')));
          drawTileHighlight(tx2,ty2, ok?'#5ec97b':'#e0604f', .45);
          if(ok&&(bk===0||bk===4||bk===5||bk===1)){
            const [gx,gy]=w2s(tx2+0.5,ty2+0.5);
            ctx.save(); ctx.globalAlpha=.55; ctx.translate(gx,gy); ctx.scale(cam.zoom,cam.zoom);
            blitSprite(bk===0?wallSprite(Lab.eras[1]):bk===4?gateSprite(Lab.eras[1]):
              bk===5?palSprite(Lab.eras[1]):towerSprite(Lab.eras[1],bti));
            ctx.restore();
          }
        } else {
          const [cx2,cy2]=w2s(hx,hy);
          ctx.strokeStyle=Lab.sel==='erase'?'rgba(224,96,79,.8)':labTeamColor(Lab.team);
          ctx.lineWidth=1.6;
          ctx.beginPath(); ctx.ellipse(cx2,cy2,10*cam.zoom,5*cam.zoom,0,0,7); ctx.stroke();
        }
      }
    }
  }
  if(Battle.active){
    for(const u of Battle.attackers) items.push({k:u.x+u.y-1, f:()=>drawUnit(u,time)});
    for(const d of Battle.defenders) items.push({k:d.x+d.y-1, f:()=>drawUnit(d,time)});
  }
  items.sort((a,b)=>a.k-b.k);
  for(const it of items) it.f();
  drawBuildGhost(); // 고스트는 모든 건축물 위에
  if(Battle.active){
    for(const p of Battle.projs) drawProjectile(p);
    for(const z of Battle.zaps) drawZap(z);
    drawParticles(Battle.parts);
  }
  drawBirds(time);
  renderClouds(time);
  renderAtmosphere(time);
  cam.x=ocx; cam.y=ocy;
}

/* ===================== MAIN LOOP ===================== */
const STEP=1000/60;
let acc=0, last=performance.now(), hudTimer=0;
let frames=0, fpsAt=last;
const devOn=new URLSearchParams(location.search).has('dev');
if(devOn) $('#dev').style.display='block';
addEventListener('blur',()=>{ if(Battle.active) Battle.paused=true; });
function frame(now){
  requestAnimationFrame(frame);
  acc+=now-last; last=now;
  if(acc>250)acc=250;
  while(acc>=STEP){
    const dt=STEP/1000;
    panByKeys(dt);
    // shake decays everywhere (fixes residual jitter lingering into build mode)
    if(SHAKE.t>0){ SHAKE.t-=dt; if(SHAKE.t<=0)SHAKE.mag=0; }
    if(Battle.active&&!Battle.paused&&!Battle.ended){
      for(let i=0;i<Battle.speed;i++) simStep(dt);
    }
    acc-=STEP;
  }
  if(Battle.active){ hudTimer+=1; if(hudTimer>=15){ hudTimer=0; updateHud(); } }
  render(now/1000);
  if(devOn){ frames++;
    if(now-fpsAt>=500){ $('#dev').textContent=Math.round(frames*1000/(now-fpsAt))+' fps · e'+
      (Battle.attackers.length+Battle.defenders.length)+' p'+(Battle.projs.length+Battle.parts.length);
      frames=0; fpsAt=now; } }
}
